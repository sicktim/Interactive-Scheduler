                                                                <span className="text-gray-200" style={{ minWidth: 120 }}>{ev.eventName}</span>
                                                                <span className="text-gray-500" style={{ fontSize: '0.6rem', width: 80 }}>{ev.startTime}-{ev.endTime || '??'}</span>
                                                                <span className="sel-crew-preview">{ev.personnel.join(', ')}</span>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            );
                                        });
                                    })}
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        // ─── CONFLICT SUMMARY MODAL ───

        const ConflictSummaryModal = ({ conflicts, workingEvents, onClose }) => {
            const byDate = React.useMemo(() => {
                const map = new Map(); // date -> [{event, personConflicts: [{person, alsoOn}]}]
                conflicts.forEach((personMap, eventId) => {
                    const event = workingEvents.find(e => e.id === eventId);
                    if (!event) return;
                    const date = event.date;
                    if (!map.has(date)) map.set(date, []);
                    const personConflicts = [];
                    personMap.forEach((confList, person) => {
                        const alsoOn = confList.map(c => {
                            const m = c.model ? `${c.model} ` : '';
                            return `${m}${c.eventName}`;
                        }).join(', ');
                        personConflicts.push({ person, alsoOn });
                    });
                    personConflicts.sort((a, b) => a.person.localeCompare(b.person));
                    map.get(date).push({ event, personConflicts });
                });
                // Sort events within each day by section priority then start time
                map.forEach(events => {
                    events.sort((a, b) => {
                        const pa = SECTION_PRIORITY[a.event.section] || 99;
                        const pb = SECTION_PRIORITY[b.event.section] || 99;
                        if (pa !== pb) return pa - pb;
                        return (a.event.startTime || '').localeCompare(b.event.startTime || '');
                    });
                });
                return new Map([...map.entries()].sort((a, b) => a[0].localeCompare(b[0])));
            }, [conflicts, workingEvents]);

            React.useEffect(() => {
                if (byDate.size === 0) onClose();
            }, [byDate.size, onClose]);

            React.useEffect(() => {
                const handler = (e) => { if (e.key === 'Escape') onClose(); };
                document.addEventListener('keydown', handler);
                return () => document.removeEventListener('keydown', handler);
            }, [onClose]);

            if (byDate.size === 0) return null;

            return (
                <div
                    onClick={e => { if (e.target === e.currentTarget) onClose(); }}
                    style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.65)', zIndex: 1000,
                             display: 'flex', alignItems: 'flex-start', justifyContent: 'center', paddingTop: 56 }}
                >
                    <div style={{ background: '#1a1f2e', border: '1px solid rgba(255,255,255,0.1)', borderRadius: 8,
                                  width: '92vw', maxWidth: 1300, maxHeight: '80vh', display: 'flex', flexDirection: 'column' }}>
                        {/* Header */}
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                                      padding: '8px 14px', borderBottom: '1px solid rgba(255,255,255,0.07)', flexShrink: 0 }}>
                            <span style={{ fontSize: '0.7rem', fontWeight: 700, color: '#f87171',
                                           textTransform: 'uppercase', letterSpacing: '0.1em' }}>
                                &#9888; Conflict Summary
                            </span>
                            <button onClick={onClose}
                                    style={{ background: 'none', border: 'none', color: 'rgba(255,255,255,0.4)',
                                             cursor: 'pointer', fontSize: '1rem', lineHeight: 1, padding: '2px 4px' }}>&#x2715;</button>
                        </div>
                        {/* Day columns */}
                        <div style={{ display: 'flex', gap: 0, overflowX: 'auto', overflowY: 'auto',
                                      padding: '12px 14px', flex: 1, alignItems: 'flex-start' }}>
                            {[...byDate.entries()].map(([date, events]) => {
                                const fd = fmtDate(date);
                                return (
                                    <div key={date} style={{ minWidth: 230, maxWidth: 270, flexShrink: 0,
                                                             borderRight: '1px solid rgba(255,255,255,0.06)',
                                                             paddingRight: 14, marginRight: 14 }}>
                                        {/* Day header */}
                                        <div style={{ fontSize: '0.65rem', fontWeight: 700, color: '#94a3b8',
                                                      textTransform: 'uppercase', letterSpacing: '0.08em',
                                                      marginBottom: 10, paddingBottom: 4,
                                                      borderBottom: '1px solid rgba(255,255,255,0.05)' }}>
                                            {fd.weekday} {fd.day} {fd.month}
                                        </div>
                                        {/* Event blocks */}
                                        {events.map(({ event, personConflicts }) => {
                                            const badge = SECTION_BADGE[event.section] || 'OTH';
                                            const bColor = SECTION_BADGE_COLOR[event.section] || '#475569';
                                            const mPrefix = event.model ? `${event.model} ` : '';
                                            const timeStr = event.startTime
                                                ? `${event.startTime}${event.endTime ? '\u2013' + event.endTime : ''}`
                                                : '';
                                            return (
                                                <div key={event.id} style={{ marginBottom: 10 }}>
                                                    <div style={{ display: 'flex', alignItems: 'baseline',
                                                                  gap: 5, marginBottom: 2 }}>
                                                        <span style={{ fontSize: '0.5rem', fontWeight: 700,
                                                                       color: '#fff', background: bColor,
                                                                       padding: '1px 4px', borderRadius: 3,
                                                                       flexShrink: 0 }}>{badge}</span>
                                                        <span style={{ fontSize: '0.63rem', color: '#e2e8f0',
                                                                       fontWeight: 600, lineHeight: 1.3 }}>
                                                            {mPrefix}{event.eventName}
                                                        </span>
                                                    </div>
                                                    {timeStr && (
                                                        <div style={{ fontSize: '0.57rem', color: '#64748b',
                                                                      marginBottom: 4, paddingLeft: 2 }}>
                                                            {timeStr}
                                                        </div>
                                                    )}
                                                    {personConflicts.map(({ person, alsoOn }) => (
                                                        <div key={person}
                                                             style={{ fontSize: '0.6rem', paddingLeft: 6,
                                                                      lineHeight: 1.6, color: '#cbd5e1' }}>
                                                            <span style={{ color: '#f87171', marginRight: 3 }}>&#9888;</span>
                                                            <span style={{ color: '#fbbf24', fontWeight: 600 }}>{person}</span>
                                                            <span style={{ color: '#64748b' }}> &#x2192; </span>
                                                            <span style={{ color: '#94a3b8' }}>{alsoOn}</span>
                                                        </div>
                                                    ))}
                                                </div>
                                            );
                                        })}
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        };

        // ─── PERSONNEL CHIP ───

        const PersonnelChip = ({ name, roster, conflictText, onRemove, eventId, inPicker, isBusy, isUnavailable, colorOverride, onDragStart: onDS, onDragEnd: onDE, onShowTooltip, onHideTooltip }) => {
            const colors = colorOverride || chipColor(name, roster);

            const handleDragStart = (e) => {
                e.dataTransfer.setData('text/plain', JSON.stringify({ person: name, sourceEventId: eventId || null }));
                e.dataTransfer.effectAllowed = 'copyMove';
                e.currentTarget.style.opacity = '0.4';
                if (onDS) onDS(name, eventId);
            };

            const handleDragEnd = (e) => {
                e.currentTarget.style.opacity = '1';
                if (onDE) onDE();
            };

            const hasCon = !!conflictText;

            const handleMouseEnter = (e) => {
                if ((hasCon || isUnavailable) && onShowTooltip) {
                    const rect = e.currentTarget.getBoundingClientRect();
                    onShowTooltip(isUnavailable ? conflictText : `Also on:\n${conflictText}`, rect);
                }
            };

            return (
                <span
                    className={`chip ${hasCon && !isUnavailable ? 'chip-conflict' : ''} ${inPicker ? 'picker-chip' : ''} ${isBusy ? 'busy' : ''} ${isUnavailable ? 'unavailable' : ''}`}
                    style={{ background: colors.bg, color: colors.text }}
                    draggable
                    onDragStart={handleDragStart}
                    onDragEnd={handleDragEnd}
                    onMouseEnter={handleMouseEnter}
                    onMouseLeave={onHideTooltip}
                    title={hasCon ? undefined : name}
                >
                    {name}
                    {hasCon && <span className="conflict-icon">!</span>}
                    {onRemove && <span className="chip-remove" onClick={(e) => { e.stopPropagation(); e.preventDefault(); if (onHideTooltip) onHideTooltip(); onRemove(name); }}>✕</span>}
                </span>
            );
        };

        // ─── EVENT CARD ───

        const EventCard = ({ event, top, height, roster, conflicts, onRemove, onAdd, onDS, onDE, onShowTooltip, onHideTooltip, isFocused, isDimmed, onFocusEvent, onDeleteCustom, onEventAction, onAddPlaceholder, onFillPlaceholder, onRemovePlaceholder }) => {
            const [dragOver, setDragOver] = useState(false);
            const [pendingFill, setPendingFill] = React.useState(null);
            const [addMenuOpen, setAddMenuOpen] = React.useState(false);
            const addBtnRef = React.useRef(null);

            const sMin = evStart(event);
            const eMin = evEnd(event);
            const leftPct = timePct(sMin);
            const widthPct = timePct(eMin) - leftPct;

            const cCount = eventConflictCount(event.id, conflicts);
            const secClass = `event-card-${event.section.toLowerCase()}`;
            const labelClass = `label-${event.section.toLowerCase()}`;
            const typeLabel = event.section === 'Flying' ? (event.model || 'FLT') : event.section === 'Ground' ? 'GND' : event.section === 'NA' ? 'NA' : null; // Supervision: no type label

            // Flight bar (ETD→ETA within the card)
            let flightBar = null;
            if (event.section === 'Flying' && event.etd && event.eta) {
                const etdMin = timeToMinutes(event.etd);
                const etaMin = timeToMinutes(event.eta);
                const dur = eMin - sMin;
                if (dur > 0 && etdMin != null && etaMin != null) {
                    const fLeft = Math.max(0, (etdMin - sMin) / dur * 100);
                    const fWidth = Math.max(0, (etaMin - etdMin) / dur * 100);
                    flightBar = (
                        <div className="flight-bar-row">
                            <div className="flight-bar-track">
                                <div className="flight-bar-fill" style={{ left: `${fLeft}%`, width: `${fWidth}%` }}>
                                    <span className="flight-time-marker etd" style={{ left: 0 }}>{event.etd}</span>
                                    <span className="flight-time-marker eta" style={{ right: 0 }}>{event.eta}</span>
                                </div>
                            </div>
                        </div>
                    );
                }
            }

            const handleDragOver = (e) => {
                if (event.readonly) return;
                e.preventDefault();
                e.dataTransfer.dropEffect = 'copy';
                setDragOver(true);
            };

            const handleDrop = (e) => {
                e.preventDefault();
                setDragOver(false);
                if (event.readonly) return;
                try {
                    const data = JSON.parse(e.dataTransfer.getData('text/plain'));
                    const personName = data.person;
                    if (!personName) return;

                    // Blank puck with default label → create unfilled placeholder
                    if (data.isBlankPuck && data.isDefaultLabel && data.role && onAddPlaceholder) {
                        onAddPlaceholder(event.id, data.role);
                        return;
                    }

                    // Renamed blank puck → create filled placeholder (preserves role color)
                    if (data.isBlankPuck && !data.isDefaultLabel && data.role && onAddPlaceholder) {
                        onAddPlaceholder(event.id, data.role, personName);
                        return;
                    }

                    // Regular person drop
                    if (!event.personnel.includes(personName)) {
                        onAdd(event.id, personName, data.sourceEventId);

                        // Check for matching unfilled placeholders → show indirect fill prompt
                        if (onFillPlaceholder) {
                            const cat = data.category || personCat(personName, roster);
                            const rcMap = {};
                            const phWithIdx = (event.placeholders || []).map(ph => {
                                if (rcMap[ph.role] === undefined) rcMap[ph.role] = 0;
                                return { ...ph, _idx: rcMap[ph.role]++ };
                            });
                            const matches = phWithIdx.filter(p => !p.filledBy && canFillPlaceholder(p.role, cat));
                            if (matches.length > 0) {
                                setPendingFill({ person: personName, matches, rcMap });
                            }
                        }
                    }
                } catch (err) {}
            };

            React.useEffect(() => {
                if (!addMenuOpen) return;
                const handler = (e) => {
                    if (addBtnRef.current && !addBtnRef.current.contains(e.target)) {
                        setAddMenuOpen(false);
                    }
                };
                document.addEventListener('pointerdown', handler);
                return () => document.removeEventListener('pointerdown', handler);
            }, [addMenuOpen]);

            // Build conflict summary for badge tooltip
            let badgeTooltip = '';
            if (cCount > 0) {
                const ec = conflicts.get(event.id);
                const lines = [];
                ec.forEach((confList, person) => {
                    confList.forEach(c => {
                        const m = c.model ? `${c.model} ` : '';
                        lines.push(`${person} → ${m}${c.eventName} ${c.startTime}-${c.endTime || '??'}`);
                    });
                });
                badgeTooltip = lines.join('\n');
            }

            return (
                <div
                    className={`event-card ${secClass} ${event.cancelled ? 'event-card-cancelled' : ''} ${event.isCustom ? 'event-card-custom' : ''} ${dragOver ? 'drag-over' : ''} ${isFocused ? 'focused' : ''} ${isDimmed ? 'dimmed' : ''}`}
                    style={{ left: `${leftPct}%`, width: `${Math.max(widthPct, 4)}%`, top: `${top}px`, height: `${height}px` }}
                    onDragOver={handleDragOver}
                    onDragLeave={() => setDragOver(false)}
                    onDrop={handleDrop}
                    onClick={(e) => {
                        if (event.readonly) return;
                        e.stopPropagation();
                        if (onEventAction) {
                            if (onFocusEvent) onFocusEvent(event.id); // focus + show menu simultaneously
                            onEventAction(event, e.currentTarget.getBoundingClientRect());
                        } else if (onFocusEvent) {
                            onFocusEvent(isFocused ? null : event.id);
                        }
                    }}
                >
                    {cCount > 0 && (
                        <div className="conflict-badge"
                            onMouseEnter={(e) => { if (onShowTooltip) { onShowTooltip(badgeTooltip, e.currentTarget.getBoundingClientRect()); } }}
                            onMouseLeave={onHideTooltip}
                        >
                            {cCount}
                        </div>
                    )}
                    <div className="event-title-bar" title={
                        (event.section === 'Ground' || event.section === 'NA')
                            ? `${event.startTime}–${event.endTime || '??'}` : undefined
                    }>
                        {typeLabel && <span className={`event-type-label ${labelClass}`}>{typeLabel}</span>}
                        <span className="event-name-text">{event.eventName}</span>
                        {event.section !== 'Ground' && event.section !== 'NA' && (
                            <span className="event-time-text">{event.startTime}-{event.endTime || '??'}</span>
                        )}
                        {event.cancelled && <span style={{ background: '#a81a1a', color: 'white', fontSize: '0.65rem', fontWeight: 1000, padding: '0 3px', borderRadius: 2 }}>CX</span>}
                        {event.isCustom && <span className="custom-badge">+NEW</span>}
                        {event.isCustom && onDeleteCustom && (
                            <span className="custom-delete-btn" title="Delete custom event" onClick={(e) => { e.stopPropagation(); onDeleteCustom(event.id); }}>✕</span>
                        )}
                    </div>
                    {flightBar}
                    <div className="event-crew-area">
                        {(() => {
                            // Map filled-placeholder names to role color
                            const filledRoleMap = {};
                            const rcMap = {};
                            const phWithIdx = (event.placeholders || []).map(ph => {
                                if (ph.filledBy) filledRoleMap[ph.filledBy] = ph.role;
                                if (rcMap[ph.role] === undefined) rcMap[ph.role] = 0;
                                return { ...ph, _idx: rcMap[ph.role]++ };
                            });

                            // Unfilled placeholders with numbering
                            const unfilled = phWithIdx.filter(p => !p.filledBy);
                            const roleTotals = {};
                            unfilled.forEach(ph => { roleTotals[ph.role] = (roleTotals[ph.role] || 0) + 1; });

                            return (
                                <>
                                    {event.personnel.map((person, i) => {
                                        const filledRole = filledRoleMap[person];
                                        const colorOverride = filledRole ? getPlaceholderRoleColor(filledRole) : null;
                                        const isPending = pendingFill && pendingFill.person === person;
                                        return (
                                            <span key={i} style={{ position: 'relative', display: 'inline-flex', alignItems: 'center' }}>
                                                <PersonnelChip
                                                    name={person}
                                                    roster={roster}
                                                    colorOverride={colorOverride}
                                                    conflictText={getConflictText(event.id, person, conflicts)}
                                                    onRemove={event.readonly ? null : (n) => onRemove(event.id, n)}
                                                    eventId={event.id}
                                                    onDS={onDS}
                                                    onDE={onDE}
                                                    onShowTooltip={onShowTooltip}
                                                    onHideTooltip={onHideTooltip}
                                                />
                                                {isPending && (
                                                    <div className="wb-fill-prompt" onClick={e => e.stopPropagation()}>
                                                        {pendingFill.matches.length === 1
                                                            ? <span>{`Fill ${pendingFill.matches[0].role} slot?`}</span>
                                                            : <span>Fill which slot?</span>
                                                        }
                                                        <div className="wb-fill-prompt-btns">
                                                            {pendingFill.matches.map(ph => (
                                                                <button key={ph.id} className="wb-fill-prompt-btn"
                                                                    onClick={() => {
                                                                        if (onFillPlaceholder) onFillPlaceholder(event.id, ph.id, person);
                                                                        setPendingFill(null);
                                                                    }}>
                                                                    {(pendingFill.rcMap[ph.role] || 0) > 1
                                                                        ? `${ph.role} ${ph._idx + 1}`
                                                                        : ph.role}
                                                                </button>
                                                            ))}
                                                            <button className="wb-fill-prompt-btn"
                                                                onClick={() => setPendingFill(null)}>
                                                                ✗
                                                            </button>
                                                        </div>
                                                    </div>
                                                )}
                                            </span>
                                        );
                                    })}
                                    {unfilled.map(ph => {
                                        const total = roleTotals[ph.role] || 1;
                                        const label = total > 1 ? `${ph.role} ${ph._idx + 1}` : ph.role;
                                        const rc = getPlaceholderRoleColor(ph.role);
                                        const isGenericPh = ph.role === 'Generic';
                                        return (
                                            <span key={ph.id} className="chip chip-placeholder"
                                                style={{
                                                    color: isGenericPh ? '#e2e8f0' : rc.bg,
                                                    borderColor: isGenericPh ? 'rgba(248,250,252,0.35)' : rc.bg,
                                                }}>
                                                {label}
                                                {onRemovePlaceholder && (
                                                    <span className="chip-remove"
                                                        onClick={(e) => { e.stopPropagation(); onRemovePlaceholder(event.id, ph.id); }}>
                                                        ✕
                                                    </span>
                                                )}
                                            </span>
                                        );
                                    })}
                                    {!event.readonly && onAddPlaceholder && (
                                        <span className="wb-crew-add-btn" ref={addBtnRef}
                                            onClick={(e) => { e.stopPropagation(); setAddMenuOpen(o => !o); }}>
                                            +
                                            {addMenuOpen && (
                                                <div className="wb-add-ph-popover" onClick={e => e.stopPropagation()}>
                                                    {PLACEHOLDER_ROLE_OPTIONS.map(opt => {
                                                        const color = opt.colorCat
                                                            ? (CATEGORY_COLORS[opt.colorCat] || DEFAULT_CHIP)
                                                            : GENERIC_PUCK_COLOR;
                                                        return (
                                                            <div key={opt.role} className="wb-add-ph-option"
                                                                onClick={() => {
                                                                    if (onAddPlaceholder) onAddPlaceholder(event.id, opt.role);
                                                                    setAddMenuOpen(false);
                                                                }}>
                                                                <span className="wb-add-ph-dot" style={{ background: color.bg }} />
                                                                {opt.role}
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            )}
                                        </span>
                                    )}
                                </>
                            );
                        })()}
                    </div>
                </div>
            );
        };

        // ─── DAY COLUMN ───

        const DayColumn = ({ date, events, roster, conflicts, foaAuth, onRemove, onAdd, onDS, onDE, onShowTooltip, onHideTooltip, focusedEventId, onFocusEvent, focusEnabled, onDeleteCustom, onEventAction, onAddPlaceholder, onFillPlaceholder, onRemovePlaceholder }) => {
            const hdr = fmtDate(date);
            const today = new Date().toISOString().slice(0, 10);
            const isToday = date === today;

            const sectionData = useMemo(() => {
                const result = {};
                SECTION_ORDER.forEach(sec => {
                    const secEvts = events.filter(ev => ev.section === sec);
                    result[sec] = {
                        events: secEvts,
                        layout: sec === 'Supervision'
                            ? buildSupervisionLayout(secEvts)
                            : sec === 'Flying'
                            ? buildFlyingLayout(secEvts)
                            : sec === 'Ground'
                            ? buildGroundLayout(secEvts)
                            : buildLayout(secEvts),
                    };
                });
                return result;
            }, [events]);

            // Abbreviate a name for the FOA/AUTH chip (Last name only, or first 8 chars)
            const abbrevName = (name) => {
                if (!name) return '';
                const parts = name.split(/[\s,]+/).filter(Boolean);
                // "Smith, J" -> "Smith" / "Smith J" -> "Smith" / "Smith" -> "Smith"
                return parts[0].slice(0, 8);
            };

            return (
                <div className="day-column" style={{ borderColor: isToday ? 'rgba(59,130,246,0.25)' : undefined }}>
                    <div className="day-header" style={{ borderBottom: isToday ? '2px solid #3b82f6' : undefined }}>
                        <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between' }}>
                            <div style={{ flex: 1, textAlign: 'center' }}>
                                <div style={{ fontWeight: 700, fontSize: '0.8rem', color: 'white' }}>{hdr.weekday}</div>
                                <div style={{ fontSize: '0.65rem', color: '#94a3b8' }}>{hdr.day} {hdr.month}</div>
                            </div>
                            {/* FOA / AUTH duty chips — only shown when populated */}
                            {(foaAuth && (foaAuth.foa || foaAuth.auth)) && (
                                <div style={{ display: 'flex', flexDirection: 'column', gap: 2, alignItems: 'flex-end', flexShrink: 0 }}>
                                    {foaAuth.foa && (() => {
                                        const c = chipColor(foaAuth.foa, roster);
                                        return (
                                            <div title={`FOA: ${foaAuth.foa}`} style={{
                                                display: 'flex', alignItems: 'center', gap: 2,
                                                background: c.bg, color: c.text,
                                                borderRadius: 3, padding: '1px 4px',
                                                fontSize: '0.48rem', fontWeight: 700, lineHeight: 1.4,
                                                maxWidth: 64, overflow: 'hidden',
                                                userSelect: 'none', cursor: 'default',
                                            }}>
                                                <span style={{ opacity: 0.7, fontSize: '0.42rem' }}>FOA</span>
                                                <span style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{abbrevName(foaAuth.foa)}</span>
                                            </div>
                                        );
                                    })()}
                                    {foaAuth.auth && (() => {
                                        const c = chipColor(foaAuth.auth, roster);
                                        return (
                                            <div title={`AUTH: ${foaAuth.auth}`} style={{
                                                display: 'flex', alignItems: 'center', gap: 2,
                                                background: c.bg, color: c.text,
                                                borderRadius: 3, padding: '1px 4px',
                                                fontSize: '0.48rem', fontWeight: 700, lineHeight: 1.4,
                                                maxWidth: 64, overflow: 'hidden',
                                                userSelect: 'none', cursor: 'default',
                                            }}>
                                                <span style={{ opacity: 0.7, fontSize: '0.42rem' }}>AUTH</span>
                                                <span style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{abbrevName(foaAuth.auth)}</span>
                                            </div>
                                        );
                                    })()}
                                </div>
                            )}
                        </div>
                        <div className="timeline-ruler">
                            {[6,9,12,15,18].map(h => (
                                <span key={h} style={{ left: `${timePct(h*60)}%` }}>{h}</span>
                            ))}
                        </div>
                    </div>
                    <div className="day-body">
                        {SECTION_ORDER.map(sec => {
                            const { events: secEvts, layout } = sectionData[sec];
                            if (secEvts.length === 0) return null;
                            const divClass = `section-divider section-divider-${sec.toLowerCase()}`;

                            // For supervision: render role band separators from pre-computed layout.roleBands
                            let supvRoleBands = null;
                            if (sec === 'Supervision' && layout.roleBands) {
                                supvRoleBands = layout.roleBands.map(({ role, top, height }) => (
                                    <div key={role} style={{
                                        position: 'absolute', left: 0, right: 0,
                                        top, height,
                                        borderBottom: '1px solid rgba(139,92,246,0.2)',
                                        pointerEvents: 'none',
                                    }}>
                                        <span style={{
                                            position: 'absolute', left: 2, top: 1,
                                            fontSize: '0.45rem', color: 'rgba(196,181,253,0.5)', fontWeight: 700,
                                            letterSpacing: '0.05em', userSelect: 'none',
                                        }}>{role}</span>
                                    </div>
                                ));
                            }

                            // For Flying: render model band separators. Each band may have a dashed
                            // divider between real-aircraft rows and their paired sim/CR sub-tier.
                            let flyingModelBands = null;
                            if (sec === 'Flying' && layout.modelBands) {
                                flyingModelBands = layout.modelBands.map(({ model, top, height, flightH, hasSims }) => (
                                    <div key={model} style={{
                                        position: 'absolute', left: 0, right: 0,
                                        top, height,
                                        borderBottom: '1px solid rgba(16,185,129,0.2)',
                                        pointerEvents: 'none',
                                    }}>
                                        <span style={{
                                            position: 'absolute', left: 2, top: 1,
                                            fontSize: '0.45rem', color: 'rgba(167,243,208,0.5)', fontWeight: 700,
                                            letterSpacing: '0.05em', userSelect: 'none',
                                        }}>{model}</span>
                                        {hasSims && flightH > 0 && (
                                            <div style={{
                                                position: 'absolute', left: 0, right: 0, top: 12 + flightH,
                                                borderTop: '1px dashed rgba(16,185,129,0.15)',
                                                pointerEvents: 'none',
                                            }} />
                                        )}
                                    </div>
                                ));
                            }

                            return (
                                <div key={sec}>
                                    <div className={divClass}>{sec === 'NA' ? 'NON-AVAIL' : sec.toUpperCase()}</div>
                                    <div className="section-lanes" style={{ height: `${layout.total || 50}px` }}>
                                        {supvRoleBands}
                                        {flyingModelBands}
                                        {secEvts.map(ev => {
                                            const pos = layout.evMap[ev.id] || { top: 0, height: 40 };
                                            return (
                                                <EventCard
                                                    key={ev.id}
                                                    event={ev}
                                                    top={pos.top}
                                                    height={pos.height}
                                                    roster={roster}
                                                    conflicts={conflicts}
                                                    onRemove={onRemove}
                                                    onAdd={onAdd}
                                                    onDS={onDS}
                                                    onDE={onDE}
                                                    onShowTooltip={onShowTooltip}
                                                    onHideTooltip={onHideTooltip}
                                                    isFocused={focusEnabled && focusedEventId === ev.id}
                                                    isDimmed={focusEnabled && !!focusedEventId && focusedEventId !== ev.id}
                                                    onFocusEvent={onFocusEvent}
                                                    onDeleteCustom={onDeleteCustom}
                                                    onEventAction={onEventAction}
                                                    onAddPlaceholder={onAddPlaceholder}
                                                    onFillPlaceholder={onFillPlaceholder}
                                                    onRemovePlaceholder={onRemovePlaceholder}
                                                />
                                            );
                                        })}
                                    </div>
                                </div>
                            );
                        })}
                        {events.length === 0 && <div className="empty-day">No selected events</div>}
                    </div>
                </div>
            );
        };

        // ─── BLANK PUCK ───

        const BlankPuck = ({ def }) => {
            const [customName, setCustomName] = useState('');
            const [editing, setEditing] = useState(false);
            const inputRef = React.useRef(null);
            // Use CATEGORY_COLORS for categorized pucks; fallback for Generic
            const color = def.cat ? (CATEGORY_COLORS[def.cat] || DEFAULT_CHIP) : GENERIC_PUCK_COLOR;

            React.useEffect(() => {
                if (editing && inputRef.current) inputRef.current.focus();
            }, [editing]);

            const handleDragStart = (e) => {
                const name = customName.trim() || def.label;
                const isDefaultLabel = !customName.trim();
                e.dataTransfer.setData('text/plain', JSON.stringify({
                    person: name,
                    isBlankPuck: true,
                    category: def.cat,
                    role: def.role,
                    isDefaultLabel,
                }));
                e.dataTransfer.effectAllowed = 'copy';
                e.currentTarget.style.opacity = '0.45';
            };
            const handleDragEnd = (e) => {
                e.currentTarget.style.opacity = '1';
                // Reset custom name after drag so selector returns to default label (Option 2 behavior)
                setCustomName('');
            };

            const handleSpanClick = () => { if (!editing && def.canRename) setEditing(true); };
            const handleBlur = () => setEditing(false);
            const handleKeyDown = (e) => {
                if (e.key === 'Enter' || e.key === 'Escape') { e.preventDefault(); setEditing(false); }
            };

            return (
                <span
                    className="blank-puck"
                    style={{ background: color.bg, color: color.text, cursor: def.canRename ? 'pointer' : 'grab' }}
                    draggable={!editing}
                    onDragStart={handleDragStart}
                    onDragEnd={handleDragEnd}
                    onClick={handleSpanClick}
                    title={def.canRename ? 'Click to name, then drag to assign' : `Drag to assign ${def.label}`}
                >
                    {editing ? (
                        <input
                            ref={inputRef}
                            className="blank-puck-input"
                            value={customName}
                            onChange={e => setCustomName(e.target.value)}
                            onBlur={handleBlur}
                            onKeyDown={handleKeyDown}
                            onClick={e => e.stopPropagation()}
                            placeholder={def.label}
                        />
                    ) : (
                        customName.trim() || def.label
                    )}
                </span>
            );
        };

        // ─── PERSONNEL PICKER ───

        const PersonnelPicker = ({ roster, allEvents, conflicts, onDS, onDE, onShowTooltip, onHideTooltip, focusedAvailability }) => {
            const [activeTabs, setActiveTabs] = useState(new Set(['All']));
            const [search, setSearch] = useState('');

            const cats = useMemo(() => Object.keys(roster).filter(k => roster[k]?.length > 0), [roster]);

            const toggleTab = useCallback((cat) => {
                setActiveTabs(prev => {
                    if (cat === 'All') return new Set(['All']);
                    const next = new Set(prev);
                    next.delete('All');
                    if (next.has(cat)) {
                        next.delete(cat);
                        if (next.size === 0) return new Set(['All']);
                    } else {
                        next.add(cat);
                        // If all cats selected, revert to All
                        if (cats.every(c => next.has(c))) return new Set(['All']);
                    }
                    return next;
                });
            }, [cats]);

            const busySet = useMemo(() => {
                const s = new Set();
                allEvents.forEach(ev => ev.personnel.forEach(p => s.add(p)));
                return s;
            }, [allEvents]);

            // Build per-person conflict summary with actual event details
            const personConflictSummary = useMemo(() => {
                // person -> Map<date, Set<formattedEntry>>
                const summary = new Map();
                conflicts.forEach((personMap, eventId) => {
                    personMap.forEach((confList, person) => {
                        if (!summary.has(person)) summary.set(person, new Map());
                        const dateMap = summary.get(person);
                        confList.forEach(c => {
                            const d = c.date || '?';
                            if (!dateMap.has(d)) dateMap.set(d, new Set());
                            const m = c.model ? `${c.model} ` : '';
                            dateMap.get(d).add(`  ${m}${c.eventName} (${c.startTime}-${c.endTime || '??'})`);
                        });
                    });
                });
                // Convert to formatted strings grouped by date
                const result = new Map();
                summary.forEach((dateMap, person) => {
                    const lines = [];
                    [...dateMap.keys()].sort().forEach(date => {
                        const header = (date && date !== '?')
                            ? `${fmtDate(date).full}:`
                            : `${date}:`;
                        lines.push(header);
                        dateMap.get(date).forEach(l => lines.push(l));
                    });
                    result.set(person, lines.join('\n'));
                });
                return result;
            }, [conflicts]);

            const people = useMemo(() => {
                let list;
                if (activeTabs.has('All')) {
                    list = Object.entries(roster).flatMap(([cat, members]) => members.map(n => ({ name: n, category: cat })));
                } else {
                    list = [];
                    activeTabs.forEach(cat => {
                        (roster[cat] || []).forEach(n => list.push({ name: n, category: cat }));
                    });
                }
                if (search.trim()) {
                    const q = search.trim().toLowerCase();
                    list = list.filter(p => p.name.toLowerCase().includes(q));
                }
                return list;
            }, [roster, activeTabs, search]);

            return (
                <div className="picker-panel">
                    <div className="flex items-center gap-2 px-2 py-1" style={{ borderBottom: '1px solid rgba(255,255,255,0.05)' }}>
                        <span className="text-xs font-bold text-gray-600 uppercase tracking-wider mr-1" style={{ flexShrink: 0 }}>Picker</span>
                        <div className="picker-tabs flex-1">
                            <div className={`picker-tab ${activeTabs.has('All') ? 'active' : ''}`} onClick={() => toggleTab('All')}>All</div>
                            {cats.map(c => (
                                <div key={c} className={`picker-tab ${activeTabs.has(c) ? 'active' : ''}`} onClick={() => toggleTab(c)}>{c}</div>
                            ))}
                        </div>
                        <span className="blank-puck-divider" />
                        <span className="pp-section-label" style={{
                            display: 'inline-flex',
                            flexDirection: 'column',
                            fontSize: '0.45rem',
                            lineHeight: 1.3,
                            color: 'rgba(255,255,255,0.3)',
                            userSelect: 'none',
                            marginRight: '4px',
                            whiteSpace: 'nowrap',
                            flexShrink: 0,
                        }}>
                            <span>Placeholder &</span>
                            <span>Custom Pucks</span>
                        </span>
                        {BLANK_PUCK_DEFS.map(def => (
                            <BlankPuck key={def.id} def={def} />
                        ))}
                        <span className="blank-puck-divider" />
                        <span className="text-gray-600" style={{ fontSize: '0.5rem', flexShrink: 0, display: 'flex', alignItems: 'center', gap: 4 }}>
                            <span style={{ width: 5, height: 5, borderRadius: '50%', background: '#f59e0b', display: 'inline-block' }}></span>
                            assigned
                        </span>
                        <input className="picker-search" placeholder="Search..." value={search} onChange={e => setSearch(e.target.value)} />
                    </div>
                    <div className="picker-body">
                        {people.map(p => {
                            const isUnavailable = focusedAvailability && focusedAvailability.has(p.name);
                            const unavailText = isUnavailable
                                ? focusedAvailability.get(p.name).map(c => `${c.assigned ? 'Assigned: ' : 'Busy: '}${c.model ? c.model + ' ' : ''}${c.eventName} (${c.startTime}-${c.endTime || '??'})`).join('\n')
                                : null;
                            return (
                                <PersonnelChip
                                    key={p.name}
                                    name={p.name}
                                    roster={roster}
                                    conflictText={isUnavailable ? unavailText : (personConflictSummary.get(p.name) || null)}
                                    inPicker
                                    isBusy={busySet.has(p.name)}
                                    isUnavailable={isUnavailable}
                                    onDS={onDS}
                                    onDE={onDE}
                                    onShowTooltip={onShowTooltip}
                                    onHideTooltip={onHideTooltip}
                                />
                            );
                        })}
                        {people.length === 0 && <span className="text-xs text-gray-600 p-2">No results</span>}
                    </div>
                </div>
            );
        };

        // ─── CHANGE SUMMARY (v3 — net changes with grouping) ───

        const NetChangeEntry = ({ inst, formatEvent, onUndo }) => {
            if (inst.type === 'event-cancel') {
                const wasCancelled = inst.cancelledAfter;
                return (
                    <div className="change-entry">
                        <span style={{ color: wasCancelled ? '#ef4444' : '#10b981', fontWeight: 700, fontSize: '0.7rem', flexShrink: 0 }}>
                            {wasCancelled ? 'CX' : '✓'}
                        </span>
                        <div className="change-detail">
                            <span style={{ color: 'rgba(255,255,255,0.5)' }}>{wasCancelled ? 'Cancelled: ' : 'Un-cancelled: '}</span>
                            {formatEvent(inst.source)}
                        </div>
                        <span className="change-undo" onClick={onUndo} title="Undo">↩</span>
                    </div>
                );
            }
            if (inst.type === 'event-edit') {
                const diffs = [];
                if (inst.before && inst.after) {
                    if (inst.before.eventName !== inst.after.eventName) diffs.push(`name \u2192 "${inst.after.eventName}"`);
                    if (inst.before.startTime !== inst.after.startTime || inst.before.endTime !== inst.after.endTime)
                        diffs.push(`${inst.after.startTime}\u2013${inst.after.endTime || '??'}`);
                    if ((inst.before.model || '') !== (inst.after.model || '')) diffs.push(`model \u2192 ${inst.after.model || '\u2014'}`);
                    if (inst.before.hasOwnProperty('notes') && inst.before.notes !== inst.after.notes)
                        diffs.push(`notes \u2192 "${inst.after.notes || ''}"`);
                }
                return (
                    <div className="change-entry" style={{ flexDirection: 'column', gap: 2 }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 6, width: '100%' }}>
                            <span style={{ color: '#a78bfa', fontWeight: 700, fontSize: '0.7rem', flexShrink: 0 }}>✎</span>
                            <div className="change-detail" style={{ flex: 1 }}>
                                <span style={{ color: 'rgba(255,255,255,0.5)' }}>Edited: </span>
                                {formatEvent(inst.source)}
                            </div>
                            <span className="change-undo" onClick={onUndo} title="Undo">↩</span>
                        </div>
                        {diffs.length > 0 && (
                            <div style={{ paddingLeft: 18, color: '#c4b5fd', fontSize: '0.55rem', lineHeight: 1.4 }}>
                                {diffs.join(' · ')}
                            </div>
                        )}
                    </div>
                );
            }
            if (inst.type === 'event-delete') {
                return (
                    <div className="change-entry">
                        <span style={{ color: '#ef4444', fontWeight: 700, fontSize: '0.7rem', flexShrink: 0 }}>✕</span>
                        <div className="change-detail">
                            <span style={{ color: '#fca5a5' }}>Removed: </span>
                            {formatEvent(inst.source)}
                        </div>
                        <span className="change-undo" onClick={onUndo} title="Undo (restores event)">↩</span>
                    </div>
                );
            }
            if (inst.type === 'move') {
                return (
                    <div className="change-entry" style={{ flexDirection: 'column', gap: 2 }}>
                        <div style={{ display: 'flex', alignItems: 'flex-start', gap: 6, width: '100%' }}>
                            <span style={{ color: '#3b82f6', fontWeight: 700, fontSize: '0.7rem', flexShrink: 0 }}>&rarr;</span>
                            <div className="change-detail" style={{ flex: 1 }}>
                                <span style={{ color: 'rgba(255,255,255,0.5)' }}>{formatEvent(inst.source)}</span>
                                <span style={{ color: '#3b82f6', margin: '0 4px' }}>&rarr;</span>
                                <span style={{ color: 'rgba(255,255,255,0.7)' }}>{formatEvent(inst.target, inst.date)}</span>
                            </div>
                            <span className="change-undo" onClick={onUndo} title="Undo all">↩</span>
                        </div>
                        <div style={{ paddingLeft: 18, color: '#93c5fd', fontSize: '0.55rem', lineHeight: 1.4 }}>
                            {inst.persons.join(', ')}
                        </div>
                    </div>
                );
            }
            if (inst.type === 'add') {
                return (
                    <div className="change-entry">
                        <span className="change-icon-add">+</span>
                        <div className="change-detail">
                            <span style={{ color: 'rgba(255,255,255,0.5)' }}>Add to </span>{formatEvent(inst.target)}
                            <br/><span style={{ color: '#6ee7b7' }}>{inst.persons.join(', ')}</span>
                        </div>
                        <span className="change-undo" onClick={onUndo} title="Undo all">↩</span>
                    </div>
                );
            }
            return (
                <div className="change-entry">
                    <span className="change-icon-remove">&minus;</span>
                    <div className="change-detail">
                        <span style={{ color: 'rgba(255,255,255,0.5)' }}>Remove from </span>{formatEvent(inst.source)}
                        <br/><span style={{ color: '#fca5a5' }}>{inst.persons.join(', ')}</span>
                    </div>
                    <span className="change-undo" onClick={onUndo} title="Undo all">↩</span>
                </div>
            );
        };

        const ChangeSummary = ({ changes, onUndoGroup, onClearAll, onCopy }) => {
            const netInstructions = useMemo(() => computeNetChanges(changes), [changes]);

            const byDate = useMemo(() => {
                const m = {};
                netInstructions.forEach(inst => {
                    if (!m[inst.date]) m[inst.date] = [];
                    m[inst.date].push(inst);
                });
                return m;
            }, [netInstructions]);

            const sortedDates = Object.keys(byDate).sort();
            const netCount = netInstructions.length;

            // contextDate: if provided and different from meta.date, inject short date into time parens
            const formatEvent = (meta, contextDate) => {
                if (!meta) return '';
                const model = meta.eventModel ? `${meta.eventModel} | ` : '';
                if (contextDate && meta.date && meta.date !== contextDate) {
                    const df = fmtDate(meta.date);
                    return `${model}${meta.eventName} (${df.weekday}, ${df.day} ${df.month}, ${meta.eventTime})`;
                }
                return `${model}${meta.eventName} (${meta.eventTime})`;
            };

            return (
                <div className="change-summary-panel">
                    <div className="change-summary-header">
                        <span>Change Summary</span>
                        <span className="text-xs font-normal text-gray-500">
                            {netCount > 0 ? netCount : ''}
                            {netCount > 0 && netCount !== changes.length && (
                                <span style={{ color: 'rgba(255,255,255,0.2)', marginLeft: 4 }}>({changes.length} raw)</span>
                            )}
                        </span>
                    </div>
                    <div className="change-list">
                        {sortedDates.length === 0 && changes.length === 0 && (
                            <div className="text-center text-gray-600 text-xs py-8">
                                No changes yet.<br/>Drag personnel to events<br/>or remove with ✕.
                            </div>
                        )}
                        {sortedDates.length === 0 && changes.length > 0 && (
                            <div className="text-center text-gray-600 text-xs py-8">
                                All changes cancel out.<br/>Net effect: no changes.
                            </div>
                        )}
                        {sortedDates.map(date => {
                            const h = fmtDate(date);
                            return (
                                <div key={date}>
                                    <div className="change-date-group">{h.full}</div>
                                    {byDate[date].map((inst, i) => (
                                        <NetChangeEntry
                                            key={`${date}-${i}`}
                                            inst={inst}
                                            formatEvent={formatEvent}
                                            onUndo={() => onUndoGroup(inst.rawIndices)}
                                        />
                                    ))}
                                </div>
                            );
                        })}
                    </div>
                    {changes.length > 0 && (
                        <div className="change-summary-footer">
                            <button onClick={onCopy} className="bg-blue-600 hover:bg-blue-500 text-white">Copy</button>
                            <button onClick={onClearAll} className="bg-transparent text-red-400 hover:bg-red-900/30" style={{ border: '1px solid rgba(239,68,68,0.3)' }}>Clear All</button>
                        </div>
                    )}
                </div>
            );
        };

        // ─── RAINBOW VIEW ───

        const RAINBOW_COL_WIDTH = 300;

        const RAINBOW_FILTERS = [
            { key: 'Supervision', label: 'Supv', color: '#8b5cf6' },
            { key: 'Flying', label: 'Flt', color: '#10b981' },
            { key: 'Ground', label: 'Gnd', color: '#f59e0b' },
            { key: 'NA', label: 'NAs', color: '#ef4444' },
            { key: 'Academics', label: 'Acad', color: '#3b82f6' },
        ];

        const RB_BAR_CLASS = {
            Flying: 'rb-bar-flying',
            Ground: 'rb-bar-ground',
            NA: 'rb-bar-na',
            Supervision: 'rb-bar-supervision',
            Academics: 'rb-bar-academics',
        };

        const ROSTER_ORDER = ['FTC-A', 'STC-A', 'FTC-B', 'STC-B', 'Staff IP', 'Staff IFTE/ICSO', 'Staff STC', 'Attached/Support'];

        // ─── RAINBOW MODAL (click event popup) ───

        const RainbowModal = ({ event, onClose }) => {
            if (!event) return null;
            const secColors = { Flying: ['green', '#10b981'], Ground: ['yellow', '#f59e0b'], NA: ['red', '#ef4444'], Supervision: ['purple', '#8b5cf6'], Academics: ['blue', '#3b82f6'] };
            const [cName, cHex] = secColors[event.section] || ['blue', '#3b82f6'];
            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal-content" onClick={e => e.stopPropagation()}>
                        <div className="flex justify-between items-start mb-4">
                            <h2 className="text-xl font-bold px-3 py-1 rounded" style={{ borderLeft: `4px solid ${cHex}`, color: cHex }}>{event.title}</h2>
                            <button onClick={onClose} className="text-gray-500 hover:text-white text-2xl">&times;</button>
                        </div>
                        <div className="space-y-4">
                            <div className="flex gap-4">
                                <div className="bg-white/5 p-3 rounded-lg flex-1">
                                    <div className="text-xs text-gray-500 uppercase font-bold mb-1">Time</div>
                                    <div className="text-white">{event.start || '?'} – {event.end || '?'}</div>
                                </div>
                                <div className="bg-white/5 p-3 rounded-lg flex-1">
                                    <div className="text-xs text-gray-500 uppercase font-bold mb-1">Section</div>
                                    <div className="text-white">{event.section}</div>
                                </div>
                            </div>
                            {event.etd && event.eta && (
                                <div className="bg-white/5 p-3 rounded-lg">
                                    <div className="text-xs text-gray-500 uppercase font-bold mb-1">Flight Window</div>
                                    <div className="text-white">ETD {event.etd} — ETA {event.eta}</div>
                                </div>
                            )}
                            {event.personnel && event.personnel.length > 0 && (
                                <div className="bg-white/5 p-3 rounded-lg">
                                    <div className="text-xs text-gray-500 uppercase font-bold mb-1">Personnel ({event.personnel.length})</div>
                                    <div className="text-sm text-gray-300">{event.personnel.join(', ')}</div>
                                </div>
                            )}
                        </div>
                        <button onClick={onClose} className="mt-6 w-full py-2 bg-blue-600 hover:bg-blue-500 text-white rounded-lg transition-colors font-bold">Close</button>
                    </div>
                </div>
            );
        };

        // ─── RAINBOW FILTER MODAL ───

        const RainbowFilterModal = ({ isOpen, onClose, roster, currentSelection, onApply }) => {
            const [search, setSearch] = useState('');
            const [tempSel, setTempSel] = useState(new Set());

            useEffect(() => {
                if (isOpen) { setTempSel(new Set(currentSelection || Object.values(roster).flat())); setSearch(''); }
            }, [isOpen]);

            const filteredRoster = useMemo(() => {
                if (!search) return roster;
                const lower = search.toLowerCase();
                const result = {};
                Object.entries(roster).forEach(([cat, names]) => {
                    const f = names.filter(n => n.toLowerCase().includes(lower));
                    if (f.length > 0) result[cat] = f;
                });
                return result;
            }, [roster, search]);

            const toggle = (name) => { setTempSel(prev => { const n = new Set(prev); if (n.has(name)) n.delete(name); else n.add(name); return n; }); };
            const toggleGroup = (names) => { setTempSel(prev => { const n = new Set(prev); const allIn = names.every(nm => n.has(nm)); names.forEach(nm => allIn ? n.delete(nm) : n.add(nm)); return n; }); };

            if (!isOpen) return null;
            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal-content" onClick={e => e.stopPropagation()}>
                        <div className="flex justify-between items-center mb-3">
                            <h2 className="text-lg font-bold text-white">Filter Personnel</h2>
                            <button onClick={onClose} className="text-gray-500 hover:text-white text-2xl">&times;</button>
                        </div>
                        <input type="text" placeholder="Search names..." value={search} onChange={e => setSearch(e.target.value)}
                            className="w-full bg-gray-800 border border-gray-700 text-white rounded p-2 mb-2 text-sm focus:outline-none focus:border-blue-500" />
                        <div className="flex gap-2 mb-2">
                            <button onClick={() => { const all = Object.values(filteredRoster).flat(); setTempSel(prev => { const n = new Set(prev); all.forEach(nm => n.add(nm)); return n; }); }}
                                className="text-xs bg-gray-700 hover:bg-gray-600 text-white px-2 py-1 rounded">Select All Visible</button>
                            <button onClick={() => { const all = Object.values(filteredRoster).flat(); setTempSel(prev => { const n = new Set(prev); all.forEach(nm => n.delete(nm)); return n; }); }}
                                className="text-xs bg-gray-700 hover:bg-gray-600 text-white px-2 py-1 rounded">Deselect All Visible</button>
                        </div>
                        <div className="rb-filter-modal-body">
                            {Object.entries(filteredRoster).map(([cat, names]) => (
                                <div key={cat}>
                                    <div className="rb-filter-group-header" onClick={() => toggleGroup(names)}>
                                        <div className={`rb-filter-cb ${names.every(n => tempSel.has(n)) ? 'checked' : ''}`}>{names.every(n => tempSel.has(n)) ? '✓' : ''}</div>
                                        <span>{cat} ({names.filter(n => tempSel.has(n)).length}/{names.length})</span>
                                    </div>
                                    {names.map(name => (
                                        <div key={name} className="rb-filter-person-row" onClick={() => toggle(name)}>
                                            <div className={`rb-filter-cb ${tempSel.has(name) ? 'checked' : ''}`}>{tempSel.has(name) ? '✓' : ''}</div>
                                            <span>{name}</span>
                                        </div>
                                    ))}
                                </div>
                            ))}
                            {Object.keys(filteredRoster).length === 0 && <div className="text-gray-500 text-center py-4">No matches found</div>}
                        </div>
                        <div className="flex justify-end gap-2 mt-4">
                            <button onClick={onClose} className="px-4 py-2 text-gray-400 hover:text-white">Cancel</button>
                            <button onClick={() => { onApply(tempSel); onClose(); }} className="px-4 py-2 bg-blue-600 hover:bg-blue-500 text-white rounded font-bold">Apply</button>
                        </div>
                    </div>
                </div>
            );
        };

        // ─── RAINBOW VIEW ───

        const RainbowView = ({ workingEvents, roster, dates }) => {
            const [visibleTypes, setVisibleTypes] = useState(() => new Set(RAINBOW_FILTERS.map(f => f.key)));
            const [modalEvent, setModalEvent] = useState(null);
            const [rbSelection, setRbSelection] = useState(null);
            const [filterOpen, setFilterOpen] = useState(false);
            const [visiblePersonnel, setVisiblePersonnel] = useState(null); // null = show all
            const [selectedCategory, setSelectedCategory] = useState('All');
            const dragRef = useRef(null);
            const scrollRef = useRef(null);

            const toggleType = useCallback((key) => {
                setVisibleTypes(prev => {
                    const next = new Set(prev);
                    if (next.has(key)) next.delete(key); else next.add(key);
                    return next;
                });
            }, []);

            // Build per-person per-date event entries from workingEvents
            const personDateEvents = useMemo(() => {
                const map = new Map();
                workingEvents.forEach(ev => {
                    (ev.personnel || []).forEach(person => {
                        if (!map.has(person)) map.set(person, new Map());
                        const dateMap = map.get(person);
                        if (!dateMap.has(ev.date)) dateMap.set(ev.date, []);
                        dateMap.get(ev.date).push({
                            section: ev.section,
                            title: ev.model ? `${ev.model} ${ev.eventName}` : ev.eventName,
                            shortTitle: ev.model || ev.eventName,
                            start: ev.startTime,
                            end: ev.endTime,
                            etd: ev.etd,
                            eta: ev.eta,
                            personnel: ev.personnel,
                            id: ev.id,
                            cancelled: ev.cancelled || false,
                        });
                    });
                });
                return map;
            }, [workingEvents]);

            // Build sorted personnel list from roster (filtered by visiblePersonnel if set)
            const personnelList = useMemo(() => {
                const list = [];
                ROSTER_ORDER.forEach(cat => {
                    let names = roster[cat] || [];
                    if (visiblePersonnel) names = names.filter(n => visiblePersonnel.has(n));
                    if (names.length > 0) {
                        list.push({ type: 'separator', category: cat });
                        names.forEach(name => list.push({ type: 'person', name, category: cat }));
                    }
                });
                return list;
            }, [roster, visiblePersonnel]);

            // Lane layout for a set of events in one cell
            const layoutEvents = useCallback((events) => {
                if (!events || events.length === 0) return { events: [], laneCount: 0 };
                const sorted = events
                    .map(ev => ({
                        ...ev,
                        startMin: timeToMinutes(ev.start) ?? TIMELINE_START,
                        endMin: timeToMinutes(ev.end) ?? (timeToMinutes(ev.start) ? timeToMinutes(ev.start) + 60 : TIMELINE_END),
                    }))
                    .sort((a, b) => a.startMin - b.startMin);

                const lanes = []; // each lane = array of events
                sorted.forEach(ev => {
                    let placed = false;
                    for (let i = 0; i < lanes.length; i++) {
                        const last = lanes[i][lanes[i].length - 1];
                        if (ev.startMin >= last.endMin) {
                            lanes[i].push(ev);
                            ev.lane = i;
                            placed = true;
                            break;
                        }
                    }
                    if (!placed) {
                        ev.lane = lanes.length;
                        lanes.push([ev]);
                    }
                });
                return { events: sorted, laneCount: lanes.length };
            }, []);

            // Time ruler marks — match Gantt pattern: 6, 9, 12, 15, 18
            const rulerMarks = useMemo(() => {
                return [6, 9, 12, 15, 18].map(h => ({
                    label: String(h),
                    pct: timePct(h * 60),
                }));
            }, []);

            // Hour grid lines for cells (every 3 hours matching ruler)
            const hourLines = useMemo(() => {
                return [9, 12, 15].map(h => timePct(h * 60));
            }, []);

            const colCount = dates.length + 1;

            // Timeline handle: pointer events for single-click marker / drag range
            const pctToMinutes = useCallback((pct) => {
                return Math.round(TIMELINE_START + (pct / 100) * TIMELINE_RANGE);
            }, []);

            // Shared pointer-move/up for timeline handles
            const addRbGlobalListeners = useCallback(() => {
                const onMove = (me) => {
                    if (!dragRef.current) return;
                    const { mode, dateIndex, originTime, initialSelection } = dragRef.current;
                    // Calculate minutes from pointer position relative to the date column
                    const area = scrollRef.current;
                    if (!area) return;
                    const areaRect = area.getBoundingClientRect();
                    const scrollLeft = area.scrollLeft;
                    const colLeft = 161 + dateIndex * (RAINBOW_COL_WIDTH + 1); // px from grid left (+1px per gap)
                    const colVisualLeft = areaRect.left + colLeft - scrollLeft;
                    const xInCol = me.clientX - colVisualLeft;
                    const pct = Math.max(0, Math.min(100, (xInCol / RAINBOW_COL_WIDTH) * 100));
                    const currentTime = pctToMinutes(pct);

                    if (mode === 'create') {
                        if (Math.abs(currentTime - originTime) > 10) {
                            setRbSelection({ type: 'range', dateIndex, start: Math.min(originTime, currentTime), end: Math.max(originTime, currentTime) });
                        } else {
                            setRbSelection({ type: 'marker', dateIndex, start: currentTime, end: currentTime });
                        }
                    } else if (mode === 'drag-marker') {
                        setRbSelection({ ...initialSelection, start: currentTime, end: currentTime });
                    } else if (mode === 'drag-start') {
                        const newStart = Math.min(currentTime, initialSelection.end - 15);
                        setRbSelection({ ...initialSelection, start: newStart });
                    } else if (mode === 'drag-end') {
                        const newEnd = Math.max(currentTime, initialSelection.start + 15);
                        setRbSelection({ ...initialSelection, end: newEnd });
                    }
                };
                const onUp = () => {
                    dragRef.current = null;
                    window.removeEventListener('pointermove', onMove);
                    window.removeEventListener('pointerup', onUp);
                };
                window.addEventListener('pointermove', onMove);
                window.addEventListener('pointerup', onUp);
            }, [pctToMinutes]);

            const handleRulerPointerDown = useCallback((e, dateIndex) => {
                if (e.button !== 0) return;
                const rect = e.currentTarget.getBoundingClientRect();
                const pct = ((e.clientX - rect.left) / rect.width) * 100;
                const mins = pctToMinutes(pct);
                if (rbSelection) { setRbSelection(null); return; }
                dragRef.current = { mode: 'create', dateIndex, originTime: mins };
                setRbSelection({ type: 'marker', dateIndex, start: mins, end: mins });
                addRbGlobalListeners();
            }, [pctToMinutes, rbSelection, addRbGlobalListeners]);

            const handleRbHandleDrag = useCallback((mode, e) => {
                if (e.button !== 0) return;
                e.stopPropagation();
                dragRef.current = { mode, dateIndex: rbSelection.dateIndex, initialSelection: { ...rbSelection } };
                addRbGlobalListeners();
            }, [rbSelection, addRbGlobalListeners]);

            // Escape key clears selection
            useEffect(() => {
                const onKey = (e) => { if (e.key === 'Escape') setRbSelection(null); };
                window.addEventListener('keydown', onKey);
                return () => window.removeEventListener('keydown', onKey);
            }, []);

            // Category dropdown handler (matches Gantt pattern)
            const handleRbCategoryChange = useCallback((e) => {
                const cat = e.target.value;
                setSelectedCategory(cat);
                if (cat === 'All') setVisiblePersonnel(null);
                else if (cat !== 'Custom' && roster[cat]) setVisiblePersonnel(new Set(roster[cat]));
            }, [roster]);

            const handleRbFilterApply = useCallback((newSelection) => {
                setVisiblePersonnel(newSelection);
                setSelectedCategory('Custom');
                setFilterOpen(false);
            }, []);

            return (
                <>
                    <div className="rainbow-toolbar">
                        <span style={{ fontSize: '0.55rem', color: 'rgba(255,255,255,0.4)', fontWeight: 600 }}>FILTERS</span>
                        {RAINBOW_FILTERS.map(f => (
                            <button
                                key={f.key}
                                className={`rainbow-filter-btn ${visibleTypes.has(f.key) ? 'active' : ''}`}
                                style={{ '--filter-color': f.color, '--filter-bg': f.color + '20' }}
                                onClick={() => toggleType(f.key)}
                            >
                                {f.label}
                            </button>
                        ))}
                        <div style={{ marginLeft: 'auto', display: 'flex', gap: 6, alignItems: 'center' }}>
                            {rbSelection && (
