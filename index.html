            const handleSubmit = () => {
                if (!eventName.trim() || !startTime) return;
                onSave(event.id, {
                    eventName: eventName.trim(),
                    model: event.section === 'Flying' ? (model.trim() || null) : event.model,
                    startTime,
                    endTime: endTime || null,
                    ...(event.section === 'Flying' ? { etd: etd || null, eta: eta || null } : {}),
                    notes: notes.trim() || null,
                });
                onClose();
            };

            const inputStyle = { background: '#1e293b', border: '1px solid rgba(255,255,255,0.25)', borderRadius: 6, padding: '6px 10px', color: '#e2e8f0', fontSize: '0.7rem', width: '100%', fontFamily: 'inherit' };
            const lbl = { fontSize: '0.6rem', color: '#9ca3af', display: 'block', marginBottom: 3 };

            const hdr = event.date ? fmtDate(event.date) : null;
            const dateDisplay = hdr ? `${hdr.weekday} ${hdr.day} ${hdr.month}` : event.date;

            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal-content" onClick={e => e.stopPropagation()} style={{ maxWidth: 420 }}>
                        <h2 className="text-lg font-bold text-white mb-4 edit-event-modal-title">Edit Event</h2>
                        <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                            <div>
                                <label style={lbl}>Event Name *</label>
                                <input style={inputStyle} value={eventName} onChange={e => setEventName(e.target.value)} placeholder="Event name" autoFocus />
                            </div>
                            {event.section === 'Flying' && (
                                <div>
                                    <label style={lbl}>Model</label>
                                    <input style={inputStyle} value={model} onChange={e => setModel(e.target.value)} placeholder="e.g. T-38, F-16" />
                                </div>
                            )}
                            <div style={{ display: 'flex', gap: 8 }}>
                                <div style={{ flex: 1 }}>
                                    <label style={lbl}>Section</label>
                                    <div style={{ ...inputStyle, color: 'rgba(255,255,255,0.35)', cursor: 'not-allowed' }}>{event.section}</div>
                                </div>
                                <div style={{ flex: 1 }}>
                                    <label style={lbl}>Date</label>
                                    <div style={{ ...inputStyle, color: 'rgba(255,255,255,0.35)', cursor: 'not-allowed' }}>{dateDisplay}</div>
                                </div>
                            </div>
                            <div style={{ display: 'flex', gap: 8 }}>
                                <div style={{ flex: 1 }}>
                                    <label style={lbl}>Brief (Start) *</label>
                                    <MilitaryTimeInput value={startTime} onChange={setStartTime} style={inputStyle} />
                                </div>
                                <div style={{ flex: 1 }}>
                                    <label style={lbl}>Debrief (End)</label>
                                    <MilitaryTimeInput value={endTime} onChange={setEndTime} style={inputStyle} />
                                </div>
                            </div>
                            {event.section === 'Flying' && (
                                <div style={{ display: 'flex', gap: 8 }}>
                                    <div style={{ flex: 1 }}>
                                        <label style={lbl}>ETD</label>
                                        <MilitaryTimeInput value={etd} onChange={setEtd} style={inputStyle} />
                                    </div>
                                    <div style={{ flex: 1 }}>
                                        <label style={lbl}>ETA</label>
                                        <MilitaryTimeInput value={eta} onChange={setEta} style={inputStyle} />
                                    </div>
                                </div>
                            )}
                            <div>
                                <label style={lbl}>Notes</label>
                                <input style={inputStyle} value={notes} onChange={e => setNotes(e.target.value)} placeholder="Optional notes" />
                            </div>
                        </div>
                        <div style={{ display: 'flex', gap: 8, marginTop: 16 }}>
                            <button
                                onClick={handleSubmit}
                                disabled={!eventName.trim() || !startTime}
                                style={{
                                    flex: 1, padding: '8px 16px', borderRadius: 6, fontWeight: 700, fontSize: '0.7rem', cursor: 'pointer', fontFamily: 'inherit',
                                    background: eventName.trim() ? '#2563eb' : '#374151',
                                    color: eventName.trim() ? 'white' : '#6b7280',
                                    border: 'none',
                                }}
                            >Save Changes</button>
                            <button onClick={onClose} style={{ flex: 1, padding: '8px 16px', background: 'transparent', border: '1px solid rgba(255,255,255,0.15)', borderRadius: 6, color: '#9ca3af', cursor: 'pointer', fontSize: '0.7rem', fontFamily: 'inherit' }}>Cancel</button>
                        </div>
                    </div>
                </div>
            );
        };

        // ─── CONFIRM DELETE MODAL ───

        const ConfirmDeleteModal = ({ event, onCancelEvent, onConfirmDelete, onClose }) => {
            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal-content" onClick={e => e.stopPropagation()} style={{ maxWidth: 420 }}>
                        <h2 className="text-lg font-bold text-white mb-3 confirm-delete-modal-title">Remove Event?</h2>
                        <p style={{ fontSize: '0.7rem', color: '#9ca3af', marginBottom: 8, lineHeight: 1.5 }}>
                            Are you sure you want to remove <strong style={{ color: '#e2e8f0' }}>{event.eventName}</strong> from the schedule?
                        </p>
                        <p style={{ fontSize: '0.65rem', color: '#9ca3af', marginBottom: 20, lineHeight: 1.5 }}>
                            Did you mean to <strong style={{ color: '#fbbf24' }}>cancel (CNX)</strong> it instead? Cancelled events remain visible with a strikethrough.
                        </p>
                        <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                            <button
                                onClick={onCancelEvent}
                                style={{ flex: 1, minWidth: 120, padding: '8px 12px', background: 'rgba(245,158,11,0.15)', border: '1px solid rgba(245,158,11,0.4)', borderRadius: 6, color: '#fbbf24', cursor: 'pointer', fontSize: '0.65rem', fontWeight: 700, fontFamily: 'inherit' }}
                            >CNX Instead</button>
                            <button
                                onClick={onConfirmDelete}
                                style={{ flex: 1, minWidth: 120, padding: '8px 12px', background: 'rgba(239,68,68,0.15)', border: '1px solid rgba(239,68,68,0.4)', borderRadius: 6, color: '#f87171', cursor: 'pointer', fontSize: '0.65rem', fontWeight: 700, fontFamily: 'inherit' }}
                            >Remove Event</button>
                            <button
                                onClick={onClose}
                                style={{ flex: 1, minWidth: 100, padding: '8px 12px', background: 'transparent', border: '1px solid rgba(255,255,255,0.15)', borderRadius: 6, color: '#9ca3af', cursor: 'pointer', fontSize: '0.65rem', fontFamily: 'inherit' }}
                            >Never mind</button>
                        </div>
                    </div>
                </div>
            );
        };

        const CreateEventModal = ({ dates, onClose, onCreate }) => {
            const [eventName, setEventName] = useState('');
            const [section, setSection] = useState('Flying');
            const [model, setModel] = useState('');
            const [date, setDate] = useState(dates[0] || '');
            const [startTime, setStartTime] = useState('08:00');
            const [endTime, setEndTime] = useState('09:00');

            const handleSubmit = () => {
                if (!eventName.trim() || !date || !startTime || !endTime) return;
                onCreate({
                    id: 'custom-' + Date.now() + '-' + Math.random().toString(36).substr(2, 5),
                    section,
                    date,
                    model: section === 'Flying' ? (model.trim() || null) : null,
                    eventName: eventName.trim(),
                    startTime,
                    endTime,
                    etd: null, eta: null,
                    personnel: [],
                    originalPersonnel: [],
                    notes: null,
                    readonly: false,
                    isCustom: true,
                    cancelled: false,
                    effective: false,
                    partiallyEffective: false,
                });
                onClose();
            };

            const inputStyle = { background: '#1e293b', border: '1px solid rgba(255,255,255,0.25)', borderRadius: 6, padding: '6px 10px', color: '#e2e8f0', fontSize: '0.7rem', width: '100%', fontFamily: 'inherit' };
            const selectStyle = { ...inputStyle, appearance: 'auto', WebkitAppearance: 'menulist' };

            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal-content" onClick={e => e.stopPropagation()} style={{ maxWidth: 400 }}>
                        <h2 className="text-lg font-bold text-white mb-4">Create New Event</h2>
                        <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                            <div>
                                <label style={{ fontSize: '0.6rem', color: '#9ca3af', display: 'block', marginBottom: 3 }}>Event Name *</label>
                                <input style={inputStyle} value={eventName} onChange={e => setEventName(e.target.value)} placeholder="e.g. CF-1, SOF, CHECKRIDE" autoFocus />
                            </div>
                            <div style={{ display: 'flex', gap: 10 }}>
                                <div style={{ flex: 1 }}>
                                    <label style={{ fontSize: '0.6rem', color: '#9ca3af', display: 'block', marginBottom: 3 }}>Section</label>
                                    <select style={selectStyle} value={section} onChange={e => setSection(e.target.value)}>
                                        <option value="Supervision">Supervision</option>
                                        <option value="Flying">Flying</option>
                                        <option value="Ground">Ground</option>
                                        <option value="NA">Non-Availability</option>
                                    </select>
                                </div>
                                {section === 'Flying' && (
                                    <div style={{ flex: 1 }}>
                                        <label style={{ fontSize: '0.6rem', color: '#9ca3af', display: 'block', marginBottom: 3 }}>Model</label>
                                        <input style={inputStyle} value={model} onChange={e => setModel(e.target.value)} placeholder="e.g. T-38, F-16" />
                                    </div>
                                )}
                            </div>
                            <div>
                                <label style={{ fontSize: '0.6rem', color: '#9ca3af', display: 'block', marginBottom: 3 }}>Date *</label>
                                <select style={selectStyle} value={date} onChange={e => setDate(e.target.value)}>
                                    {dates.map(d => { const h = fmtDate(d); return <option key={d} value={d}>{h.weekday} {h.day} {h.month} ({d})</option>; })}
                                </select>
                            </div>
                            <div style={{ display: 'flex', gap: 10 }}>
                                <div style={{ flex: 1 }}>
                                    <label style={{ fontSize: '0.6rem', color: '#9ca3af', display: 'block', marginBottom: 3 }}>Start Time *</label>
                                    <MilitaryTimeInput value={startTime} onChange={setStartTime} style={inputStyle} />
                                </div>
                                <div style={{ flex: 1 }}>
                                    <label style={{ fontSize: '0.6rem', color: '#9ca3af', display: 'block', marginBottom: 3 }}>End Time *</label>
                                    <MilitaryTimeInput value={endTime} onChange={setEndTime} style={inputStyle} />
                                </div>
                            </div>
                        </div>
                        <div style={{ display: 'flex', gap: 8, marginTop: 16 }}>
                            <button
                                onClick={handleSubmit}
                                disabled={!eventName.trim() || !date || !startTime || !endTime}
                                style={{
                                    flex: 1, padding: '8px 16px', borderRadius: 6, fontWeight: 700, fontSize: '0.7rem', cursor: 'pointer', fontFamily: 'inherit',
                                    background: eventName.trim() ? '#2563eb' : '#374151',
                                    color: eventName.trim() ? 'white' : '#6b7280',
                                    border: 'none',
                                }}
                            >Create Event</button>
                            <button onClick={onClose} style={{ flex: 1, padding: '8px 16px', background: 'transparent', border: '1px solid rgba(255,255,255,0.15)', borderRadius: 6, color: '#9ca3af', cursor: 'pointer', fontSize: '0.7rem', fontFamily: 'inherit' }}>Cancel</button>
                        </div>
                    </div>
                </div>
            );
        };

        // ─────────────────────── HighlightPicker ──────────────────────────────
        // Contextual popup that appears near a cell when clicked in highlight mode.
        const HighlightPicker = ({ rect, onSelect, onClose }) => {
            const pickerW = 210;
            const pickerH = 32;
            // Position: prefer above the cell, aligned to right edge; clamp to viewport
            const top = Math.max(8, rect.top - pickerH - 6);
            const left = Math.min(rect.right, window.innerWidth - pickerW - 8);

            return ReactDOM.createPortal(
                <div className="wb-picker-popup" style={{ top, left }}>
                    {WB_HIGHLIGHT_COLORS.map(c => (
                        <div key={c.key} className="wb-picker-swatch"
                            style={{ background: c.bg }}
                            title={c.label}
                            onClick={() => onSelect(c.key)} />
                    ))}
                    <div className="wb-picker-divider" />
                    <span className="wb-picker-erase" onClick={() => onSelect(null)}>ERASE</span>
                    <span className="wb-picker-close" onClick={onClose} title="Close &amp; disable highlighting">&#x2715;</span>
                </div>,
                document.body
            );
        };

        // ─────────────────────── WhiteboardCell ───────────────────────────────
        const WhiteboardCell = React.forwardRef(({ value, field, eventId, type, onSave, highlight, highlightMode, onHighlight, readonly, className, onTab, onShiftTab }, cellRef) => {
            const [editing, setEditing] = useState(false);
            const [draft, setDraft] = useState(value || '');
            const inputRef = React.useRef(null);
            const tdRef = React.useRef(null);
            React.useImperativeHandle(cellRef, () => ({
                focus: () => { if (tdRef.current) tdRef.current.click(); },
            }));

            React.useEffect(() => { if (!editing) setDraft(value || ''); }, [value, editing]);
            React.useEffect(() => {
                if (editing && inputRef.current) inputRef.current.focus();
            }, [editing]);

            const commit = () => {
                const trimmed = (draft || '').trim();
                if (type === 'time' && trimmed && !TIME_RE.test(trimmed)) {
                    setDraft(value || ''); // revert invalid time
                    setEditing(false);
                    return;
                }
                setEditing(false);
                if (trimmed !== (value || '').trim()) {
                    onSave(eventId, field, trimmed);
                }
            };

            const handleClick = (e) => {
                if (highlightMode && onHighlight) {
                    const key = `${eventId}:${field}`;
                    onHighlight(key, e.currentTarget.getBoundingClientRect());
                    return;
                }
                if (readonly) return;
                setEditing(true);
            };

            const handleKeyDown = (e) => {
                if (e.key === 'Escape') { setDraft(value || ''); setEditing(false); }
                else if (e.key === 'Enter') { commit(); }
                else if (e.key === 'Tab') {
                    e.preventDefault();
                    commit();
                    if (e.shiftKey && onShiftTab) onShiftTab();
                    else if (!e.shiftKey && onTab) onTab();
                }
            };

            const highlightClass = highlight ? `wb-highlight-${highlight}` : '';
            const cellClass = [
                readonly ? '' : 'wb-cell-editable',
                editing ? 'wb-cell-editing' : '',
                highlightClass,
                className || '',
            ].filter(Boolean).join(' ');

            if (editing && !readonly) {
                if (type === 'time') {
                    const commitTimeDirect = (normalizedValue) => {
                        setEditing(false);
                        const trimmed = (normalizedValue || '').trim();
                        if (trimmed !== (value || '').trim()) onSave(eventId, field, trimmed);
                    };
                    const handleTimeKeyDown = (e) => {
                        if (e.key === 'Escape') { setDraft(value || ''); setEditing(false); }
                        else if (e.key === 'Tab') {
                            e.preventDefault();
                            // Normalize current draft the same way MilitaryTimeInput.handleBlur would
                            let v = (draft || '').trim();
                            let normalized = v;
                            if (v) {
                                let hours, minutes;
                                if (v.includes(':')) { [hours, minutes] = v.split(':'); }
                                else if (v.length <= 2) { hours = v; minutes = '0'; }
                                else { hours = v.slice(0, 2); minutes = v.slice(2); }
                                let h = Math.min(Math.max(parseInt(hours, 10) || 0, 0), 23);
                                let m = Math.min(Math.max(parseInt(minutes || '0', 10) || 0, 0), 59);
                                normalized = String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
                            }
                            commitTimeDirect(normalized);
                            if (e.shiftKey && onShiftTab) onShiftTab();
                            else if (!e.shiftKey && onTab) onTab();
                        }
                    };
                    return (
                        <td ref={tdRef} className={cellClass} onClick={handleClick} onKeyDown={handleTimeKeyDown}>
                            <MilitaryTimeInput value={draft} onChange={setDraft} onBlur={commitTimeDirect}
                                style={{ background: 'transparent', border: 'none', color: 'inherit',
                                         fontFamily: 'inherit', fontSize: 'inherit', width: '100%',
                                         outline: 'none', padding: 0 }} />
                        </td>
                    );
                }
                return (
                    <td ref={tdRef} className={cellClass} onClick={handleClick}>
                        <input ref={inputRef} className="wb-input"
                            type="text"
                            value={draft} onChange={e => setDraft(e.target.value)}
                            onBlur={commit} onKeyDown={handleKeyDown} />
                    </td>
                );
            }
            return <td ref={tdRef} className={cellClass} onClick={handleClick}>{value || ''}</td>;
        });

        // ─────────────────────── WhiteboardCrewCell ───────────────────────────
        const WhiteboardCrewCell = ({ person, eventId, slotIndex, roster, onAdd, onRemove, onFocusEvent,
            highlight, highlightMode, onHighlight, readonly, className: extraClass,
            conflicts, onShowTooltip, onHideTooltip }) => {

            const [dragOver, setDragOver] = useState(false);
            const color = person ? chipColor(person, roster) : null;

            const handleClick = (e) => {
                if (highlightMode && onHighlight) {
                    const key = `${eventId}:crew:${slotIndex}`;
                    onHighlight(key, e.currentTarget.getBoundingClientRect());
                    return;
                }
                if (!readonly && onFocusEvent) onFocusEvent(eventId);
            };

            const handleDragOver = (e) => {
                if (readonly) return;
                e.preventDefault();
                e.dataTransfer.dropEffect = 'copy';
                setDragOver(true);
            };
            const handleDragLeave = () => setDragOver(false);
            const handleDrop = (e) => {
                e.preventDefault();
                setDragOver(false);
                if (readonly) return;
                const raw = e.dataTransfer.getData('text/plain');
                let personName = raw;
                let sourceId = null;
                try {
                    const parsed = JSON.parse(raw);
                    personName = parsed.person || raw;
                    sourceId = parsed.sourceEventId || null;
                } catch(ignored) {}
                if (!personName) return;
                // MOVE: remove from source event before adding to this cell
                if (sourceId && sourceId !== eventId && onRemove) {
                    onRemove(sourceId, personName);
                }
                // Single-person slot: if the cell is already occupied, clear it first
                if (person && person !== personName && onRemove) {
                    onRemove(eventId, person);
                }
                if (onAdd) onAdd(eventId, personName);
            };

            const highlightClass = highlight ? `wb-highlight-${highlight}` : '';
            const cellClass = [
                'wb-crew-cell',
                !person ? 'wb-crew-empty' : '',
                dragOver ? 'wb-crew-drop-active' : '',
                highlightClass,
                extraClass || '',
            ].filter(Boolean).join(' ');

            const style = person && color ? { background: color.bg, color: color.text } : {};

            const hasCon = person && conflicts ? hasConflict(eventId, person, conflicts) : false;
            const conflictText = hasCon ? getConflictText(eventId, person, conflicts) : null;

            return (
                <td className={cellClass} style={style} onClick={handleClick}
                    onDragOver={handleDragOver} onDragLeave={handleDragLeave} onDrop={handleDrop}>
                    {person ? (
                        <span
                            className={hasCon ? 'chip-conflict' : undefined}
                            draggable
                            style={{ cursor: 'grab', display: 'inline-flex', alignItems: 'center', gap: '2px' }}
                            onDragStart={(e) => {
                                e.dataTransfer.setData('text/plain', JSON.stringify({
                                    person,
                                    sourceEventId: eventId,
                                    category: personCat(person, roster) || null,
                                }));
                                e.dataTransfer.effectAllowed = 'copyMove';
                                e.currentTarget.style.opacity = '0.4';
                                e.stopPropagation();
                            }}
                            onDragEnd={(e) => {
                                e.currentTarget.style.opacity = '1';
                            }}
                            onMouseEnter={(e) => {
                                if (hasCon && onShowTooltip) {
                                    onShowTooltip(`Also on:\n${conflictText}`, e.currentTarget.getBoundingClientRect());
                                }
                            }}
                            onMouseLeave={onHideTooltip}>
                            {person}
                            {hasCon && <span className="conflict-icon">!</span>}
                            {!readonly && (
                                <span className="wb-crew-remove"
                                    onClick={(e) => { e.stopPropagation(); if (onHideTooltip) onHideTooltip(); onRemove(eventId, person); }}>
                                    {'\u00D7'}
                                </span>
                            )}
                        </span>
                    ) : '\u00A0'}
                </td>
            );
        };

        // ─────────────────────── PlaceholderChip ────────────────────────────────
        // Renders one placeholder slot inside a crew group.
        // Unfilled: subdued/dashed styling, acts as a drop target.
        // Filled: shows filledBy name at full color (same as a regular crew chip).
        //   Removing a filled person also reverts filledBy → null (handled by handleRemove
        //   in SchedulerView, which maps over placeholders and clears the matching filledBy).

        const PlaceholderChip = ({ placeholder, placeholderIndex, totalOfRole, eventId, roster,
            onRemove, onFill, onRemovePlaceholder, onAddToMission, siblingCandidates = [] }) => {

            const [dragOver, setDragOver] = useState(false);
            const [warning, setWarning] = useState(null);
            // warning: null | { person, cat, siblings: Array<placeholder> }
            const [editing, setEditing] = React.useState(false);
            const [editValue, setEditValue] = React.useState('');

            const { id, role, filledBy } = placeholder;

            // Label: "IP Placeholder" or numbered "IP Placeholder 1" when multiples exist
            const label = totalOfRole > 1
                ? `${role} Placeholder ${placeholderIndex + 1}`
                : `${role} Placeholder`;

            // Compute role color — used for unfilled styling and as fallback for guest names
            const roleColor = getPlaceholderRoleColor(role);

            // ── Filled state ──────────────────────────────────────────────────────
            // Render like a normal crew chip — removing it will revert the placeholder
            // because handleRemove in SchedulerView now clears filledBy on person remove.
            if (filledBy) {
                // Real roster members use their category color; guest names use the role color
                const inRoster = !!personCat(filledBy, roster);
                const chipCol = inRoster ? (chipColor(filledBy, roster) || roleColor) : roleColor;
                const style = { background: chipCol.bg, color: chipCol.text };
                return (
                    <span className="wb-crew-chip" style={style}>
                        {filledBy}
                        {onRemove && (
                            <span className="wb-crew-remove"
                                onClick={(e) => { e.stopPropagation(); onRemove(eventId, filledBy); }}>
                                {'\u00D7'}
                            </span>
                        )}
                    </span>
                );
            }

            // ── Unfilled state ────────────────────────────────────────────────────
            // Map role to CATEGORY_COLORS key: 'IP' → 'Staff IP', 'IFTE/ICSO' → 'Staff IFTE/ICSO',
            // others match directly. Generic falls back to GENERIC_PUCK_COLOR.
            // (roleColor already computed above)
            const canRenameThis = RENAMEABLE_PH_ROLES.has(role);
            const chipStyle = role === 'Generic'
                ? {
                    color: '#e2e8f0',
                    borderColor: 'rgba(248,250,252,0.35)',
                    background: 'rgba(248,250,252,0.08)',
                }
                : {
                    color: roleColor.text,
                    borderColor: roleColor.bg,
                    background: `${roleColor.bg}22`, // very transparent tint
                };

            const handleDragOver = (e) => {
                e.preventDefault();
                e.stopPropagation(); // prevent the parent <td> from also highlighting
                setDragOver(true);
            };
            const handleDragLeave = () => setDragOver(false);

            const handleDrop = (e) => {
                e.preventDefault();
                e.stopPropagation(); // prevent parent WhiteboardCrewGroup from also processing this drop
                setDragOver(false);
                setWarning(null);

                const raw = e.dataTransfer.getData('text/plain');
                let personName = raw;
                let droppedCat = null;
                try {
                    const parsed = JSON.parse(raw);
                    personName = parsed.person || raw;
                    droppedCat = parsed.category || null;
                } catch (ignored) {}

                if (!personName) return;

                // Look up category from roster if not in drag payload
                const cat = droppedCat || personCat(personName, roster);

                if (canFillPlaceholder(role, cat)) {
                    // Compatible — fill the placeholder AND add to crew (onFill handles both)
                    if (onFill) onFill(id, personName);
                } else {
                    // Incompatible with THIS placeholder — show warning
                    const compatSiblings = siblingCandidates.filter(s => canFillPlaceholder(s.role, cat));
                    setWarning({ person: personName, cat, siblings: compatSiblings });
                }
            };

            return (
                <span style={{ position: 'relative', display: 'inline-flex', alignItems: 'center' }}>
                    <span
                        className={`wb-placeholder-chip ${role === 'Generic' ? 'wb-placeholder-generic' : ''} ${dragOver ? 'drag-over' : ''}`}
                        style={chipStyle}
                        onDragOver={handleDragOver}
                        onDragLeave={handleDragLeave}
                        onDrop={handleDrop}
                    >
                        {editing ? (
                            <input
                                autoFocus
                                value={editValue}
                                onChange={e => setEditValue(e.target.value)}
                                onKeyDown={e => {
                                    if (e.key === 'Enter') {
                                        const v = editValue.trim();
                                        if (v) { onFill(id, v); }
                                        setEditing(false);
                                        e.stopPropagation();
                                    }
                                    if (e.key === 'Escape') { setEditing(false); e.stopPropagation(); }
                                }}
                                onBlur={() => {
                                    const v = editValue.trim();
                                    if (v) { onFill(id, v); }
                                    setEditing(false);
                                }}
                                onClick={e => e.stopPropagation()}
                                style={{
                                    width: '80px',
                                    background: 'transparent',
                                    border: 'none',
                                    outline: 'none',
                                    color: 'inherit',
                                    font: 'inherit',
                                    padding: 0,
                                }}
                            />
                        ) : (
                            <span
                                onClick={canRenameThis ? (e) => {
                                    e.stopPropagation();
                                    setEditValue('');
                                    setEditing(true);
                                } : undefined}
                                style={canRenameThis ? { cursor: 'text' } : undefined}
                            >
                                {label}
                            </span>
                        )}
                        {onRemovePlaceholder && (
                            <span className="wb-crew-remove"
                                onClick={(e) => { e.stopPropagation(); onRemovePlaceholder(eventId, id); }}>
                                {'\u00D7'}
                            </span>
                        )}
                    </span>
                    {warning && (
                        <div className="wb-placeholder-warn" onClick={e => e.stopPropagation()}>
                            {warning.siblings && warning.siblings.length > 0 ? (
                                <>
                                    <span>{`"${warning.person}" can't fill ${label}`}</span>
                                    <span style={{ fontSize: '0.5rem', opacity: 0.7 }}>
                                        {`Did you mean: ${warning.siblings.map(s => `${s.role} Placeholder`).join(', ')}?`}
                                    </span>
                                    <div className="wb-placeholder-warn-btns">
                                        {warning.siblings.map(sib => (
                                            <button key={sib.id} className="wb-placeholder-warn-btn"
                                                onClick={() => {
                                                    if (onFill) onFill(sib.id, warning.person);
                                                    setWarning(null);
                                                }}>
                                                {`Yes — fill ${sib.role}`}
                                            </button>
                                        ))}
                                        <button className="wb-placeholder-warn-btn"
                                            onClick={() => {
                                                if (onAddToMission) onAddToMission(eventId, warning.person);
                                                setWarning(null);
                                            }}>
                                            Add to mission
                                        </button>
                                        <button className="wb-placeholder-warn-btn"
                                            onClick={() => setWarning(null)}>
                                            Cancel
                                        </button>
                                    </div>
                                </>
                            ) : (
                                <>
                                    <span>{`"${warning.person}" isn't a valid ${role}`}</span>
                                    <div className="wb-placeholder-warn-btns">
                                        <button className="wb-placeholder-warn-btn"
                                            onClick={() => {
                                                if (onAddToMission) onAddToMission(eventId, warning.person);
                                                setWarning(null);
                                            }}>
                                            Add to mission
                                        </button>
                                        <button className="wb-placeholder-warn-btn"
                                            onClick={() => setWarning(null)}>
                                            Cancel
                                        </button>
                                    </div>
                                </>
                            )}
                        </div>
                    )}
                </span>
            );
        };

        // ─────────────────────── WhiteboardCrewGroup ──────────────────────────
        // Renders all crew members + placeholders in a single <td> with flex-wrap,
        // plus a + button to add placeholder slots.
        const WhiteboardCrewGroup = ({ crew, placeholders, eventId, roster, onAdd, onRemove,
            onAddPlaceholder, onRemovePlaceholder, onFillPlaceholder,
            onFocusEvent, colSpan, highlights, highlightMode, onHighlight,
            conflicts, onShowTooltip, onHideTooltip }) => {

            const [dragOver, setDragOver] = useState(false);
            const [addMenuOpen, setAddMenuOpen] = useState(false);
            // pendingFill: null | { person: string, matches: Array<{id,role,_idx}> }
            // Shown as inline prompt on a newly-dropped crew chip when unfilled matching placeholders exist.
            const [pendingFill, setPendingFill] = useState(null);
            const addBtnRef = React.useRef(null);

            // Close the add-placeholder popover when the user clicks outside it
            React.useEffect(() => {
                if (!addMenuOpen) return;
                const handler = (e) => {
                    if (addBtnRef.current && !addBtnRef.current.contains(e.target)) {
                        setAddMenuOpen(false);
                    }
                };
                document.addEventListener('pointerdown', handler);
                return () => document.removeEventListener('pointerdown', handler);
            }, [addMenuOpen]);

            // Assign _idx per role for numbering in the fill prompt labels
            // (PlaceholderChip computes its own numbering from placeholderIndex/totalOfRole props)
            const roleCount = {};
            const phWithIdx = (placeholders || []).map(ph => {
                if (roleCount[ph.role] === undefined) roleCount[ph.role] = 0;
                return { ...ph, _idx: roleCount[ph.role]++ };
            });

            const handleDragOver = (e) => {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'copy';
                setDragOver(true);
            };
            const handleDragLeave = () => setDragOver(false);

            const handleDrop = (e) => {
                e.preventDefault();
                setDragOver(false);
                const raw = e.dataTransfer.getData('text/plain');
                let personName = raw;
                let droppedCat = null;
                let isBlankPuck = false;
                let isDefaultLabel = false;
                let role = null;
                let sourceEventId = null;
                try {
                    const parsed = JSON.parse(raw);
                    personName = parsed.person || raw;
                    droppedCat = parsed.category || null;
                    isBlankPuck = !!parsed.isBlankPuck;
                    isDefaultLabel = !!parsed.isDefaultLabel;
                    role = parsed.role || null;
                    sourceEventId = parsed.sourceEventId || null;
                } catch (ignored) {}

                if (!personName) return;

                // Blank puck dragged with its default label → create an unfilled placeholder slot
                if (isBlankPuck && isDefaultLabel && role && onAddPlaceholder) {
                    onAddPlaceholder(eventId, role);
                    return;
                }

                // Renamed blank puck → create a filled placeholder (preserves role color)
                if (isBlankPuck && !isDefaultLabel && role && onAddPlaceholder) {
                    onAddPlaceholder(eventId, role, personName);
                    return;
                }

                // MOVE: if dragged from another event, remove from source first
                if (sourceEventId && sourceEventId !== eventId && onRemove) {
                    onRemove(sourceEventId, personName);
                }

                // Named person from picker → add to crew (skip if already present)
                if (!crew.includes(personName) && onAdd) onAdd(eventId, personName);

                // Check for matching unfilled placeholders → show indirect fill prompt
                if (placeholders && placeholders.length > 0 && onFillPlaceholder) {
                    const cat = droppedCat || personCat(personName, roster);
                    const matches = phWithIdx.filter(p => !p.filledBy && canFillPlaceholder(p.role, cat));
                    if (matches.length > 0) {
                        setPendingFill({ person: personName, matches });
                    }
                }
            };

            const highlightClass = (highlights && highlights[`${eventId}:crew`])
                ? `wb-highlight-${highlights[`${eventId}:crew`]}`
                : '';
            const handleCellClick = (e) => {
                if (highlightMode && onHighlight) {
                    onHighlight(`${eventId}:crew`, e.currentTarget.getBoundingClientRect());
                    return;
                }
                if (onFocusEvent) onFocusEvent(eventId);
            };

            // Names already shown as filled placeholders — exclude from crew chip rendering
            const filledBySet = new Set((placeholders || []).map(p => p.filledBy).filter(Boolean));

            return (
                <td className={`wb-crew-group ${highlightClass} ${dragOver ? 'wb-crew-drop-active' : ''}`}
                    colSpan={colSpan} onClick={handleCellClick}
                    onDragOver={handleDragOver} onDragLeave={handleDragLeave} onDrop={handleDrop}>
                    <div className="wb-crew-group-inner">

                        {/* Real crew chips — filter out anyone already shown as a filled placeholder */}
                        {crew.filter(person => !filledBySet.has(person)).map((person, i) => {
                            const color = person ? chipColor(person, roster) : null;
                            const style = color ? { background: color.bg, color: color.text } : {};
                            const isPending = pendingFill && pendingFill.person === person;
                            const hasCon = person && conflicts ? hasConflict(eventId, person, conflicts) : false;
                            const conflictText = hasCon ? getConflictText(eventId, person, conflicts) : null;
                            return (
                                <span key={i} style={{ position: 'relative', display: 'inline-flex', alignItems: 'center' }}>
                                    <span className={`wb-crew-chip${hasCon ? ' chip-conflict' : ''}`} style={style}
                                        draggable
                                        onDragStart={(e) => {
                                            e.dataTransfer.setData('text/plain', JSON.stringify({
                                                person,
                                                sourceEventId: eventId,
                                                category: personCat(person, roster) || null,
                                            }));
                                            e.dataTransfer.effectAllowed = 'copyMove';
                                            e.currentTarget.style.opacity = '0.4';
                                            e.stopPropagation();
                                        }}
                                        onDragEnd={(e) => {
                                            e.currentTarget.style.opacity = '1';
                                        }}
                                        onMouseEnter={(e) => {
                                            if (hasCon && onShowTooltip) {
                                                onShowTooltip(`Also on:\n${conflictText}`, e.currentTarget.getBoundingClientRect());
                                            }
                                        }}
                                        onMouseLeave={onHideTooltip}>
                                        {person}
                                        {hasCon && <span className="conflict-icon">!</span>}
                                        {onRemove && (
                                            <span className="wb-crew-remove"
                                                onClick={(e) => { e.stopPropagation(); if (onHideTooltip) onHideTooltip(); onRemove(eventId, person); }}>
                                                {'\u00D7'}
                                            </span>
                                        )}
                                    </span>
                                    {isPending && (
                                        <div className="wb-fill-prompt" onClick={e => e.stopPropagation()}>
                                            {pendingFill.matches.length === 1 ? (
                                                <span>{`Fill ${pendingFill.matches[0].role} slot?`}</span>
                                            ) : (
                                                <span>Fill which slot?</span>
                                            )}
                                            <div className="wb-fill-prompt-btns">
                                                {pendingFill.matches.map(ph => (
                                                    <button key={ph.id} className="wb-fill-prompt-btn"
                                                        onClick={() => {
                                                            if (onFillPlaceholder) onFillPlaceholder(eventId, ph.id, person);
                                                            setPendingFill(null);
                                                        }}>
                                                        {roleCount[ph.role] > 1
                                                            ? `${ph.role} ${ph._idx + 1}`
                                                            : ph.role}
                                                    </button>
                                                ))}
                                                <button className="wb-fill-prompt-btn"
                                                    onClick={() => setPendingFill(null)}>
                                                    ✗
                                                </button>
                                            </div>
                                        </div>
                                    )}
                                </span>
                            );
                        })}

                        {/* Placeholder chips */}
                        {phWithIdx.map(ph => {
                            // Sibling candidates: all other unfilled placeholders in this event
                            // (PlaceholderChip will filter by canFillPlaceholder at drop time)
                            const siblings = phWithIdx.filter(s => s.id !== ph.id && !s.filledBy);
                            return (
                                <PlaceholderChip
                                    key={ph.id}
                                    placeholder={ph}
                                    placeholderIndex={ph._idx}
                                    totalOfRole={roleCount[ph.role] || 1}
                                    eventId={eventId}
                                    roster={roster}
                                    onRemove={onRemove}
                                    onFill={(phId, person) => {
                                        // Fill the placeholder AND add person to personnel[]
                                        if (onFillPlaceholder) onFillPlaceholder(eventId, phId, person);
                                        if (onAdd) onAdd(eventId, person);
                                    }}
                                    onRemovePlaceholder={onRemovePlaceholder}
                                    onAddToMission={onAdd}
                                    siblingCandidates={siblings}
                                />
                            );
                        })}

                        {/* + button to add a placeholder slot */}
                        <span className="wb-crew-add-btn" ref={addBtnRef}
                            onClick={(e) => { e.stopPropagation(); setAddMenuOpen(o => !o); }}>
                            +
                            {addMenuOpen && (
                                <div className="wb-add-ph-popover" onClick={e => e.stopPropagation()}>
                                    {PLACEHOLDER_ROLE_OPTIONS.map(opt => {
                                        const color = opt.colorCat
                                            ? (CATEGORY_COLORS[opt.colorCat] || DEFAULT_CHIP)
                                            : GENERIC_PUCK_COLOR;
                                        return (
                                            <div key={opt.role} className="wb-add-ph-option"
                                                onClick={() => {
                                                    if (onAddPlaceholder) onAddPlaceholder(eventId, opt.role);
                                                    setAddMenuOpen(false);
                                                }}>
                                                <span className="wb-add-ph-dot" style={{ background: color.bg }} />
                                                {opt.role}
                                            </div>
                                        );
                                    })}
                                </div>
                            )}
                        </span>

                    </div>
                </td>
            );
        };

        const wbRowClass = (ev) => {
            if (ev.effective) return 'wb-row-effective';
            if (ev.partiallyEffective) return 'wb-row-partial';
            if (ev.cancelled) return 'wb-row-cancelled';
            return '';
        };

        // ─────────────── PendingTimeInput (used by WhiteboardSupervision) ────────
        // Lightweight input for pending supervision slot times.
        // Manages its own draft to avoid per-keystroke parent state updates.
        // onCommit(value) fires once on blur or Enter with the trimmed value.
        const PendingTimeInput = ({ value, amber, placeholder, onCommit }) => {
            const [draft, setDraft] = React.useState(value || '');
            const inputRef = React.useRef(null);

            // Keep draft in sync when value is reset from parent (e.g. day change clears pendingSlots)
            React.useEffect(() => { setDraft(value || ''); }, [value]);

            const commit = () => {
                onCommit(draft.trim());
            };

            const handleKeyDown = (e) => {
                if (e.key === 'Enter') { e.preventDefault(); commit(); if (inputRef.current) inputRef.current.blur(); }
                else if (e.key === 'Escape') { setDraft(value || ''); if (inputRef.current) inputRef.current.blur(); }
                // Tab: commit happens on subsequent blur; natural Tab navigation continues
            };

            const cls = [
                'wb-pending-time-input',
                amber ? 'wb-pending-time-amber' : '',
            ].filter(Boolean).join(' ');

            return (
                <input ref={inputRef}
                    type="text"
                    className={cls}
                    value={draft}
                    placeholder={placeholder || 'HH:MM'}
                    maxLength={5}
                    onChange={(e) => setDraft(e.target.value)}
                    onBlur={commit}
                    onKeyDown={handleKeyDown}
                    onClick={(e) => e.stopPropagation()}
                />
            );
        };

        // ─────────────────────── WhiteboardSupervision ────────────────────────
        const WhiteboardSupervision = ({ events, roster, onEditSave, onAdd, onRemove, onFocusEvent,
            focusedEventId, highlights, highlightMode, onHighlight, onCreateEvent, onDeleteCustom, activeDay,
            conflicts, onShowTooltip, onHideTooltip, onDeleteEvent }) => {
            const byDuty = useMemo(() => {
                const map = {};
                SUPV_DUTY_ORDER.forEach(d => { map[d] = []; });
                events.forEach(ev => {
                    const duty = (ev.eventName || '').trim();
                    const key = SUPV_DUTY_ORDER.find(d => duty.toUpperCase() === d.toUpperCase())
                        || SUPV_DUTY_ORDER.find(d => duty.toUpperCase().includes(d.toUpperCase()))
                        || duty
                        || 'Unnamed Duty';
                    if (!map[key]) map[key] = [];
                    map[key].push(ev);
                });
                Object.values(map).forEach(arr => arr.sort((a, b) => (a.startTime || '').localeCompare(b.startTime || '')));
                return map;
            }, [events]);

            const handleCellSave = useCallback((eventId, field, value) => {
                if (onEditSave) onEditSave(eventId, { [field]: value || null });
            }, [onEditSave]);

            const maxTriplets = 4;

            // ── Pending slot state ──────────────────────────────────────────────
            // Shape: { [dutyKey + '_' + slotIndex]: { startTime: '', endTime: '', poc: null } }
            // Pure UI state — not persisted, not in workingEvents. Cleared on day change.
            const [pendingSlots, setPendingSlots] = useState({});
            // Track which POC drop targets are currently being dragged over
            const [pocDragOver, setPocDragOver] = useState({});
            // ── Add-supervision-event modal state (T5) ─────────────────────────
            const [showAddSupvModal, setShowAddSupvModal] = useState(false);
            const [addSupvDutyName, setAddSupvDutyName] = useState('');
            const addSupvInputRef = React.useRef(null);
            // Close modal when clicking outside it
            React.useEffect(() => {
                if (!showAddSupvModal) return;
                const handleDown = (e) => {
                    if (!e.target.closest('.wb-add-supv-modal') && !e.target.closest('.wb-add-row')) {
                        setShowAddSupvModal(false);
                        setAddSupvDutyName('');
                    }
                };
                document.addEventListener('pointerdown', handleDown);
                return () => document.removeEventListener('pointerdown', handleDown);
            }, [showAddSupvModal]);

            // Clear pending slot state when the active day changes
            React.useEffect(() => {
                setPendingSlots({});
                setPocDragOver({});
            }, [activeDay]);

            // Helper: update one field in one pending slot
            const updatePending = useCallback((slotKey, field, value) => {
                setPendingSlots(prev => ({
                    ...prev,
                    [slotKey]: { startTime: '', endTime: '', poc: null, ...(prev[slotKey] || {}), [field]: value },
                }));
            }, []);


            return (
                <React.Fragment>
                    <table className="wb-table wb-table-compact">
                        <colgroup>
                            <col style={{ width: '7.5%' }} />
                            {Array.from({ length: maxTriplets }, (_, i) => (
                                <React.Fragment key={i}>
                                    <col style={{ width: '6%' }} />
                                    <col style={{ width: '4.5%' }} />
                                    <col style={{ width: '4.5%' }} />
                                    <col style={{ width: 14 }} />{/* Per-triplet delete (T6) */}
                                </React.Fragment>
                            ))}
                            <col />{/* Notes — remaining (expanded) */}
                        </colgroup>
                        <thead>
                            <tr>
                                <th>Duty</th>
                                {Array.from({ length: maxTriplets }, (_, i) => (
                                    <React.Fragment key={i}>
                                        <th className="wb-supv-group-start">POC</th>
                                        <th>Start</th>
                                        <th>End</th>
                                        <th></th>{/* delete col */}
                                    </React.Fragment>
                                ))}
                                <th className="wb-supv-group-start">Notes</th>
                            </tr>
                        </thead>
                        <tbody>
                            {(() => {
                                // Shared row renderer — used for both fixed-order and dynamic rows
                                const renderRow = (duty) => {
                                    const evts = byDuty[duty] || [];
                                    const rowEvId = evts[0]?.id || null;
                                    const rowFocusClass = focusedEventId && rowEvId
                                        ? (evts.some(ev => ev.id === focusedEventId) ? 'wb-row-focused' : 'wb-row-dimmed')
                                        : '';
                                    return (
                                        <tr key={duty} className={rowFocusClass || undefined}
                                            style={{ cursor: 'pointer' }}
                                            onClick={(e) => {
                                                const tag = e.target.tagName;
                                                if (tag === 'BUTTON' || tag === 'INPUT' || tag === 'LABEL' || tag === 'SELECT') return;
                                                if (e.target.closest('.wb-crew-chip') || e.target.closest('.wb-remove-btn') ||
                                                    e.target.closest('.wb-checkbox') || e.target.closest('.placeholder-chip') ||
                                                    e.target.closest('.wb-add-btn') || e.target.closest('.wb-delete-btn')) return;
                                                if (e.target.closest('.wb-pending-poc-cell') || e.target.closest('.wb-pending-time-td')) return;
                                                if (!rowEvId) return;
                                                if (onFocusEvent) onFocusEvent(evts.some(ev => ev.id === focusedEventId) ? null : rowEvId);
                                            }}>
                                            <td style={{ fontWeight: 600, whiteSpace: 'nowrap', fontSize: '0.6rem' }}>{duty}</td>
                                            {Array.from({ length: maxTriplets }, (_, i) => {
                                                const ev = evts[i];
                                                if (ev) {
                                                    // Occupied triplet — existing event with per-triplet delete (T6)
                                                    const handleTripletDelete = (e) => {
                                                        e.stopPropagation();
                                                        if (ev.isCustom && onDeleteCustom) {
                                                            onDeleteCustom(ev.id);
                                                        } else if (!ev.isCustom && onDeleteEvent) {
                                                            onDeleteEvent(ev);
                                                        }
                                                    };
                                                    return (
                                                        <React.Fragment key={i}>
                                                            <WhiteboardCrewCell person={ev.personnel[0] || null}
                                                                eventId={ev.id} slotIndex={0} roster={roster}
                                                                onAdd={onAdd} onRemove={onRemove} onFocusEvent={onFocusEvent}
                                                                highlight={highlights ? highlights[`${ev.id}:crew:0`] : null}
                                                                highlightMode={highlightMode}
                                                                onHighlight={onHighlight}
                                                                className="wb-supv-group-start"
                                                                conflicts={conflicts}

                                                                onHideTooltip={onHideTooltip} />

                                                                onSave={handleCellSave}

                                                                highlightMode={highlightMode}
                                                                onHighlight={onHighlight} />

                                                                onSave={handleCellSave}
                                                                highlight={highlights ? highlights[`${ev.id}:endTime`] : null}

                                                                onHighlight={onHighlight} />
                                                            <td className="wb-supv-triplet-del-cell">

                                                                    onClick={handleTripletDelete}

                                                            </td>
                                                        </React.Fragment>
                                                    );
                                                }

                                                // ── Empty triplet slot — editable pending state ──────────────
                                                const slotKey = `${duty}_${i}`;
                                                const slot = pendingSlots[slotKey] || { startTime: '', endTime: '', poc: null };
                                                const stVal = slot.startTime || '';
                                                const etVal = slot.endTime   || '';
                                                // Amber highlighting rules:
                                                // 1. A time field is empty and the OTHER time field has any content
                                                // 2. A time field has content but it fails TIME_RE (invalid format)
                                                // A stored POC alone does NOT trigger amber on times.
                                                const stOk = !!(stVal && TIME_RE.test(stVal));
                                                const etOk = !!(etVal && TIME_RE.test(etVal));
                                                const anyTimeContent = !!(stVal || etVal);
                                                const stAmber = !!(anyTimeContent && !stOk);
                                                const etAmber = !!(anyTimeContent && !etOk);

                                                // POC cell drop handlers
                                                const handlePocDragOver = (e) => {
                                                    e.preventDefault();
                                                    e.dataTransfer.dropEffect = 'copy';
                                                    setPocDragOver(prev => ({ ...prev, [slotKey]: true }));
                                                };
                                                const handlePocDragLeave = () => {
                                                    setPocDragOver(prev => ({ ...prev, [slotKey]: false }));
                                                };
                                                const handlePocDrop = (e) => {
                                                    e.preventDefault();
                                                    setPocDragOver(prev => ({ ...prev, [slotKey]: false }));
                                                    const raw = e.dataTransfer.getData('text/plain');
                                                    if (!raw) return;
                                                    let personName = raw;
                                                    let sourceId = null;
                                                    try {
                                                        const parsed = JSON.parse(raw);
                                                        if (parsed.isBlankPuck) return;
                                                        personName = parsed.person || raw;
                                                        sourceId = parsed.sourceEventId || null;
                                                    } catch(ignored) {}
                                                    if (!personName) return;
                                                    // Build the current slot state with the new POC
                                                    const updatedSlot = { startTime: '', endTime: '', poc: null, ...slot, poc: personName };
                                                    // If both times are already present + valid → create event immediately
                                                    const st = (updatedSlot.startTime || '').trim();
                                                    const et = (updatedSlot.endTime   || '').trim();
                                                    if (st && et && TIME_RE.test(st) && TIME_RE.test(et)) {

                                                            if (sourceId && onRemove) onRemove(sourceId, personName);

                                                                eventName: duty,
                                                                startTime: st,
                                                                endTime:   et,
                                                                personnel,
                                                                originalPersonnel: [...personnel],
                                                            });
                                                            setPendingSlots(prev => {
                                                                const next = { ...prev };
                                                                delete next[slotKey];
                                                                return next;
                                                            });
                                                        }
                                                    } else {
                                                        // Times not yet set — store poc for later; if person came from source event, do NOT remove yet
                                                        setPendingSlots(prev => ({
                                                            ...prev,
                                                            [slotKey]: { ...updatedSlot, pocSourceId: sourceId },
                                                        }));
                                                    }
                                                };

                                                // Time input commit handler — checks if both times now present
                                                const handleTimeCommit = (field, rawValue) => {
                                                    const trimmed = rawValue.trim();
                                                    const updatedSlot = {
                                                        startTime: '', endTime: '', poc: null,
                                                        ...slot,
                                                        [field]: trimmed,
                                                    };

                                                        setPendingSlots(prev => ({
                                                            ...prev,
                                                            [slotKey]: updatedSlot,
                                                        }));
                                                        return;
                                                    }
                                                    // Save the new value first
                                                    setPendingSlots(prev => ({
                                                        ...prev,
                                                        [slotKey]: updatedSlot,
                                                    }));
                                                    // Then attempt creation if both times are now set + valid
                                                    const st = (updatedSlot.startTime || '').trim();
                                                    const et = (updatedSlot.endTime   || '').trim();

                                                        if (onCreateEvent) {
                                                            // If the POC was dragged from an existing event, remove them from source now
                                                            if (updatedSlot.pocSourceId && updatedSlot.poc && onRemove) {
                                                                onRemove(updatedSlot.pocSourceId, updatedSlot.poc);
                                                            }

                                                                eventName: duty,
                                                                startTime: st,
                                                                endTime:   et,
                                                                personnel,
                                                                originalPersonnel: [...personnel],
                                                            });
                                                            setPendingSlots(prev => {
                                                                const next = { ...prev };
                                                                delete next[slotKey];
                                                                return next;
                                                            });
                                                        }
                                                    }
                                                };

                                                return (
                                                    <React.Fragment key={i}>
                                                        {/* Empty POC cell — drop target */}

                                                            onDragLeave={handlePocDragLeave}
                                                            onDrop={handlePocDrop}>
                                                            {slot.poc ? (
                                                                <span className="wb-pending-poc-stored"

                                                                        background: chipColor(slot.poc, roster).bg,

                                                                    <span className="wb-pending-poc-remove"

                                                                            e.stopPropagation();
                                                                            updatePending(slotKey, 'poc', null);
                                                                        }}

                                                                </span>
                                                            ) : (
                                                                <span className={[
                                                                    'wb-pending-poc-drop',
                                                                    pocDragOver[slotKey] ? 'wb-pending-poc-dragover' : '',
                                                                ].filter(Boolean).join(' ')}
                                                                    title="Drop a person here to set as POC">
                                                                    +
                                                                </span>
                                                            )}
                                                        </td>
                                                        {/* Pending Start time input */}
                                                        <td className="wb-pending-time-td">
                                                            <PendingTimeInput
                                                                value={stVal}
                                                                amber={stAmber}
                                                                placeholder="Start"
                                                                onCommit={(v) => handleTimeCommit('startTime', v)}
                                                            />
                                                        </td>
                                                        {/* Pending End time input */}
                                                        <td className="wb-pending-time-td">
                                                            <PendingTimeInput
                                                                value={etVal}
                                                                amber={etAmber}
                                                                placeholder="End"
                                                                onCommit={(v) => handleTimeCommit('endTime', v)}
                                                            />
                                                        </td>
                                                        {/* Empty delete cell — pending slot has no event to delete yet */}
                                                        <td className="wb-supv-triplet-del-cell"></td>
                                                    </React.Fragment>
                                                );
                                            })}
                                            <WhiteboardCell value={evts[0]?.notes || ''} field="notes"
                                                eventId={evts[0]?.id} type="text" onSave={handleCellSave}
                                                highlight={highlights && evts[0] ? highlights[`${evts[0].id}:notes`] : null}
                                                highlightMode={highlightMode}
                                                onHighlight={onHighlight}
                                                className="wb-supv-group-start" />
                                        </tr>
                                    );
                                };
                                // Fixed rows in canonical SUPV_DUTY_ORDER
                                const fixedRows = SUPV_DUTY_ORDER.map(duty => renderRow(duty));
                                // Dynamic rows: duty keys not in SUPV_DUTY_ORDER (custom/unrecognized duties)
                                // Rendered in insertion order (Object.keys preserves insertion order in V8)
                                const dynamicKeys = Object.keys(byDuty).filter(k => !SUPV_DUTY_ORDER.includes(k));
                                const dynamicRows = dynamicKeys.map(duty => renderRow(duty));
                                return [...fixedRows, ...dynamicRows];
                            })()}
                        </tbody>
                    </table>
                    {onCreateEvent && (
                        <div className="wb-add-supv-modal-wrap">
                            {showAddSupvModal && (
                                <div className="wb-add-supv-modal" onClick={e => e.stopPropagation()}>

                                            Create

                            <button className="wb-add-row" onClick={() => {

        // ─────────────────────────── WhiteboardFlying ─────────────────────────
        const WhiteboardFlying = ({ events, roster, conflicts, onEditSave, onStatusChange,

                                            conflicts={conflicts}
                                            onShowTooltip={onShowTooltip}
                                            onHideTooltip={onHideTooltip} />
                                        <WhiteboardCell {...makeTab(3)} value={ev.notes} field="notes" eventId={ev.id} type="text"
                                            onSave={handleCellSave} highlight={highlights[`${ev.id}:notes`]}
                                            highlightMode={highlightMode} onHighlight={onHighlight} />
                                        <td style={{ textAlign: 'center' }}>
                                            <input type="checkbox" className="wb-checkbox wb-checkbox-eff"
                                                checked={!!ev.effective} onChange={() => onStatusChange(ev.id, 'effective')} />
                                        </td>
                                        <td style={{ textAlign: 'center' }}>
                                            <input type="checkbox" className="wb-checkbox wb-checkbox-cx"
                                                checked={!!ev.cancelled} onChange={() => onStatusChange(ev.id, 'cancelled')} />
                                        </td>
                                        <td style={{ textAlign: 'center' }}>
                                            <input type="checkbox" className="wb-checkbox wb-checkbox-pe"
