                                                checked={!!ev.partiallyEffective} onChange={() => onStatusChange(ev.id, 'partiallyEffective')} />
                                        </td>
                                    </tr>
                                );
                            })}
                        </tbody>
                    </table>
                    <button className="wb-add-row" onClick={() => onCreateEvent('Ground', activeDay)}>
                        + Add Ground Event
                    </button>
                </React.Fragment>
            );
        };

        // ─────────────────────────── WhiteboardAcademics ───────────────────────
        const WhiteboardAcademics = ({ events, roster }) => {
            const matched = useMemo(() => {
                return ACAD_FIXED_CATS.map(cat => {
                    const ev = events.find(e => {
                        const lower = (e.eventName || '').toLowerCase();
                        return lower.includes(cat.alphaKey) && lower.includes(cat.classKey);
                    });
                    return { ...cat, ev };
                });
            }, [events]);

            return (
                <table className="wb-table wb-table-compact">
                    <colgroup>
                        <col />{/* Class label */}
                        <col style={{ width: '30%' }} />
                        <col style={{ width: '30%' }} />
                    </colgroup>
                    <thead>
                        <tr>
                            <th>Class</th>
                            <th>Start</th>
                            <th>End</th>
                        </tr>
                    </thead>
                    <tbody>
                        {matched.map(({ label, catColor, ev }) => {
                            const color = CATEGORY_COLORS[catColor];
                            const rowStyle = color ? { background: `${color.bg}22` } : {};
                            const nameStyle = color
                                ? { fontWeight: 600, color: color.text, background: color.bg }
                                : { fontWeight: 600 };
                            // Strip "Academics" (and surrounding whitespace) from the raw event name
                            const displayName = ev
                                ? (ev.eventName || '').replace(/\s*academics\s*/i, '').trim() || label
                                : label;
                            return (
                                <tr key={label}>
                                    <td style={nameStyle}>{displayName}</td>
                                    <td style={rowStyle}>{ev ? (ev.startTime || '\u2014') : '\u2014'}</td>
                                    <td style={rowStyle}>{ev ? (ev.endTime || '\u2014') : '\u2014'}</td>
                                </tr>
                            );
                        })}
                    </tbody>
                </table>
            );
        };

        // ──────────────────────────── WhiteboardNA ─────────────────────────────
        const WhiteboardNA = ({ events, roster, onEditSave, onAdd, onRemove,
            onDeleteEvent, onDeleteCustom, onCreateEvent, onFocusEvent,
            focusedEventId,
            onAddPlaceholder, onRemovePlaceholder, onFillPlaceholder,
            highlights, highlightMode, onHighlight, activeDay,
            conflicts, onShowTooltip, onHideTooltip }) => {

            const handleCellSave = useCallback((eventId, field, value) => {
                onEditSave(eventId, { [field]: value || null });
            }, [onEditSave]);

            const cellRefsMap = React.useRef(new Map());

            return (
                <React.Fragment>
                    <table className="wb-table">
                        <colgroup>
                            <col style={{ width: 16 }} />
                            <col style={{ width: '20%' }} />
                            <col style={{ width: '6%' }} />
                            <col style={{ width: '6%' }} />
                            <col />{/* Person(s) — takes remaining */}
                            <col style={{ width: '14%' }} />
                        </colgroup>
                        <thead>
                            <tr>
                                <th></th>
                                <th>Reason</th>
                                <th>Start</th>
                                <th>End</th>
                                <th>Person(s)</th>
                                <th>Notes</th>
                            </tr>
                        </thead>
                        <tbody>
                            {events.map(ev => {
                                if (!cellRefsMap.current.has(ev.id)) cellRefsMap.current.set(ev.id, []);
                                const refs = cellRefsMap.current.get(ev.id);
                                const makeTab = (idx) => ({
                                    onTab: () => refs[idx + 1]?.focus(),
                                    onShiftTab: () => refs[idx - 1]?.focus(),
                                    ref: (el) => { refs[idx] = el; },
                                });
                                const crew = (ev.personnel || []).filter(Boolean);
                                const rowFocusClass = focusedEventId
                                    ? (ev.id === focusedEventId ? 'wb-row-focused' : 'wb-row-dimmed')
                                    : '';
                                return (
                                    <tr key={ev.id}
                                        className={rowFocusClass || undefined}
                                        style={{ cursor: 'pointer' }}
                                        onClick={(e) => {
                                            const tag = e.target.tagName;
                                            if (tag === 'BUTTON' || tag === 'INPUT' || tag === 'LABEL' || tag === 'SELECT') return;
                                            if (e.target.closest('.wb-crew-chip') || e.target.closest('.wb-remove-btn') ||
                                                e.target.closest('.wb-checkbox') || e.target.closest('.placeholder-chip') ||
                                                e.target.closest('.wb-add-btn') || e.target.closest('.wb-delete-btn')) return;
                                            if (onFocusEvent) onFocusEvent(ev.id === focusedEventId ? null : ev.id);
                                        }}>
                                        <td>
                                            {!ev.readonly && (
                                                <span className="wb-delete-btn"
                                                    onClick={() => ev.isCustom ? onDeleteCustom(ev.id) : onDeleteEvent(ev)}
                                                    title="Remove event">{'\u2715'}</span>
                                            )}
                                        </td>
                                        <WhiteboardCell {...makeTab(0)} value={ev.eventName} field="eventName" eventId={ev.id} type="text"
                                            onSave={handleCellSave} highlight={highlights[`${ev.id}:eventName`]}
                                            highlightMode={highlightMode} onHighlight={onHighlight} />
                                        <WhiteboardCell {...makeTab(1)} value={ev.startTime} field="startTime" eventId={ev.id} type="time"
                                            onSave={handleCellSave} highlight={highlights[`${ev.id}:startTime`]}
                                            highlightMode={highlightMode} onHighlight={onHighlight} />
                                        <WhiteboardCell {...makeTab(2)} value={ev.endTime} field="endTime" eventId={ev.id} type="time"
                                            onSave={handleCellSave} highlight={highlights[`${ev.id}:endTime`]}
                                            highlightMode={highlightMode} onHighlight={onHighlight} />
                                        <WhiteboardCrewGroup crew={crew} eventId={ev.id} roster={roster}
                                            onAdd={onAdd} onRemove={onRemove} onFocusEvent={onFocusEvent}
                                            placeholders={ev.placeholders || []}
                                            onAddPlaceholder={onAddPlaceholder}
                                            onRemovePlaceholder={onRemovePlaceholder}
                                            onFillPlaceholder={onFillPlaceholder}
                                            highlights={highlights} highlightMode={highlightMode}
                                            onHighlight={onHighlight}
                                            conflicts={conflicts}
                                            onShowTooltip={onShowTooltip}
                                            onHideTooltip={onHideTooltip} />
                                        <WhiteboardCell {...makeTab(3)} value={ev.notes} field="notes" eventId={ev.id} type="text"
                                            onSave={handleCellSave} highlight={highlights[`${ev.id}:notes`]}
                                            highlightMode={highlightMode} onHighlight={onHighlight} />
                                    </tr>
                                );
                            })}
                        </tbody>
                    </table>
                    <button className="wb-add-row" onClick={() => onCreateEvent('NA', activeDay)}>
                        + Add NA
                    </button>
                </React.Fragment>
            );
        };

        // ─────────────────────────── Whiteboard View ───────────────────────────
        const WhiteboardView = ({ workingEvents, roster, conflicts, dates, today,
            activeDay, onDayChange,
            onAdd, onRemove, onEditSave, onStatusChange, onDeleteEvent, onDeleteCustom,
            onCreateEvent, focusedEventId, onFocusEvent, onShowTooltip, onHideTooltip,
            onAddPlaceholder, onRemovePlaceholder, onFillPlaceholder }) => {

            const [highlights, setHighlights] = useState(loadHighlights);
            const [highlightMode, setHighlightMode] = useState(false);
            const [pickerTarget, setPickerTarget] = useState(null); // { key, rect }
            const pickerScrollTop = useRef(0); // scrollTop captured when picker was opened

            // Duty puck storage helpers (per-day, keyed by activeDay string)
            const DUTY_STORAGE_KEY = 'tps-duty-assignments';
            const loadDutyForDay = (dayKey) => {
                try {
                    const stored = JSON.parse(localStorage.getItem(DUTY_STORAGE_KEY) || '{}');
                    return stored[dayKey] || { foa: [], auth: [] };
                } catch { return { foa: [], auth: [] }; }
            };
            const saveDutyForDay = (dayKey, data) => {
                try {
                    const stored = JSON.parse(localStorage.getItem(DUTY_STORAGE_KEY) || '{}');
                    stored[dayKey] = data;
                    localStorage.setItem(DUTY_STORAGE_KEY, JSON.stringify(stored));
                } catch {}
            };

            // Duty state keyed per active day
            const dutyDayKey = String(activeDay ?? '');
            const [dutyState, setDutyState] = React.useState(() => loadDutyForDay(dutyDayKey));

            // Reload duty state when active day changes
            React.useEffect(() => {
                setDutyState(loadDutyForDay(String(activeDay ?? '')));
            }, [activeDay]);

            // Seed duty pucks from API-parsed FOA/AUTH supervision events when localStorage is empty.
            // Runs when activeDay or workingEvents change. Does NOT overwrite existing user assignments.
            React.useEffect(() => {
                if (!activeDay) return;
                const dayKey = String(activeDay);
                const stored = loadDutyForDay(dayKey);
                // Only seed if both slots are empty (user has not made any assignments for this day)
                if (stored.foa.length > 0 || stored.auth.length > 0) return;
                const dayEvts = workingEvents.filter(ev => ev.date === activeDay && ev.section === 'Supervision');
                const foaEv   = dayEvts.find(ev => /^FOA$/i.test(ev.eventName || ''));
                const authEv  = dayEvts.find(ev => /^AUTH$/i.test(ev.eventName || ''));
                const foaPerson  = foaEv  && foaEv.personnel[0]  ? foaEv.personnel[0]  : null;
                const authPerson = authEv && authEv.personnel[0] ? authEv.personnel[0] : null;
                if (!foaPerson && !authPerson) return; // nothing to seed
                const seeded = {
                    foa:  foaPerson  ? [foaPerson]  : [],
                    auth: authPerson ? [authPerson] : [],
                };
                setDutyState(seeded);
                saveDutyForDay(dayKey, seeded);
            }, [activeDay, workingEvents]);

            const updateDuty = (slot, newList) => {
                const next = { ...dutyState, [slot]: newList };
                setDutyState(next);
                saveDutyForDay(String(activeDay ?? ''), next);
            };
            const addToDuty = (slot, person) => {
                if (dutyState[slot].includes(person)) return;
                updateDuty(slot, [...dutyState[slot], person]);
            };
            const removeFromDuty = (slot, person) => {
                updateDuty(slot, dutyState[slot].filter(n => n !== person));
            };
            const moveBetweenDuty = (fromSlot, toSlot, person) => {
                const next = {
                    foa: [...dutyState.foa],
                    auth: [...dutyState.auth],
                };
                next[fromSlot] = next[fromSlot].filter(n => n !== person);
                if (!next[toSlot].includes(person)) next[toSlot].push(person);
                setDutyState(next);
                saveDutyForDay(String(activeDay ?? ''), next);
            };

            // Inner component: one duty puck chip
            const DutyPuckChip = ({ person, slot }) => {
                const colors = chipColor(person, roster) || { bg: '#334155', text: '#cbd5e1' };
                return (
                    <span
                        className="duty-puck-chip"
                        style={{ background: colors.bg, color: colors.text }}
                        draggable
                        onDragStart={(e) => {
                            e.dataTransfer.setData('text/plain', JSON.stringify({
                                person,
                                sourceDuty: slot,
                                sourceEventId: null,
                            }));
                            e.dataTransfer.effectAllowed = 'copyMove';
                            e.currentTarget.style.opacity = '0.4';
                        }}
                        onDragEnd={(e) => { e.currentTarget.style.opacity = '1'; }}
                    >
                        {person}
                        <span
                            className="duty-puck-remove"
                            onClick={() => removeFromDuty(slot, person)}
                        >×</span>
                    </span>
                );
            };

            // Inner component: drop zone to receive picker/event/duty drags
            const DutyDropZone = ({ slot }) => {
                const [dragOver, setDragOver] = React.useState(false);
                const handleDragOver = (e) => {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'copy';
                    setDragOver(true);
                };
                const handleDrop = (e) => {
                    e.preventDefault();
                    setDragOver(false);
                    try {
                        const data = JSON.parse(e.dataTransfer.getData('text/plain'));
                        const person = data.person;
                        if (!person) return;
                        if (data.sourceDuty && data.sourceDuty !== slot) {
                            moveBetweenDuty(data.sourceDuty, slot, person);
                        } else {
                            addToDuty(slot, person);
                        }
                    } catch {}
                };
                return (
                    <span
                        className={`duty-drop-zone${dragOver ? ' drag-over' : ''}`}
                        onDragOver={handleDragOver}
                        onDragLeave={() => setDragOver(false)}
                        onDrop={handleDrop}
                    >+</span>
                );
            };

            // Scroll position persistence per day
            const wbAreaRef = useRef(null);
            const scrollPositions = useRef({});
            const prevActiveDay = useRef(activeDay);

            React.useEffect(() => {
                const prev = prevActiveDay.current;
                const container = wbAreaRef.current;
                if (!container) return;
                // Save scroll position for the day we're leaving
                if (prev && prev !== activeDay) {
                    scrollPositions.current[prev] = container.scrollTop;
                }
                // Restore scroll position for the new day (or go to top)
                const saved = scrollPositions.current[activeDay] || 0;
                container.scrollTop = saved;
                prevActiveDay.current = activeDay;
            }, [activeDay]);

            const dayEvents = useMemo(() => {
                if (!activeDay) return {};
                const bySection = {};
                WB_SECTION_ORDER.forEach(sec => { bySection[sec] = []; });
                bySection.Academics = [];
                workingEvents.forEach(ev => {
                    if (ev.date !== activeDay) return;
                    // T4: FOA/AUTH events (section=Supervision, startTime=null) are displayed as
                    // date/title bar pills via foaByDate — exclude them from whiteboard table rows.
                    if (ev.section === 'Supervision' && ev.startTime === null &&
                        /^(FOA|AUTH)$/i.test(ev.eventName || '')) return;
                    if (bySection[ev.section] !== undefined) bySection[ev.section].push(ev);
                });
                // Sort events but keep newly-created (blank name) events at the bottom
                const sortEnd = (a, b, keyFn) => {
                    const aEmpty = !keyFn(a);
                    const bEmpty = !keyFn(b);
                    if (aEmpty !== bEmpty) return aEmpty ? 1 : -1;
                    return 0;
                };
                bySection.Flying.sort((a, b) => sortEnd(a, b, e => e.model || e.eventName) || (a.model || '').localeCompare(b.model || '') || (a.startTime || '').localeCompare(b.startTime || ''));
                bySection.Ground.sort((a, b) => sortEnd(a, b, e => e.eventName) || (a.eventName || '').localeCompare(b.eventName || '') || (a.startTime || '').localeCompare(b.startTime || ''));
                bySection.NA.sort((a, b) => sortEnd(a, b, e => e.eventName) || (a.startTime || '').localeCompare(b.startTime || ''));
                return bySection;
            }, [workingEvents, activeDay]);

            // Called when a cell is clicked in highlight mode — opens the picker popup
            const handleHighlightCellClick = useCallback((key, rect) => {
                if (wbAreaRef.current) pickerScrollTop.current = wbAreaRef.current.scrollTop;
                setPickerTarget({ key, rect });
            }, []);

            // Called when user selects a color (or null=erase) from the picker
            const handlePickerApply = useCallback((colorKey) => {
                setPickerTarget(prev => {
                    if (!prev) return null;
                    const key = prev.key;
                    setHighlights(hl => {
                        const next = { ...hl };
                        if (colorKey) next[key] = colorKey;
                        else delete next[key];
                        saveHighlights(next);
                        return next;
                    });
                    return null; // close picker
                });
            }, []);

            // Called when user clicks X in picker — closes picker AND disables highlight mode
            const handlePickerClose = useCallback(() => {
                setPickerTarget(null);
                setHighlightMode(false);
            }, []);

            // Attach scroll listener only while picker is open; auto-removes when picker closes
            React.useEffect(() => {
                if (!pickerTarget) return;
                const el = wbAreaRef.current;
                if (!el) return;
                const onScroll = () => {
                    if (Math.abs(el.scrollTop - pickerScrollTop.current) > 400) {
                        setPickerTarget(null);
                    }
                };
                el.addEventListener('scroll', onScroll, { passive: true });
                return () => el.removeEventListener('scroll', onScroll);
            }, [pickerTarget]);

            // Close picker when clicking outside the popup
            React.useEffect(() => {
                if (!pickerTarget) return;
                const handleDown = (e) => {
                    if (!e.target.closest('.wb-picker-popup')) setPickerTarget(null);
                };
                document.addEventListener('pointerdown', handleDown);
                return () => document.removeEventListener('pointerdown', handleDown);
            }, [pickerTarget]);

            const handleCreateWbEvent = useCallback((section, date, extraFields) => {
                const id = 'custom-' + Date.now() + '-' + Math.random().toString(36).substr(2, 5);
                const ev = {
                    id, section, date,
                    model: section === 'Flying' ? '' : null,
                    eventName: '',
                    startTime: '08:00',
                    endTime: '09:00',
                    etd: null, eta: null,
                    personnel: [],
                    originalPersonnel: [],
                    placeholders: [],
                    notes: null,
                    readonly: false,
                    isCustom: true,
                    cancelled: false,
                    effective: false,
                    partiallyEffective: false,
                    ...(extraFields || {}),
                };
                onCreateEvent(ev);
            }, [onCreateEvent]);

            const dateLabel = activeDay ? fmtDate(activeDay) : null;

            const foaAuthBadges = useMemo(() => {
                if (!activeDay) return { foa: null, auth: null };
                const dayEvts = workingEvents.filter(ev => ev.date === activeDay);
                const foaEv  = dayEvts.find(ev => /\bFOA\b/i.test(ev.eventName || ''));
                const authEv = dayEvts.find(ev => /\bAUTH(?:ORIZATION|ORISATION|ORIZE|ORISED|ORIZED)?\b/i.test(ev.eventName || ''));
                const foa = foaEv ? {
                    time: (foaEv.startTime && foaEv.endTime)
                        ? `${foaEv.startTime}\u2013${foaEv.endTime}`
                        : 'All Day',
                } : null;
                const auth = authEv ? {
                    name: (authEv.eventName || '').replace(/\b(?:auth(?:orization|orised|orize|orized?)?)\b/i, '').trim() || 'Auth',
                } : null;
                return { foa, auth };
            }, [workingEvents, activeDay]);

            return (
                <div className="whiteboard-area" ref={wbAreaRef}
                    onClick={(e) => {
                        if (!focusedEventId) return;
                        if (!e.target.closest('tr')) {
                            onFocusEvent(null);
                        }
                    }}>
                    {/* Date header row: Highlight button left, date centered */}
                    {dateLabel && (
                        <div className="wb-date-header-row">
                            <button
                                className={`wb-highlight-btn ${highlightMode ? 'active' : ''}`}
                                onClick={() => setHighlightMode(m => !m)}
                                title="Toggle highlight mode — click a cell to pick a color"
                            >
                                {highlightMode ? '\uD83C\uDFA8 Highlight ON' : '\uD83C\uDFA8 Highlight'}
                            </button>
                            <div className="wb-date-header-label">
                                {dateLabel.weekday}, {dateLabel.day} {dateLabel.month}
                            </div>
                            <div className="wb-header-badges" style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                                {/* FOA duty pucks */}
                                <div className="duty-slot">
                                    <span className="duty-slot-label">FOA</span>
                                    {dutyState.foa.map(person => (
                                        <DutyPuckChip key={person} person={person} slot="foa" />
                                    ))}
                                    <DutyDropZone slot="foa" />
                                </div>
                                {/* AUTH duty pucks */}
                                <div className="duty-slot">
                                    <span className="duty-slot-label">AUTH</span>
                                    {dutyState.auth.map(person => (
                                        <DutyPuckChip key={person} person={person} slot="auth" />
                                    ))}
                                    <DutyDropZone slot="auth" />
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Contextual highlight picker portal */}
                    {pickerTarget && (
                        <HighlightPicker
                            rect={pickerTarget.rect}
                            onSelect={handlePickerApply}
                            onClose={handlePickerClose} />
                    )}

                    {WB_SECTION_ORDER.map(sec => {
                        const evts = dayEvents[sec] || [];
                        const acadEvts = sec === 'Supervision' ? (dayEvents.Academics || []) : [];
                        // Supervision section always renders — WhiteboardAcademics provides 4 fixed rows even with no data
                        const secClass = `wb-section wb-section-${sec.toLowerCase()}`;
                        return (
                            <div key={sec} className={secClass}>
                                <div className="wb-section-title">
                                    {sec === 'Supervision' ? 'SUPERVISION / ACADEMICS' :
                                     sec === 'NA' ? 'NON-AVAILABILITY' : sec.toUpperCase()}
                                    {sec !== 'Supervision' && (
                                        <span className="wb-section-count">
                                            {' '}({evts.length} event{evts.length !== 1 ? 's' : ''})
                                        </span>
                                    )}
                                </div>
                                {sec === 'Supervision' ? (
                                    <div className="wb-supv-acad-row">
                                        <div className="wb-supv-acad-left">
                                            <WhiteboardSupervision events={evts} roster={roster}
                                                onEditSave={onEditSave} onAdd={onAdd} onRemove={onRemove}
                                                onFocusEvent={onFocusEvent} focusedEventId={focusedEventId}
                                                highlights={highlights} highlightMode={highlightMode}
                                                onHighlight={handleHighlightCellClick}
                                                onCreateEvent={handleCreateWbEvent}
                                                onDeleteCustom={onDeleteCustom}
                                                onDeleteEvent={onDeleteEvent}
                                                activeDay={activeDay}
                                                conflicts={conflicts}
                                                onShowTooltip={onShowTooltip}
                                                onHideTooltip={onHideTooltip} />
                                        </div>
                                        <div className="wb-supv-acad-right">
                                            <WhiteboardAcademics events={acadEvts} roster={roster} />
                                        </div>
                                    </div>
                                ) : sec === 'Flying' ? (
                                    <WhiteboardFlying events={evts} roster={roster} conflicts={conflicts}
                                        onEditSave={onEditSave} onStatusChange={onStatusChange}
                                        onAdd={onAdd} onRemove={onRemove}
                                        onDeleteEvent={onDeleteEvent} onDeleteCustom={onDeleteCustom}
                                        onCreateEvent={handleCreateWbEvent} onFocusEvent={onFocusEvent}
                                        focusedEventId={focusedEventId}
                                        onAddPlaceholder={onAddPlaceholder}
                                        onRemovePlaceholder={onRemovePlaceholder}
                                        onFillPlaceholder={onFillPlaceholder}
                                        highlights={highlights} highlightMode={highlightMode}
                                        onHighlight={handleHighlightCellClick}
                                        activeDay={activeDay}
                                        onShowTooltip={onShowTooltip}
                                        onHideTooltip={onHideTooltip} />
                                ) : sec === 'Ground' ? (
                                    <WhiteboardGround events={evts} roster={roster} conflicts={conflicts}
                                        onEditSave={onEditSave} onStatusChange={onStatusChange}
                                        onAdd={onAdd} onRemove={onRemove}
                                        onDeleteEvent={onDeleteEvent} onDeleteCustom={onDeleteCustom}
                                        onCreateEvent={handleCreateWbEvent} onFocusEvent={onFocusEvent}
                                        focusedEventId={focusedEventId}
                                        onAddPlaceholder={onAddPlaceholder}
                                        onRemovePlaceholder={onRemovePlaceholder}
                                        onFillPlaceholder={onFillPlaceholder}
                                        highlights={highlights} highlightMode={highlightMode}
                                        onHighlight={handleHighlightCellClick}
                                        activeDay={activeDay}
                                        onShowTooltip={onShowTooltip}
                                        onHideTooltip={onHideTooltip} />
                                ) : sec === 'NA' ? (
                                    <WhiteboardNA events={evts} roster={roster}
                                        onEditSave={onEditSave} onAdd={onAdd} onRemove={onRemove}
                                        onDeleteEvent={onDeleteEvent} onDeleteCustom={onDeleteCustom}
                                        onCreateEvent={handleCreateWbEvent} onFocusEvent={onFocusEvent}
                                        focusedEventId={focusedEventId}
                                        onAddPlaceholder={onAddPlaceholder}
                                        onRemovePlaceholder={onRemovePlaceholder}
                                        onFillPlaceholder={onFillPlaceholder}
                                        highlights={highlights} highlightMode={highlightMode}
                                        onHighlight={handleHighlightCellClick}
                                        activeDay={activeDay}
                                        conflicts={conflicts}
                                        onShowTooltip={onShowTooltip}
                                        onHideTooltip={onHideTooltip} />
                                ) : null}
                            </div>
                        );
                    })}
                </div>
            );
        };

        // ─── SCHEDULER VIEW ───

        const SchedulerView = ({ allEvents, roster, dates, initialSelectedIds, initialNaCats, onChangeSelection, cachedWorkingState, onRefreshFromWhiteboard, selectAllActive }) => {
            const [workingEvents, setWorkingEvents] = useState([]);
            const [changes, setChanges] = useState([]);
            const [savedShow, setSavedShow] = useState(false);
            const [tooltip, setTooltip] = useState(null);
            const [viewMode, setViewMode] = useState('timeline'); // 'timeline' | 'rainbow' | 'whiteboard'
            const [wbActiveDay, setWbActiveDay] = useState(null); // whiteboard selected day
            const [showRefreshModal, setShowRefreshModal] = useState(false);
            const [showCreateEvent, setShowCreateEvent] = useState(false);
            const [showConflictSummary, setShowConflictSummary] = useState(false);
            const [focusedEventId, setFocusedEventId] = useState(null);
            const [focusEnabled, setFocusEnabled] = useState(true);
            const [actionMenu, setActionMenu] = useState(null);   // { event, position } | null
            const [editingEvent, setEditingEvent] = useState(null); // event object | null
            const [confirmDelete, setConfirmDelete] = useState(null); // event object | null
            const timelineRef = useRef(null);
            const initialized = useRef(false);
            const restoredFromCache = useRef(false);

            const showTooltip = useCallback((text, rect) => {
                const spaceBelow = window.innerHeight - rect.bottom;
                const showAbove = spaceBelow < 80;
                setTooltip({ text, x: rect.left + rect.width / 2, y: showAbove ? rect.top - 6 : rect.bottom + 6, above: showAbove });
            }, []);
            const hideTooltip = useCallback(() => setTooltip(null), []);

            // ─── EVENT ACTION HANDLERS ───

            const handleEventActionClick = useCallback((event, rect) => {
                const top = Math.max(rect.top - 30, 8);
                const left = Math.max(Math.min(rect.right - 28, window.innerWidth - 70), 8);
                setActionMenu({ event, position: { top, left } });
            }, []);

            const handleCancelEvent = useCallback((eventId) => {
                setWorkingEvents(prev => {
                    const ev = prev.find(e => e.id === eventId);
                    if (!ev) return prev;
                    const cancelledAfter = !ev.cancelled;
                    if (initialized.current) {
                        setChanges(c => [...c, {
                            type: 'event-cancel',
                            eventId: ev.id,
                            eventName: ev.eventName,
                            eventModel: ev.model,
                            eventTime: ev.startTime,
                            eventSection: ev.section,
                            date: ev.date,
                            cancelledBefore: !!ev.cancelled,
                            cancelledAfter,
                        }]);
                    }
                    return prev.map(e => e.id === eventId ? { ...e, cancelled: cancelledAfter } : e);
                });
                setActionMenu(null);
            }, []);

            const handleEditSave = useCallback((eventId, updates) => {
                setWorkingEvents(prev => {
                    const ev = prev.find(e => e.id === eventId);
                    if (!ev) return prev;
                    if (initialized.current) {
                        setChanges(c => [...c, {
                            type: 'event-edit',
                            eventId: ev.id,
                            eventName: ev.eventName,
                            eventModel: ev.model,
                            eventTime: ev.startTime,
                            eventSection: ev.section,
                            date: ev.date,
                            before: { eventName: ev.eventName, model: ev.model, startTime: ev.startTime, endTime: ev.endTime, notes: ev.notes },
                            after: updates,
                        }]);
                    }
                    return prev.map(e => e.id === eventId ? { ...e, ...updates } : e);
                });
                setEditingEvent(null);
            }, []);

            // handleStatusChange — toggles one of effective/partiallyEffective/cancelled
            // while enforcing mutual exclusivity: setting one forces the other two to false.
            const handleStatusChange = useCallback((eventId, field) => {
                setWorkingEvents(prev => {
                    const ev = prev.find(e => e.id === eventId);
                    if (!ev) return prev;
                    const newValue = !ev[field];
                    const updatedFields = {
                        effective: false,
                        partiallyEffective: false,
                        cancelled: false,
                        [field]: newValue,
                    };
                    if (initialized.current) {
                        setChanges(c => [...c, {
                            type: 'event-status',
                            eventId: ev.id,
                            eventName: ev.eventName,
                            eventModel: ev.model,
                            eventTime: ev.startTime,
                            eventSection: ev.section,
                            date: ev.date,
                            field,
                            before: { effective: !!ev.effective, partiallyEffective: !!ev.partiallyEffective, cancelled: !!ev.cancelled },
                            after: updatedFields,
                        }]);
                    }
                    return prev.map(e => e.id === eventId ? { ...e, ...updatedFields } : e);
                });
            }, []);

            const handleDeleteEvent = useCallback((event) => {
                setConfirmDelete(event);
                setActionMenu(null);
            }, []);

            const handleDeleteConfirmed = useCallback(() => {
                const ev = confirmDelete;
                if (!ev) return;
                // Remove from custom events storage if applicable
                if (ev.isCustom) {
                    const customs = loadCustomEvents().filter(e => e.id !== ev.id);
                    saveCustomEvents(customs);
                }
                if (initialized.current) {
                    setChanges(c => [...c, {
                        type: 'event-delete',
                        eventId: ev.id,
                        eventName: ev.eventName,
                        eventModel: ev.model,
                        eventTime: ev.startTime,
                        eventSection: ev.section,
                        date: ev.date,
                        deletedEvent: { ...ev, personnel: [...(ev.personnel || [])] },
                    }]);
                }
                setWorkingEvents(prev => prev.filter(e => e.id !== ev.id));
                setConfirmDelete(null);
            }, [confirmDelete]);

            // Initialize working events — from cache if available, otherwise from allEvents
            useEffect(() => {
                initialized.current = false;
                if (cachedWorkingState && !restoredFromCache.current) {
                    restoredFromCache.current = true;
                    setWorkingEvents(cachedWorkingState.workingEvents.map(ev => ({
                        ...ev,
                        personnel: [...ev.personnel],
                        placeholders: [...(ev.placeholders || [])],
                    })));
                    setChanges(cachedWorkingState.changes || []);
                } else {
                    setWorkingEvents(allEvents.map(ev => ({
                        ...ev,
                        personnel: [...ev.personnel],
                        placeholders: [...(ev.placeholders || [])],
                    })));
                    setChanges([]);
                }
                // Save selections immediately so they persist across refresh
                saveState([], initialSelectedIds, initialNaCats, allEvents, selectAllActive);
                // Use requestAnimationFrame to ensure state is settled before enabling change tracking
                requestAnimationFrame(() => { initialized.current = true; });
            }, [allEvents]);

            // Visible events filter
            const visibleEvents = useMemo(() => {
                return workingEvents.filter(ev => {
                    if (ev.readonly) return false;
                    if (ev.isCustom) return true; // custom events always visible
                    if (ev.section === 'NA') {
                        return ev.personnel.some(p => {
                            const c = personCat(p, roster);
                            return c && initialNaCats.has(c);
                        });
                    }
                    return initialSelectedIds.has(ev.id);
                });
            }, [workingEvents, initialSelectedIds, initialNaCats, roster]);

            // Events by date
            // Guard: skip events with null startTime (e.g. FOA/AUTH supervision footer rows).
            // Those events are already displayed as DayColumn header pills via foaByDate.
            // Passing them to EventCard would produce NaN left/width values (timePct(null) = NaN).
            const eventsByDate = useMemo(() => {
                const m = {};
                dates.forEach(d => { m[d] = []; });
                visibleEvents.forEach(ev => {
                    if (ev.startTime == null) return;
                    if (m[ev.date]) m[ev.date].push(ev);
                });
                return m;
            }, [visibleEvents, dates]);

            // FOA/AUTH per date — scan workingEvents for supervision events named 'FOA' / 'AUTH'
            // Derived from ALL workingEvents (not filtered visibleEvents) so chips always appear
            // even when the Supervision section is not selected in the event picker.
            const foaByDate = useMemo(() => {
                const m = {};
                dates.forEach(d => { m[d] = { foa: null, auth: null }; });
                workingEvents.forEach(ev => {
                    if (ev.section !== 'Supervision') return;
                    if (!m[ev.date]) return;
                    if (/^FOA$/i.test(ev.eventName || '') && ev.personnel[0]) {
                        m[ev.date].foa = ev.personnel[0];
                    } else if (/^AUTH$/i.test(ev.eventName || '') && ev.personnel[0]) {
                        m[ev.date].auth = ev.personnel[0];
                    }
                });
                return m;
            }, [workingEvents, dates]);

            // Conflict detection on ALL events
            const conflicts = useMemo(() => detectConflicts(workingEvents), [workingEvents]);

            // Day-scoped conflict map for whiteboard view — filters to only conflicts where the
            // conflicting event shares the currently active whiteboard day. Cross-day conflicts
            // are noise in whiteboard mode (which shows one day at a time).
            const wbDayConflicts = useMemo(() => {
                const resolvedDay = wbActiveDay || (dates && (dates.includes(today) ? today : dates[0]));
                if (!resolvedDay || !conflicts) return conflicts;
                const filtered = new Map();
                conflicts.forEach((personMap, eventId) => {
                    const filteredPersonMap = new Map();
                    personMap.forEach((entries, person) => {
                        const filteredEntries = entries.filter(c => c.date === resolvedDay);
                        if (filteredEntries.length > 0) filteredPersonMap.set(person, filteredEntries);
                    });
                    if (filteredPersonMap.size > 0) filtered.set(eventId, filteredPersonMap);
                });
                return filtered;
            }, [conflicts, wbActiveDay, dates, today]);

            // Focus mode: compute who is unavailable during the focused event's time window
            const focusedAvailability = useMemo(() => {
                if (!focusedEventId || !focusEnabled) return null;
                const fev = workingEvents.find(e => e.id === focusedEventId);
                if (!fev) return null;
                const fStart = evStart(fev);
                const fEnd = evEnd(fev);
                const fDate = fev.date;
                const fPersonnel = new Set(fev.personnel);
                // Map: person -> [{ eventName, model, startTime, endTime }]
                const unavailable = new Map();
                // People already on the focused event are "assigned" — grey them out too
                fev.personnel.forEach(person => {
                    if (!unavailable.has(person)) unavailable.set(person, []);
                    unavailable.get(person).push({ eventName: fev.eventName, model: fev.model, startTime: fev.startTime, endTime: fev.endTime, assigned: true });
                });
                // People on overlapping events
                workingEvents.forEach(ev => {
                    if (ev.id === focusedEventId) return;
                    if (ev.date !== fDate) return;
                    if (ev.cancelled) return; // T1: cancelled events do not block availability
                    const eS = evStart(ev); const eE = evEnd(ev);
                    if (eS == null || fStart == null) return;
                    if (eS < fEnd && eE > fStart) {
                        ev.personnel.forEach(person => {
                            if (!unavailable.has(person)) unavailable.set(person, []);
                            unavailable.get(person).push({ eventName: ev.eventName, model: ev.model, startTime: ev.startTime, endTime: ev.endTime });
                        });
                    }
                });
                return unavailable;
            }, [focusedEventId, focusEnabled, workingEvents]);

            // Clear focus when switching to rainbow (allow focus in timeline and whiteboard)
            useEffect(() => { if (viewMode === 'rainbow') setFocusedEventId(null); }, [viewMode]);
            // Escape clears focus
            useEffect(() => {
                const onKey = (e) => { if (e.key === 'Escape') setFocusedEventId(null); };
                window.addEventListener('keydown', onKey);
                return () => window.removeEventListener('keydown', onKey);
            }, []);

            // Auto-save changes + full working copy
            useEffect(() => {
                if (!initialized.current) return;
                saveState(changes, initialSelectedIds, initialNaCats, allEvents, selectAllActive);
                saveWorkingCopy(workingEvents, changes, allEvents, roster, dates, initialSelectedIds, initialNaCats);
                if (changes.length > 0) {
                    setSavedShow(true);
                    const t = setTimeout(() => setSavedShow(false), 2000);
                    return () => clearTimeout(t);
                }
            }, [changes]);

            // Add person to event (from picker or another event)
            const handleAdd = useCallback((targetId, person, sourceId) => {
                if (!initialized.current) return;

                const newChanges = [];

                setWorkingEvents(prev => {
                    const next = prev.map(ev => ({
                        ...ev,
                        personnel: [...ev.personnel],
                        placeholders: [...(ev.placeholders || [])],
                    }));
                    const target = next.find(e => e.id === targetId);
                    if (!target || target.personnel.includes(person)) return prev;

                    // Remove from source if moving
                    if (sourceId) {
                        const source = next.find(e => e.id === sourceId);
                        if (source) {
                            source.personnel = source.personnel.filter(p => p !== person);
                            newChanges.push({
                                type: 'remove', person, date: source.date,
                                eventSection: source.section, eventModel: source.model,
                                eventName: source.eventName, eventTime: source.startTime,
                                eventId: source.id,
                            });
                        }
                    }

                    target.personnel.push(person);
                    newChanges.push({
                        type: 'add', person, date: target.date,
                        eventSection: target.section, eventModel: target.model,
                        eventName: target.eventName, eventTime: target.startTime,
                        eventId: target.id,
                    });

                    return next;
                });

                // Record changes after state update (newChanges populated synchronously in updater)
                if (newChanges.length > 0) {
                    setChanges(c => [...c, ...newChanges]);
                }
            }, []);

            // Add a placeholder slot to an event
            const handleAddPlaceholder = useCallback((eventId, role, filledBy = null) => {
                if (!initialized.current) return;
                setWorkingEvents(prev => {
                    const next = prev.map(ev => ({
                        ...ev,
                        personnel: [...ev.personnel],
                        placeholders: [...(ev.placeholders || [])],
                    }));
                    const target = next.find(e => e.id === eventId);
                    if (!target) return prev;
                    target.placeholders.push(makePlaceholder(role, filledBy));
                    if (filledBy) target.personnel = [...target.personnel, filledBy];
                    return next;
                });
            }, []);

            // Remove a placeholder slot entirely
            const handleRemovePlaceholder = useCallback((eventId, placeholderId) => {
                if (!initialized.current) return;
                setWorkingEvents(prev => {
                    const next = prev.map(ev => ({
                        ...ev,
                        personnel: [...ev.personnel],
                        placeholders: [...(ev.placeholders || [])],
                    }));
                    const target = next.find(e => e.id === eventId);
                    if (!target) return prev;
                    target.placeholders = target.placeholders.filter(p => p.id !== placeholderId);
                    return next;
                });
            }, []);

            // Set filledBy on a placeholder (does NOT add person to personnel[] — caller handles that)
            const handleFillPlaceholder = useCallback((eventId, placeholderId, person) => {
                if (!initialized.current) return;
                setWorkingEvents(prev => {
                    const next = prev.map(ev => ({
                        ...ev,
                        personnel: [...ev.personnel],
                        placeholders: [...(ev.placeholders || [])],
                    }));
                    const target = next.find(e => e.id === eventId);
                    if (!target) return prev;
                    target.placeholders = target.placeholders.map(p =>
                        p.id === placeholderId ? { ...p, filledBy: person } : p
                    );
                    return next;
                });
            }, []);

            // Remove person from event
            const handleRemove = useCallback((eventId, person) => {
                if (!initialized.current) return;

                setWorkingEvents(prev => {
                    const next = prev.map(ev => ({
                        ...ev,
                        personnel: [...ev.personnel],
                        placeholders: [...(ev.placeholders || [])],
                    }));
                    const event = next.find(e => e.id === eventId);
                    if (!event) return prev;
                    event.personnel = event.personnel.filter(p => p !== person);
                    // Revert any placeholder this person was filling
                    event.placeholders = (event.placeholders || []).map(ph =>
                        ph.filledBy === person ? { ...ph, filledBy: null } : ph
                    );
                    // Record change inside updater for React 18 batching atomicity
                    setChanges(c => [...c, {
                        type: 'remove', person, date: event.date,
                        eventSection: event.section, eventModel: event.model,
                        eventName: event.eventName, eventTime: event.startTime,
                        eventId: event.id,
                    }]);
                    return next;
                });
            }, []);

            // Undo a group of changes (reverse chronological order)
            const handleUndoGroup = useCallback((indices) => {
                if (!indices || indices.length === 0) return;
                const sortedDesc = [...indices].sort((a, b) => b - a);
                setWorkingEvents(prev => {
                    const next = prev.map(ev => ({ ...ev, personnel: [...ev.personnel], placeholders: [...(ev.placeholders || [])] }));
                    sortedDesc.forEach(idx => {
                        const ch = changes[idx];
                        if (!ch) return;

                        if (ch.type === 'event-cancel') {
                            const ev = next.find(e => e.id === ch.eventId);
                            if (ev) ev.cancelled = ch.cancelledBefore;
                            return;
                        }
                        if (ch.type === 'event-status') {
                            const ev = next.find(e => e.id === ch.eventId);
                            if (ev && ch.before) {
                                ev.effective = ch.before.effective;
                                ev.partiallyEffective = ch.before.partiallyEffective;
                                ev.cancelled = ch.before.cancelled;
                            }
                            return;
                        }
                        if (ch.type === 'event-edit') {
                            const ev = next.find(e => e.id === ch.eventId);
                            if (ev && ch.before) {
                                // Only restore fields actually present in the snapshot (avoids setting
                                // ev.notes = undefined on old change entries that predate the notes field)
                                Object.keys(ch.before).forEach(k => {
                                    if (Object.prototype.hasOwnProperty.call(ch.before, k)) ev[k] = ch.before[k];
                                });
                            }
                            return;
                        }
                        if (ch.type === 'event-delete') {
                            if (ch.deletedEvent && !next.find(e => e.id === ch.eventId)) {
                                next.push({ ...ch.deletedEvent, personnel: [...(ch.deletedEvent.personnel || [])], placeholders: [...(ch.deletedEvent.placeholders || [])] });
                            }
                            return;
                        }

                        // Existing person-centric undo
                        const event = next.find(e => e.id === ch.eventId);
                        if (!event) return;
                        if (ch.type === 'add') {
                            event.personnel = event.personnel.filter(p => p !== ch.person);
                        } else {
                            if (!event.personnel.includes(ch.person)) event.personnel.push(ch.person);
                        }
                    });
                    return next;
                });
                const indexSet = new Set(indices);
                setChanges(prev => prev.filter((_, i) => !indexSet.has(i)));
            }, [changes]);

            // Clear all
            const handleClearAll = useCallback(() => {
                setWorkingEvents(allEvents.map(ev => ({ ...ev, personnel: [...ev.originalPersonnel] })));
                setChanges([]);
                clearState();
            }, [allEvents]);

            // Copy (net-change format — human-readable instructions)
            const handleCopy = useCallback(() => {
                const netInstructions = computeNetChanges(changes);
                if (netInstructions.length === 0) return;
                const lines = [];
                const byDate = {};
                netInstructions.forEach(inst => {
                    if (!byDate[inst.date]) byDate[inst.date] = [];
                    byDate[inst.date].push(inst);
                });
                Object.keys(byDate).sort().forEach(date => {
                    const h = fmtDate(date);
                    lines.push(`--- ${h.full} ---`);
                    byDate[date].forEach(inst => {
                        const fmtEvt = (meta, contextDate) => {
                            if (!meta) return '';
                            const mdl = meta.eventModel ? `${meta.eventModel} | ` : '';
                            if (contextDate && meta.date && meta.date !== contextDate) {
                                const df = fmtDate(meta.date);
                                return `${mdl}${meta.eventName} (${df.weekday}, ${df.day} ${df.month}, ${meta.eventTime})`;
                            }
                            return `${mdl}${meta.eventName} (${meta.eventTime})`;
                        };
                        if (inst.type === 'event-cancel') {
                            lines.push(`  ${inst.cancelledAfter ? 'CANCELLED' : 'UN-CANCELLED'}: ${fmtEvt(inst.source)}`);
                        } else if (inst.type === 'event-edit') {
                            const diffs = [];
                            if (inst.before && inst.after) {
                                if (inst.before.eventName !== inst.after.eventName) diffs.push(`name -> "${inst.after.eventName}"`);
                                if (inst.before.startTime !== inst.after.startTime || inst.before.endTime !== inst.after.endTime)
                                    diffs.push(`time -> ${inst.after.startTime}-${inst.after.endTime || '??'}`);
                                if ((inst.before.model || '') !== (inst.after.model || '')) diffs.push(`model -> ${inst.after.model || '-'}`);
                            }
                            lines.push(`  EDITED: ${fmtEvt(inst.source)}${diffs.length ? ` [${diffs.join(', ')}]` : ''}`);
                        } else if (inst.type === 'event-delete') {
                            lines.push(`  REMOVED: ${fmtEvt(inst.source)}`);
                        } else if (inst.type === 'move') {
                            lines.push(`  MOVE: ${fmtEvt(inst.source)}  -->  ${fmtEvt(inst.target, inst.date)}`);
                            lines.push(`        ${inst.persons.join(', ')}`);
                        } else if (inst.type === 'add') {
                            lines.push(`  ADD to ${fmtEvt(inst.target)}:`);
                            lines.push(`        ${inst.persons.join(', ')}`);
                        } else {
                            lines.push(`  REMOVE from ${fmtEvt(inst.source)}:`);
                            lines.push(`        ${inst.persons.join(', ')}`);
                        }
                    });
                    lines.push('');
                });
                navigator.clipboard.writeText(lines.join('\n').trim()).catch(() => {});
            }, [changes]);

            // Create custom event
            const handleCreateEvent = useCallback((newEvent) => {
                // Add to localStorage custom events list
                const customs = loadCustomEvents();
                customs.push(newEvent);
                saveCustomEvents(customs);
                // Add to working events + allEvents (so it persists through filter)
                setWorkingEvents(prev => [...prev, { ...newEvent, personnel: [...newEvent.personnel] }]);
            }, []);

            // Delete custom event
            const handleDeleteCustomEvent = useCallback((eventId) => {
                const customs = loadCustomEvents().filter(e => e.id !== eventId);
                saveCustomEvents(customs);
                setWorkingEvents(prev => prev.filter(ev => ev.id !== eventId));
            }, []);

            const scrollToDay = (date) => {
                const idx = dates.indexOf(date);
                if (idx >= 0 && timelineRef.current) {
                    timelineRef.current.scrollTo({ left: idx * DAY_COL_WIDTH, behavior: 'smooth' });
                }
            };

            const conflictCount = useMemo(() => {
                const src = viewMode === 'whiteboard' ? wbDayConflicts : conflicts;
                const people = new Set();
                src.forEach(pm => pm.forEach((_, p) => people.add(p)));
                return people.size;
            }, [conflicts, wbDayConflicts, viewMode]);

            const today = new Date().toISOString().slice(0, 10);

            return (
                <div className="app-layout">
                    <div className="app-header">
                        <div className="flex items-center gap-4">
                            <div>
                                <h1 className="text-sm font-bold text-white tracking-tight">
                                    TPS INTERACTIVE SCHEDULER
                                    <span className={`saved-indicator ${savedShow ? 'show' : ''}`}>saved</span>
                                </h1>
                                <p className="text-xs text-gray-500">
                                    {visibleEvents.length} events
                                    {conflictCount > 0 && (
                                        <button
                                            onClick={() => setShowConflictSummary(true)}
                                            style={{ background: 'none', border: 'none', cursor: 'pointer',
                                                     fontFamily: 'inherit', fontSize: 'inherit', padding: 0 }}
                                            className="text-red-400 ml-2"
                                            title="View conflict summary"
                                        >
                                            &#9888; {conflictCount} conflict{conflictCount > 1 ? 's' : ''}{viewMode === 'whiteboard' ? ' (today)' : ''}
                                        </button>
                                    )}
                                </p>
                            </div>
                            {viewMode === 'timeline' && (
                                <div className="day-tabs ml-4">
                                    {dates.map(d => {
                                        const h = fmtDate(d);
                                        return <div key={d} className={`day-tab ${d === today ? 'today' : ''}`} onClick={() => scrollToDay(d)}>{h.weekday} {h.day}</div>;
                                    })}
                                </div>
                            )}
                            {viewMode === 'whiteboard' && (
                                <div className="day-tabs ml-4">
                                    {dates.map(d => {
                                        const h = fmtDate(d);
                                        const activeDayResolved = wbActiveDay || (dates.includes(today) ? today : dates[0]);
                                        return <div key={d} className={`day-tab ${d === activeDayResolved ? 'today' : ''}`} onClick={() => setWbActiveDay(d)}>{h.weekday} {h.day}</div>;
                                    })}
                                </div>
                            )}
                        </div>
                        <div className="flex items-center gap-3">
                            <button
                                className={`focus-toggle-btn ${focusEnabled ? 'on' : 'off'}`}
                                onClick={() => { setFocusEnabled(prev => { if (prev) setFocusedEventId(null); return !prev; }); }}
                                title={focusEnabled ? 'Focus mode ON — click events to highlight and see availability' : 'Focus mode OFF'}
                            >Focus {focusEnabled ? 'ON' : 'OFF'}</button>
                            <button
                                className="filter-btn"
                                onClick={() => setShowCreateEvent(true)}
                                title="Create a new custom event"
                                style={{ borderColor: 'rgba(96,165,250,0.4)', color: '#60a5fa', fontWeight: 700, fontSize: '0.85rem', padding: '2px 10px' }}
                            >+</button>
                            <div className="view-tabs">
                                <div className={`view-tab ${viewMode === 'timeline' ? 'active' : ''}`} onClick={() => setViewMode('timeline')}>Timeline</div>
                                <div className={`view-tab ${viewMode === 'rainbow' ? 'active' : ''}`} onClick={() => setViewMode('rainbow')}>Rainbow</div>
                                <div className={`view-tab ${viewMode === 'whiteboard' ? 'active' : ''}`} onClick={() => setViewMode('whiteboard')}>Whiteboard</div>
                            </div>
                            <button onClick={onChangeSelection} className="filter-btn">Edit Selection</button>
                            <button onClick={() => setShowRefreshModal(true)} className="filter-btn" style={{ borderColor: 'rgba(59,130,246,0.3)', color: '#60a5fa', display: 'flex', flexDirection: 'column', alignItems: 'center', lineHeight: 1.2 }}>
                                <span>Refresh from Whiteboard</span>
                                <span style={{ fontSize: '0.45rem', color: 'rgba(96,165,250,0.5)', fontWeight: 400 }}>Clears local work</span>
                            </button>
                        </div>
                    </div>

                    {/* Both views always mounted; hidden via display:none to preserve scroll/state */}
                    <div className="timeline-area" ref={timelineRef} style={viewMode !== 'timeline' ? { display: 'none' } : undefined}
                        onClick={(e) => { if (focusEnabled && !e.target.closest('.event-card')) setFocusedEventId(null); }}>
                        <div className="days-container">
                            {dates.map(date => (
                                <DayColumn
                                    key={date}
                                    date={date}
                                    events={eventsByDate[date] || []}
                                    roster={roster}
                                    conflicts={conflicts}
                                    foaAuth={foaByDate[date] || { foa: null, auth: null }}
                                    onRemove={handleRemove}
                                    onAdd={handleAdd}
                                    onShowTooltip={showTooltip}
                                    onHideTooltip={hideTooltip}
                                    focusedEventId={focusedEventId}
                                    onFocusEvent={setFocusedEventId}
                                    focusEnabled={focusEnabled}
                                    onDeleteCustom={handleDeleteCustomEvent}
                                    onEventAction={handleEventActionClick}
                                    onAddPlaceholder={handleAddPlaceholder}
                                    onFillPlaceholder={handleFillPlaceholder}
                                    onRemovePlaceholder={handleRemovePlaceholder}
                                />
                            ))}
                        </div>
                    </div>

                    <div style={{ gridColumn: 1, gridRow: 3, display: (viewMode !== 'timeline' && viewMode !== 'whiteboard') ? 'none' : undefined }}>
                        <PersonnelPicker roster={roster} allEvents={workingEvents} conflicts={viewMode === 'whiteboard' ? wbDayConflicts : conflicts} onShowTooltip={showTooltip} onHideTooltip={hideTooltip} focusedAvailability={focusedAvailability} />
                    </div>

                    {/* Rainbow: always mounted for state preservation but hidden when not active */}
                    <div className="rainbow-area" style={viewMode !== 'rainbow' ? { display: 'none' } : undefined}>
                        <RainbowView workingEvents={workingEvents} roster={roster} dates={dates} />
                    </div>

                    {/* Whiteboard: always mounted for state preservation */}
                    <div style={viewMode !== 'whiteboard' ? { display: 'none' } : { gridColumn: 1, gridRow: 2, overflow: 'hidden' }}>
                        <WhiteboardView
                            workingEvents={workingEvents}
                            roster={roster}
                            conflicts={wbDayConflicts}
                            dates={dates}
                            today={today}
                            activeDay={wbActiveDay || (dates && (dates.includes(today) ? today : dates[0]))}
                            onDayChange={setWbActiveDay}
                            onAdd={handleAdd}
                            onRemove={handleRemove}
                            onEditSave={handleEditSave}
                            onStatusChange={handleStatusChange}
                            onDeleteEvent={(ev) => setConfirmDelete(ev)}
                            onDeleteCustom={handleDeleteCustomEvent}
                            onCreateEvent={handleCreateEvent}
                            focusedEventId={focusedEventId}
                            onFocusEvent={setFocusedEventId}
                            onShowTooltip={showTooltip}
                            onHideTooltip={hideTooltip}
                            onAddPlaceholder={handleAddPlaceholder}
                            onRemovePlaceholder={handleRemovePlaceholder}
                            onFillPlaceholder={handleFillPlaceholder}
                        />
                    </div>

                    <ChangeSummary
                        changes={changes}
                        onUndoGroup={handleUndoGroup}
                        onClearAll={handleClearAll}
                        onCopy={handleCopy}
                    />

                    {showRefreshModal && (
                        <div className="modal-overlay" onClick={() => setShowRefreshModal(false)}>
                            <div className="modal-content" onClick={e => e.stopPropagation()} style={{ maxWidth: 440 }}>
                                <h2 className="text-lg font-bold text-white mb-4">Refresh from Whiteboard 2.0</h2>
                                <p style={{ fontSize: '0.7rem', color: '#9ca3af', marginBottom: 16 }}>
                                    This will discard all local changes and pull fresh data.
                                </p>
                                <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                                    <button
                                        onClick={() => { setShowRefreshModal(false); onRefreshFromWhiteboard('quick'); }}
                                        style={{ padding: '12px 16px', background: 'rgba(59,130,246,0.15)', border: '1px solid rgba(59,130,246,0.4)', borderRadius: 8, cursor: 'pointer', textAlign: 'left' }}
                                    >
                                        <div style={{ fontWeight: 700, color: '#60a5fa', fontSize: '0.75rem', marginBottom: 2 }}>Quick Refresh</div>
                                        <div style={{ fontSize: '0.6rem', color: '#9ca3af' }}>
                                            Pulls latest cached data from the server. Fast (~10 seconds).
                                            Use this for routine refreshes during the day.
                                        </div>
                                    </button>
                                    <button
                                        onClick={() => { setShowRefreshModal(false); onRefreshFromWhiteboard('full'); }}
                                        style={{ padding: '12px 16px', background: 'rgba(245,158,11,0.1)', border: '1px solid rgba(245,158,11,0.3)', borderRadius: 8, cursor: 'pointer', textAlign: 'left' }}
                                    >
                                        <div style={{ fontWeight: 700, color: '#fbbf24', fontSize: '0.75rem', marginBottom: 2 }}>Full Refresh</div>
                                        <div style={{ fontSize: '0.6rem', color: '#9ca3af' }}>
                                            Forces Google Apps Script to re-pull all data from Whiteboard 2.0.
                                            Slower (~1 minute). Use when data seems stale or after schedule changes in Whiteboard.
                                        </div>
                                    </button>
                                </div>
                                <button onClick={() => setShowRefreshModal(false)} style={{ marginTop: 12, padding: '6px 12px', background: 'transparent', border: '1px solid rgba(255,255,255,0.15)', borderRadius: 6, color: '#9ca3af', cursor: 'pointer', fontSize: '0.6rem', width: '100%' }}>
                                    Cancel
                                </button>
                            </div>
                        </div>
                    )}

                    {showCreateEvent && (
                        <CreateEventModal
                            dates={dates}
                            onClose={() => setShowCreateEvent(false)}
                            onCreate={handleCreateEvent}
                        />
                    )}

                    {showConflictSummary && (
                        <ConflictSummaryModal
                            conflicts={viewMode === 'whiteboard' ? wbDayConflicts : conflicts}
                            workingEvents={workingEvents}
                            onClose={() => setShowConflictSummary(false)}
                        />
                    )}

                    {tooltip && (
                        <div className="conflict-tooltip-portal" style={{
                            left: tooltip.x, top: tooltip.y,
                            transform: tooltip.above ? 'translate(-50%, -100%)' : 'translateX(-50%)',
                        }}>
                            {tooltip.text}
                        </div>
                    )}

                    {/* Action menu portal */}
                    {actionMenu && (
                        <EventActionMenu
                            event={actionMenu.event}
                            position={actionMenu.position}
                            onEdit={() => { setEditingEvent(actionMenu.event); setActionMenu(null); }}
                            onCancel={() => handleCancelEvent(actionMenu.event.id)}
                            onDelete={() => handleDeleteEvent(actionMenu.event)}
                            onClose={() => setActionMenu(null)}
                        />
                    )}
                    {editingEvent && (
                        <EditEventModal
                            event={editingEvent}
                            onSave={handleEditSave}
                            onClose={() => setEditingEvent(null)}
                        />
                    )}
                    {confirmDelete && (
                        <ConfirmDeleteModal
                            event={confirmDelete}
                            onCancelEvent={() => { handleCancelEvent(confirmDelete.id); setConfirmDelete(null); }}
                            onConfirmDelete={handleDeleteConfirmed}
                            onClose={() => setConfirmDelete(null)}
                        />
                    )}
                </div>
            );
        };

        // ==========================================
        // APP
        // ==========================================

        const THEME_KEY = 'tps-scheduler-theme';

        function App() {
            // Theme state: default to dark, persist to localStorage
            const [darkMode, setDarkMode] = useState(() => localStorage.getItem(THEME_KEY) !== 'light');

            useEffect(() => {
                document.body.classList.toggle('light-mode', !darkMode);
                localStorage.setItem(THEME_KEY, darkMode ? 'dark' : 'light');
            }, [darkMode]);

            const [screen, setScreen] = useState('loading');
            const [allEvents, setAllEvents] = useState([]);
            const [roster, setRoster] = useState({});
            const [dates, setDates] = useState([]);
            const [selectedIds, setSelectedIds] = useState(new Set());
            const [naCats, setNaCats] = useState(new Set());
            const [selectAllActive, setSelectAllActive] = useState(false); // T7
            const [progress, setProgress] = useState('Initializing...');
            const [error, setError] = useState(null);
            const [cachedWorkingState, setCachedWorkingState] = useState(null);

            const refreshFromWhiteboard = useCallback(async (mode) => {
                clearWorkingCopy();
                setCachedWorkingState(null);
                setScreen('loading');

                // Save current selections before refresh
                const savedSelections = loadState();

                try {
                    const batchUrl = mode === 'full'
                        ? `${API_URL}?type=batch&refresh=true`
                        : `${API_URL}?type=batch`;
                    setProgress(mode === 'full' ? 'Full refresh from Whiteboard 2.0 (typically 30s)...' : 'Quick refresh...');

                    const [rosterRes, batchRes] = await Promise.all([
                        fetch(`${API_URL}?type=roster`),
                        fetch(batchUrl)
                    ]);
                    const rosterJson = await rosterRes.json();
                    const batchJson = await batchRes.json();
                    if (rosterJson.error) throw new Error(rosterJson.message);
                    if (batchJson.error) throw new Error(batchJson.message);

                    const loadedRoster = rosterJson.roster;
