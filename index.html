            { id: 'blank-stcb',    label: 'STC-B',     cat: 'STC-B',           role: 'STC-B',     canRename: false },
            { id: 'blank-generic', label: 'Generic',   cat: null,              role: 'Generic',   canRename: true  },
        ];

        // Placeholder roles whose unfilled chips support click-to-rename
        const RENAMEABLE_PH_ROLES = new Set(['IP', 'IFTE/ICSO', 'Staff STC', 'Generic']);

        // Fill rules: which roster categories can fill each placeholder role.
        // null means any category (Generic).
        // TODO: When event-type lookup table is built, auto-populate placeholders[] from
        // eventName/model — see design doc 2026-03-01-placeholder-pucks-design.md
        const PLACEHOLDER_FILL_RULES = {
            'IP':        new Set(['Staff IP', 'Attached/Support']),
            'IFTE/ICSO': new Set(['Staff IFTE/ICSO', 'Staff STC', 'Attached/Support']),
            'Staff STC': new Set(['Staff STC']),
            'FTC-A':     new Set(['FTC-A']),
            'FTC-B':     new Set(['FTC-B']),
            'STC-A':     new Set(['STC-A']),
            'STC-B':     new Set(['STC-B']),
            'Generic':   null,
        };

        // Returns true if personCatName can fill the given placeholder role.
        const canFillPlaceholder = (role, personCatName) => {
            const allowed = PLACEHOLDER_FILL_RULES[role];
            if (allowed === null) return true;  // Generic accepts anyone
            if (!allowed) return false;         // unknown role — deny
            if (!personCatName) return false;
            return allowed.has(personCatName);
        };

        // Shared role→color helper used by PlaceholderChip and EventCard timeline
        const getPlaceholderRoleColor = (role) => role === 'Generic'
            ? GENERIC_PUCK_COLOR
            : (CATEGORY_COLORS[role === 'IP' ? 'Staff IP' : role === 'IFTE/ICSO' ? 'Staff IFTE/ICSO' : role] || DEFAULT_CHIP);

        // Returns a new placeholder object with a unique id.
        const makePlaceholder = (role, filledBy = null) => ({
            id: `ph-${Date.now()}-${Math.random().toString(36).slice(2, 9)}`,
            role,
            filledBy,
        });

        // Ordered list for the add-placeholder popover (Task 4)
        const PLACEHOLDER_ROLE_OPTIONS = [
            { role: 'IP',        colorCat: 'Staff IP'        },
            { role: 'IFTE/ICSO', colorCat: 'Staff IFTE/ICSO' },
            { role: 'Staff STC', colorCat: 'Staff STC'        },
            { role: 'FTC-A',     colorCat: 'FTC-A'           },
            { role: 'FTC-B',     colorCat: 'FTC-B'           },
            { role: 'STC-A',     colorCat: 'STC-A'           },
            { role: 'STC-B',     colorCat: 'STC-B'           },
            { role: 'Generic',   colorCat: null              },
        ];

        // Highlight colors for the contextual picker (class colors + yellow)
        const WB_HIGHLIGHT_COLORS = [
            { key: 'yellow', bg: '#facc15', label: 'Attention' },
            { key: 'ftca',   bg: '#7c3aed', label: 'FTC-A' },
            { key: 'ftcb',   bg: '#ea580c', label: 'FTC-B' },
            { key: 'stca',   bg: '#9333ea', label: 'STC-A' },
            { key: 'stcb',   bg: '#f97316', label: 'STC-B' },
            { key: 'ip',     bg: '#16a34a', label: 'Staff IP' },
            { key: 'ifte',   bg: '#4338ca', label: 'IFTE' },
        ];
        const WB_HIGHLIGHT_BG = Object.fromEntries(WB_HIGHLIGHT_COLORS.map(c => [c.key, c.bg]));

        // ==========================================
        // UTILITIES
        // ==========================================

        const timeToMinutes = (str) => {
            if (!str) return null;
            const m = str.match(/(\d{1,2}):(\d{2})/);
            return m ? parseInt(m[1]) * 60 + parseInt(m[2]) : null;
        };

        const minutesToTime = (mins) => {
            const h = Math.floor(mins / 60);
            const m = Math.floor(mins % 60);
            return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
        };

        const timePct = (mins) => Math.max(0, Math.min(100, ((mins - TIMELINE_START) / TIMELINE_RANGE) * 100));

        let _eid = 0;
        const mkId = () => `evt-${++_eid}`;

        const evStart = (ev) => timeToMinutes(ev.startTime);
        const evEnd = (ev) => {
            const e = timeToMinutes(ev.endTime);
            const s = timeToMinutes(ev.startTime);
            return e || (s ? s + 60 : TIMELINE_END);
        };

        // Effective visual end accounting for min-width:140px expansion
        const visualEnd = (ev) => {
            const s = evStart(ev);
            const e = evEnd(ev);
            if (s == null) return e;
            const dur = e - s;
            const widthPct = (dur / TIMELINE_RANGE) * 100;
            const cardPx = (widthPct / 100) * DAY_COL_WIDTH;
            if (cardPx >= 140) return e;
            // Card is expanded to 140px — compute what end time that corresponds to
            const expandedPct = (140 / DAY_COL_WIDTH) * 100;
            const expandedDur = (expandedPct / 100) * TIMELINE_RANGE;
            return s + expandedDur;
        };

        const overlap = (a, b) => {
            const aS = evStart(a), aE = evEnd(a), bS = evStart(b), bE = evEnd(b);
            if (aS == null || bS == null) return false;
            return aS < bE && bS < aE;
        };

        const fmtDate = (iso) => {
            const [y,m,d] = iso.split('-').map(Number);
            const dt = new Date(Date.UTC(y, m-1, d));
            const wd = dt.toLocaleDateString('en-US', { weekday: 'short', timeZone: 'UTC' });
            const mo = dt.toLocaleDateString('en-US', { month: 'short', timeZone: 'UTC' });
            return { weekday: wd, day: d, month: mo, full: `${wd} ${d} ${mo}` };
        };

        const personCat = (name, roster) => {
            for (const [cat, members] of Object.entries(roster)) {
                if (members.includes(name)) return cat;
            }
            return null;
        };

        const chipColor = (name, roster) => {
            const cat = personCat(name, roster);
            return (cat && CATEGORY_COLORS[cat]) || DEFAULT_CHIP;
        };

        // Filter out strings that are notes, not names
        const isValidName = (str) => {
            if (!str || typeof str !== 'string') return false;
            const t = str.trim();
            if (!t || t.length > 25) return false;
            if (t === 'FALSE' || t === 'TRUE') return false;
            if (t.split(/\s+/).length > 4) return false;
            return true;
        };

        // ==========================================
        // DATA TRANSFORMATION
        // ==========================================

        const transformSheetReturn = (sheet, date) => {
            const events = [];
            if (!sheet || !sheet.schedule) return events;
            sheet.schedule.forEach(item => {
                const sec = item.section;
                const personnel = (item.personnel || []).filter(isValidName).map(p => p.trim());
                if (sec === 'Supervision' || sec === 'Academics') {
                    events.push({
                        id: mkId(), section: sec, date,
                        model: null,
                        eventName: sec === 'Supervision' ? item.details.duty : item.details.eventName,
                        startTime: item.details.startTime || item.time,
                        endTime: item.details.endTime || null,
                        etd: null, eta: null,
                        personnel: [...personnel],
                        originalPersonnel: [...personnel],
                        notes: null, readonly: true,
                    });
                } else if (sec === 'Flying') {
                    events.push({
                        id: mkId(), section: 'Flying', date,
                        model: (item.details.model || '').trim(),
                        eventName: item.details.eventName || '',
                        startTime: item.details.briefTime || item.time,
                        endTime: item.details.debriefEnd || null,
                        etd: item.details.etd || null,
                        eta: item.details.eta || null,
                        personnel: [...personnel],
                        originalPersonnel: [...personnel],
                        notes: item.details.notes === 'FALSE' ? null : item.details.notes,
                        readonly: false,
                    });
                } else if (sec === 'Ground') {
                    events.push({
                        id: mkId(), section: 'Ground', date,
                        model: null,
                        eventName: item.details.eventName || '',
                        startTime: item.details.startTime || item.time,
                        endTime: item.details.endTime || null,
                        etd: null, eta: null,
                        personnel: [...personnel],
                        originalPersonnel: [...personnel],
                        notes: item.details.notes, readonly: false,
                    });
                } else if (sec === 'NA') {
                    events.push({
                        id: mkId(), section: 'NA', date,
                        model: null,
                        eventName: item.details.reason || 'NA',
                        startTime: item.details.startTime || item.time,
                        endTime: item.details.endTime || null,
                        etd: null, eta: null,
                        personnel: [...personnel],
                        originalPersonnel: [...personnel],
                        notes: null, readonly: false,
                        cancelled: false,
                        effective: false,
                        partiallyEffective: false,
                    });
                }
            });
            return events;
        };

        const transformBatchData = (batchJson, roster) => {
            const all = [];
            if (!batchJson || !batchJson.days) return all;

            batchJson.days.forEach(dayData => {
                const date = dayData.isoDate;
                const raw = dayData.data;

                if (raw.flying) {
                    raw.flying.forEach(row => {
                        const briefTime = row[1];
                        const eventName = row[5];
                        const model = (row[0] || '').trim();
                        if (eventName === 'Event') return; // skip header row
                        if (!briefTime && !eventName && !model) return; // skip truly empty rows
                        const crew = row.slice(6, 14).filter(isValidName).map(c => c.trim());
                        // Effectivity columns: row[15]=Effective, row[16]=CX/Non-E, row[17]=Partially Effective
                        const effField = row[15];
                        const cxField = row[16];
                        const peField = row[17];
                        const cancelled = (cxField === 'TRUE' || cxField === true || cxField === 'CX');
                        const effective = (effField === 'TRUE' || effField === true);
                        const partiallyEffective = (peField === 'TRUE' || peField === true);
                        all.push({
                            id: mkId(), section: 'Flying', date,
                            model,
                            eventName: eventName || model || 'Unnamed Event',
                            startTime: briefTime,
                            endTime: row[4],
                            etd: row[2], eta: row[3],
                            personnel: crew,
                            originalPersonnel: [...crew],
                            notes: (row[14] && row[14] !== 'FALSE') ? row[14] : null,
                            readonly: false,
                            cancelled,
                            effective,
                            partiallyEffective,
                        });
                    });
                }

                if (raw.ground) {
                    raw.ground.forEach(row => {
                        const evName = row[0];
                        const start = row[1];
                        if (evName === 'Events') return; // skip header row
                        if (!evName && !start) return; // skip truly empty rows
                        const people = row.slice(3, 13).filter(isValidName).map(p => p.trim());
                        // Effectivity columns: row[14]=Effective, row[15]=CX/Non-E, row[16]=Partially Effective
                        const effGround = row[14];
                        const cxGround = row[15];
                        const peGround = row[16];
                        const cancelled = (cxGround === 'TRUE' || cxGround === true || cxGround === 'CX');
                        const effective = (effGround === 'TRUE' || effGround === true);
                        const partiallyEffective = (peGround === 'TRUE' || peGround === true);
                        all.push({
                            id: mkId(), section: 'Ground', date,
                            model: null, eventName: evName || 'Unnamed Event',
                            startTime: start, endTime: row[2],
                            etd: null, eta: null,
                            personnel: people,
                            originalPersonnel: [...people],
                            notes: (row[13] && row[13] !== 'FALSE') ? row[13] : null,
                            readonly: false,
                            cancelled,
                            effective,
                            partiallyEffective,
                        });
                    });
                }

                if (raw.na) {
                    raw.na.forEach(row => {
                        const reason = row[0];
                        const start = row[1];
                        if (!reason || !start || reason === 'Reason') return;
                        const people = row.slice(3).filter(isValidName).map(p => p.trim());
                        all.push({
                            id: mkId(), section: 'NA', date,
                            model: null, eventName: reason,
                            startTime: start, endTime: row[2],
                            etd: null, eta: null,
                            personnel: people,
                            originalPersonnel: [...people],
                            notes: null, readonly: false,
                            cancelled: false,
                            effective: false,
                            partiallyEffective: false,
                        });
                    });
                }

                if (raw.supervision) {
                    raw.supervision.forEach(row => {
                        // Detect FOA/AUTH footer row BEFORE the empty-duty guard.
                        // Footer row structure: row[0]="" row[9]="FOA" row[10]=foaPerson row[12]="AUTH" row[13]=authPerson
                        if (row[9] === 'FOA') {
                            const foaPerson = (row[10] && row[10].trim()) ? row[10].trim() : null;
                            const authPerson = (row[13] && row[13].trim()) ? row[13].trim() : null;
                            if (foaPerson && isValidName(foaPerson)) {
                                all.push({
                                    id: mkId(), section: 'Supervision', date,
                                    model: null, eventName: 'FOA',
                                    startTime: null, endTime: null,
                                    etd: null, eta: null,
                                    personnel: [foaPerson],
                                    originalPersonnel: [foaPerson],
                                    notes: null, readonly: false,
                                    cancelled: false,
                                });
                            }
                            if (authPerson && isValidName(authPerson)) {
                                all.push({
                                    id: mkId(), section: 'Supervision', date,
                                    model: null, eventName: 'AUTH',
                                    startTime: null, endTime: null,
                                    etd: null, eta: null,
                                    personnel: [authPerson],
                                    originalPersonnel: [authPerson],
                                    notes: null, readonly: false,
                                    cancelled: false,
                                });
                            }
                            return; // footer row consumed, skip triplet loop
                        }
                        const duty = row[0];
                        if (!duty || duty === 'Supervision' || !duty.trim()) return;
                        for (let i = 1; i < row.length - 2; i += 3) {
                            const poc = row[i];
                            if (poc && poc.trim() && isValidName(poc)) {
                                all.push({
                                    id: mkId(), section: 'Supervision', date,
                                    model: null, eventName: duty.trim(),
                                    startTime: row[i+1], endTime: row[i+2],
                                    etd: null, eta: null,
                                    personnel: [poc.trim()],
                                    originalPersonnel: [poc.trim()],
                                    notes: null, readonly: false,
                                    cancelled: false,
                                });
                            }
                        }
                    });
                }

                if (raw.academics) {
                    const gm = { 'Alpha FTC':'FTC-A','Alpha STC':'STC-A','Bravo FTC':'FTC-B','Bravo STC':'STC-B','IP':'Staff IP','Staff STC':'Staff STC','IFTE/IWSO':'Staff IFTE/ICSO' };
                    raw.academics.forEach(row => {
                        const group = row[0], start = row[1];
                        if (!group || !start || group === 'Academics') return;
                        const cat = gm[group.trim()];
                        const people = (cat && roster[cat]) || [];
                        all.push({
                            id: mkId(), section: 'Academics', date,
                            model: null, eventName: `${group} Academics`,
                            startTime: start, endTime: row[2],
                            etd: null, eta: null,
                            personnel: [...people],
                            originalPersonnel: [...people],
                            notes: null, readonly: true,
                            cancelled: false,
                        });
                    });
                }
            });

            return all;
        };

        // ==========================================
        // DUPLICATE EVENT MERGING
        // ==========================================

        // Returns true if name appears in any staff roster category
        const isStaff = (name, roster) => {
            if (!name || !roster) return false;
            const staffCategories = ['Staff IP', 'Staff IFTE/ICSO', 'Staff STC', 'Attached/Support'];
            return staffCategories.some(cat =>
                (roster[cat] || []).some(rName => rName.trim() === name.trim())
            );
        };

        const mergeDuplicateEvents = (events, roster) => {
            // DISABLED: merge logic causes false positives (merges separate events
            // with same model/times but different crews). See v3.6.1 feedback.
            // Keeping function + logic intact for potential future re-enable.
            return events;

            if (!events || events.length === 0) return events;

            const mergeableEvents = [];

            events.forEach(ev => {
                if (ev.readonly || ev.section === 'NA' || ev.section === 'Supervision' || ev.section === 'Academics') {
                    // pass-through: not mergeable
                } else {
                    mergeableEvents.push(ev);
                }
            });

            // Phase 1: Group by base key WITHOUT personnel[0]
            const baseGroups = new Map();

            mergeableEvents.forEach(ev => {
                let key;
                if (ev.section === 'Flying') {
                    key = [ev.date, ev.section, (ev.model || '').trim(), (ev.eventName || '').trim(),
                        (ev.startTime || ''), (ev.endTime || ''), (ev.etd || ''), (ev.eta || '')].join('||');
                } else {
                    key = [ev.date, ev.section, (ev.eventName || '').trim(),
                        (ev.startTime || ''), (ev.endTime || '')].join('||');
                }
                if (!baseGroups.has(key)) baseGroups.set(key, []);
                baseGroups.get(key).push(ev);
            });

            // Phase 2: Within each base group, check distinct leads to decide merge strategy
            const mergedById = new Map();
            const removedIds = new Set();

            // Helper: get the lead (personnel[0]) from an event — used for sub-grouping
            const getLead = (ev) => {
                if (!ev.personnel || ev.personnel.length === 0) return null;
                return ev.personnel[0];
            };

            // Helper: merge a group of events into one, updating mergedById and removedIds
            const mergeGroup = (group) => {
                if (group.length <= 1) return;

                // Pick primary: prefer an event whose personnel[0] is staff (instructor lead)
                let primaryIdx = 0;
                for (let i = 0; i < group.length; i++) {
                    const lead = getLead(group[i]);
                    if (lead && isStaff(lead, roster)) { primaryIdx = i; break; }
                }
                const primary = group[primaryIdx];

                // Build combined personnel with lead first (prefer staff lead for ordering)
                const lead = getLead(primary);
                const staffLead = lead && isStaff(lead, roster) ? lead : null;
                const seen = new Set();
                const combinedPersonnel = [];
                if (staffLead) {
                    combinedPersonnel.push(staffLead);
                    seen.add(staffLead);
                }
                // Add primary's remaining personnel
                (primary.personnel || []).forEach(person => {
                    if (!seen.has(person)) { combinedPersonnel.push(person); seen.add(person); }
                });
                // Add all other events' personnel
                group.forEach((ev, i) => {
                    if (i === primaryIdx) return;
                    (ev.personnel || []).forEach(person => {
                        if (!seen.has(person)) { combinedPersonnel.push(person); seen.add(person); }
                    });
                });

                // Merge notes
                const noteSet = new Set();
                group.forEach(ev => { if (ev.notes && ev.notes.trim()) noteSet.add(ev.notes.trim()); });
                const mergedNotes = noteSet.size > 0 ? [...noteSet].join('; ') : primary.notes;

                // Merge Flying-specific fields
                let mergedEtd = primary.etd, mergedEta = primary.eta, mergedEndTime = primary.endTime;
                if (primary.section === 'Flying') {
                    group.forEach(ev => {
                        if (!mergedEtd && ev.etd) mergedEtd = ev.etd;
                        if (!mergedEta && ev.eta) mergedEta = ev.eta;
                        if (!mergedEndTime && ev.endTime) mergedEndTime = ev.endTime;
                    });
                }

                mergedById.set(primary.id, {
                    ...primary, etd: mergedEtd, eta: mergedEta, endTime: mergedEndTime,
                    personnel: combinedPersonnel, originalPersonnel: [...combinedPersonnel], notes: mergedNotes,
                });
                group.forEach((ev, i) => { if (i !== primaryIdx) removedIds.add(ev.id); });
            };

            baseGroups.forEach((group) => {
                if (group.length <= 1) return;

                // Find distinct leads (personnel[0]) in this base group
                const leads = new Set();
                group.forEach(ev => {
                    const lead = getLead(ev);
                    if (lead) leads.add(lead);
                });

                if (leads.size <= 1) {
                    // 0 or 1 distinct leads: merge everything together (same instructor overflow)
                    mergeGroup(group);
                } else {
                    // 2+ distinct leads: sub-group by personnel[0]
                    // Events with no personnel attach to the first sub-group
                    const subGroups = new Map(); // lead -> events
                    const noLeadEvents = [];

                    group.forEach(ev => {
                        const lead = getLead(ev);
                        if (lead) {
                            if (!subGroups.has(lead)) subGroups.set(lead, []);
                            subGroups.get(lead).push(ev);
                        } else {
                            noLeadEvents.push(ev);
                        }
                    });

                    // Distribute no-lead events into existing sub-groups
                    // Each no-lead event goes to the first sub-group (arbitrary but deterministic)
                    if (noLeadEvents.length > 0 && subGroups.size > 0) {
                        const firstKey = subGroups.keys().next().value;
                        noLeadEvents.forEach(ev => subGroups.get(firstKey).push(ev));
                    }

                    subGroups.forEach((subGroup) => {
                        mergeGroup(subGroup);
                    });
                }
            });

            // Rebuild result preserving original order, substituting merged events, dropping removed
            const result = [];
            events.forEach(ev => {
                if (removedIds.has(ev.id)) return;
                if (mergedById.has(ev.id)) result.push(mergedById.get(ev.id));
                else result.push(ev);
            });
            return result;
        };

        // ==========================================
        // CONFLICT DETECTION (with detail info)
        // ==========================================

        const detectConflicts = (allEvents) => {
            // Map: person||date -> [events]
            const pdMap = {};
            allEvents.forEach(ev => {
                if (ev.cancelled) return;          // exclude cancelled events from conflict detection
                ev.personnel.forEach(person => {
                    const k = `${person}||${ev.date}`;
                    if (!pdMap[k]) pdMap[k] = [];
                    pdMap[k].push(ev);
                });
            });

            // Map<eventId, Map<personName, [{eventName, model, section, startTime, endTime}]>>
            const conflicts = new Map();

            Object.values(pdMap).forEach(evList => {
                if (evList.length < 2) return;
                for (let i = 0; i < evList.length; i++) {
                    for (let j = i + 1; j < evList.length; j++) {
                        // Supervision-vs-supervision: roles are structured, no cross-role conflict flagging
                        if (evList[i].section === 'Supervision' && evList[j].section === 'Supervision') continue;
                        if (!overlap(evList[i], evList[j])) continue;
                        const common = evList[i].personnel.filter(p => evList[j].personnel.includes(p));
                        common.forEach(person => {
                            // Helper: add conflict entry if not already recorded (dedup by eventName+times)
                            const addConflict = (evId, entry) => {
                                if (!conflicts.has(evId)) conflicts.set(evId, new Map());
                                const cm = conflicts.get(evId);
                                if (!cm.has(person)) cm.set(person, []);
                                const arr = cm.get(person);
                                const dup = arr.some(c => c.eventName === entry.eventName && c.startTime === entry.startTime && c.endTime === entry.endTime);
                                if (!dup) arr.push(entry);
                            };
                            // Record on event i
                            addConflict(evList[i].id, {
                                eventName: evList[j].eventName, model: evList[j].model,
                                section: evList[j].section,
                                startTime: evList[j].startTime, endTime: evList[j].endTime,
                                date: evList[j].date,
                            });
                            // Record on event j
                            addConflict(evList[j].id, {
                                eventName: evList[i].eventName, model: evList[i].model,
                                section: evList[i].section,
                                startTime: evList[i].startTime, endTime: evList[i].endTime,
                                date: evList[i].date,
                            });
                        });
                    }
                }
            });

            return conflicts;
        };

        const getConflictText = (eventId, person, conflicts) => {
            const ec = conflicts.get(eventId);
            if (!ec) return null;
            const pc = ec.get(person);
            if (!pc || pc.length === 0) return null;
            // Group by date, sort chronologically
            const byDate = new Map();
            pc.forEach(c => {
                const d = c.date || '?';
                if (!byDate.has(d)) byDate.set(d, []);
                const m = c.model ? `${c.model} ` : '';
                byDate.get(d).push(`  ${m}${c.eventName} (${c.startTime}-${c.endTime || '??'})`);
            });
            const lines = [];
            [...byDate.keys()].sort().forEach(date => {
                const header = (date && date !== '?')
                    ? `${fmtDate(date).full}:`
                    : `${date}:`;
                lines.push(header);
                byDate.get(date).forEach(l => lines.push(l));
            });
            return lines.join('\n');
        };

        const hasConflict = (eventId, person, conflicts) => {
            const ec = conflicts.get(eventId);
            return ec && ec.has(person);
        };

        const eventConflictCount = (eventId, conflicts) => {
            const ec = conflicts.get(eventId);
            return ec ? ec.size : 0;
        };

        // ==========================================
        // NET CHANGE COMPUTATION
        // ==========================================

        function computeNetChanges(changes) {
            if (!changes || changes.length === 0) return [];

            const EVENT_LEVEL_TYPES = new Set(['event-cancel', 'event-edit', 'event-delete']);

            // Collect event-level changes (cancel/edit/delete) as discrete entries
            const eventLevelItems = [];
            changes.forEach((ch, idx) => {
                if (EVENT_LEVEL_TYPES.has(ch.type)) {
                    eventLevelItems.push({
                        type: ch.type, date: ch.date, rawIndices: [idx], firstIndex: idx,
                        persons: [],
                        source: { eventId: ch.eventId, eventName: ch.eventName,
                                  eventModel: ch.eventModel, eventTime: ch.eventTime, date: ch.date },
                        cancelledBefore: ch.cancelledBefore, cancelledAfter: ch.cancelledAfter,
                        before: ch.before, after: ch.after,
                        deletedEvent: ch.deletedEvent,
                    });
                }
            });

            const netMap = new Map();
            changes.forEach((ch, idx) => {
                if (EVENT_LEVEL_TYPES.has(ch.type)) return; // handled above
                const key = `${ch.person}||${ch.eventId}`;
                if (!netMap.has(key)) {
                    netMap.set(key, {
                        net: 0, indices: [], person: ch.person, eventId: ch.eventId,
                        eventMeta: { eventId: ch.eventId, eventName: ch.eventName, eventModel: ch.eventModel,
                            eventTime: ch.eventTime, eventSection: ch.eventSection, date: ch.date },
                    });
                }
                const entry = netMap.get(key);
                entry.net += (ch.type === 'add' ? 1 : -1);
                entry.indices.push(idx);
            });

            const personEffects = new Map();
            for (const [, entry] of netMap) {
                if (!personEffects.has(entry.person)) {
                    personEffects.set(entry.person, { adds: [], removes: [], zeroIndices: [] });
                }
                const pe = personEffects.get(entry.person);
                if (entry.net > 0) pe.adds.push(entry);
                else if (entry.net < 0) pe.removes.push(entry);
                else pe.zeroIndices.push(...entry.indices);
            }

            const rawInstructions = [];
            for (const [person, pe] of personEffects) {
                pe.adds.sort((a, b) => Math.min(...a.indices) - Math.min(...b.indices));
                pe.removes.sort((a, b) => Math.min(...a.indices) - Math.min(...b.indices));
                const numMoves = Math.min(pe.adds.length, pe.removes.length);

                for (let i = 0; i < numMoves; i++) {
                    const rem = pe.removes[i], add = pe.adds[i];
                    const allIndices = [...rem.indices, ...add.indices];
                    if (numMoves === 1 && pe.adds.length === 1 && pe.removes.length === 1) {
                        allIndices.push(...pe.zeroIndices);
                    }
                    rawInstructions.push({ type: 'move', person, date: rem.eventMeta.date,
                        source: rem.eventMeta, target: add.eventMeta,
                        rawIndices: allIndices, firstIndex: Math.min(...allIndices) });
                }
                if (numMoves > 1 && pe.zeroIndices.length > 0) {
                    rawInstructions[rawInstructions.length - numMoves].rawIndices.push(...pe.zeroIndices);
                }
                for (let i = numMoves; i < pe.adds.length; i++) {
                    const add = pe.adds[i];
                    rawInstructions.push({ type: 'add', person, date: add.eventMeta.date,
                        source: null, target: add.eventMeta,
                        rawIndices: [...add.indices], firstIndex: Math.min(...add.indices) });
                }
                for (let i = numMoves; i < pe.removes.length; i++) {
                    const rem = pe.removes[i];
                    rawInstructions.push({ type: 'remove', person, date: rem.eventMeta.date,
                        source: rem.eventMeta, target: null,
                        rawIndices: [...rem.indices], firstIndex: Math.min(...rem.indices) });
                }
            }

            const groupMap = new Map();
            rawInstructions.forEach(inst => {
                let groupKey;
                if (inst.type === 'move') groupKey = `move||${inst.source.eventId}||${inst.target.eventId}`;
                else if (inst.type === 'add') groupKey = `add||${inst.target.eventId}`;
                else groupKey = `remove||${inst.source.eventId}`;

                if (!groupMap.has(groupKey)) {
                    groupMap.set(groupKey, { type: inst.type, persons: [], date: inst.date,
                        source: inst.source, target: inst.target, rawIndices: [], firstIndex: inst.firstIndex });
                }
                const group = groupMap.get(groupKey);
                group.persons.push(inst.person);
                group.rawIndices.push(...inst.rawIndices);
                group.firstIndex = Math.min(group.firstIndex, inst.firstIndex);
            });

            // Collapse event-cancel chains per eventId: even-length = net zero (omit), odd = keep last state
            const cancelGroups = new Map();
            eventLevelItems.forEach(item => {
                if (item.type === 'event-cancel') {
                    if (!cancelGroups.has(item.source.eventId)) cancelGroups.set(item.source.eventId, []);
                    cancelGroups.get(item.source.eventId).push(item);
                }
            });
            const handledCancelIds = new Set();
            const netEventItems = [];
            eventLevelItems.forEach(item => {
                if (item.type !== 'event-cancel') { netEventItems.push(item); return; }
                const eid = item.source.eventId;
                if (handledCancelIds.has(eid)) return;
                handledCancelIds.add(eid);
                const chain = cancelGroups.get(eid);
                if (chain.length % 2 === 0) return; // cancel+uncancel = net zero, omit
                // Odd-length chain: net effect is the last change; merge all rawIndices for full undo
                const allIndices = chain.flatMap(c => c.rawIndices);
                netEventItems.push({ ...chain[chain.length - 1], rawIndices: allIndices, firstIndex: Math.min(...allIndices) });
            });

            const result = [...Array.from(groupMap.values()), ...netEventItems];
            result.sort((a, b) => a.date !== b.date ? a.date.localeCompare(b.date) : a.firstIndex - b.firstIndex);
            return result;
        }

        // ==========================================
        // LANE ASSIGNMENT (dynamic heights)
        // ==========================================

        // ── Chip measurement constants (keep in sync with CSS) ──
        const CHIP_FONT_SIZE_REM = 0.58;    // .chip { font-size }
        const CHIP_FONT_WEIGHT   = 500;     // .chip { font-weight }
        const CHIP_HPAD          = 5;       // .chip { padding: 1px 5px } → 5px each side
        const CHIP_INNER_GAP     = 2;       // .chip { gap: 2px }
        const CHIP_REMOVE_CHAR   = '✕';     // chip-remove content
        const CHIP_REMOVE_FSIZE  = 0.50;    // .chip-remove { font-size: 0.5rem }
        const CHIP_CONFLICT_CHAR = '!';     // .conflict-icon content
        const CHIP_CONFLICT_FSIZE = 0.55;   // .conflict-icon { font-size: 0.55rem; font-weight: 700 }
        const CREW_AREA_GAP      = 2;       // .event-crew-area { gap: 2px }
        const CREW_AREA_HPAD     = 5;       // .event-crew-area { padding: 2px 5px 3px } → 5px each side
        const CREW_AREA_VPAD     = 5;       // .event-crew-area top(2) + bottom(3)
        const CHIP_ROW_H         = 16;      // measured chip height (font + padding + gap)
        const TITLE_BAR_H        = 18;      // title bar height
        const FLIGHT_BAR_H       = 14;      // ETD/ETA flight time bar
        const MIN_CARD_H         = 40;      // minimum event card height

        // Lazy-init character width measurement via canvas
        const _chipMetrics = { charW: null, removeW: null, conflictW: null };
        const getChipMetrics = () => {
            if (_chipMetrics.charW !== null) return _chipMetrics;
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const basePx = parseFloat(getComputedStyle(document.documentElement).fontSize) || 16;
            const chipPx = CHIP_FONT_SIZE_REM * basePx;
            ctx.font = `${CHIP_FONT_WEIGHT} ${chipPx}px 'JetBrains Mono', monospace`;
            _chipMetrics.charW = ctx.measureText('M').width;
            const removePx = CHIP_REMOVE_FSIZE * basePx;
            ctx.font = `${CHIP_FONT_WEIGHT} ${removePx}px 'JetBrains Mono', monospace`;
            _chipMetrics.removeW = ctx.measureText(CHIP_REMOVE_CHAR).width;
            const conflictPx = CHIP_CONFLICT_FSIZE * basePx;
            ctx.font = `700 ${conflictPx}px 'JetBrains Mono', monospace`;
            _chipMetrics.conflictW = ctx.measureText(CHIP_CONFLICT_CHAR).width;
            return _chipMetrics;
        };

        // Compute pixel width of a single personnel chip.
        // Conflict icon (!) is always included pessimistically — we don't know at layout
        // time which chips will have conflicts, and under-estimation causes row clipping.
        const measureChipWidth = (name, isReadonly) => {
            const m = getChipMetrics();
            let w = (CHIP_HPAD * 2);
            w += name.length * m.charW;
            w += CHIP_INNER_GAP + m.conflictW;          // always reserve space for '!'
            if (!isReadonly) w += CHIP_INNER_GAP + m.removeW + 1;
            return Math.ceil(w);
        };

        // Compute pixel width of a placeholder/button chip (no conflict icon).
        const measurePlaceholderChipWidth = (label, hasRemove) => {
            const m = getChipMetrics();
            let w = (CHIP_HPAD * 2) + label.length * m.charW;
            if (hasRemove) w += CHIP_INNER_GAP + m.removeW + 1;
            return Math.ceil(w);
        };

        // Greedy row packing — mirrors CSS flex-wrap first-fit behaviour
        const computeChipRows = (personnel, areaWidth, isReadonly) => {
            if (personnel.length === 0) return 1;
            let rows = 1, rowUsed = 0;
            for (let i = 0; i < personnel.length; i++) {
                const chipW = measureChipWidth(personnel[i], isReadonly);
                const needed = rowUsed === 0 ? chipW : CREW_AREA_GAP + chipW;
                if (rowUsed > 0 && rowUsed + needed > areaWidth) { rows++; rowUsed = chipW; }
                else { rowUsed += needed; }
            }
            return rows;
        };

        // Pack a mixed list of pre-measured widths using greedy first-fit row packing.
        const packChipWidths = (widths, areaWidth) => {
            if (widths.length === 0) return 1;
            let rows = 1, rowUsed = 0;
            for (const chipW of widths) {
                const needed = rowUsed === 0 ? chipW : CREW_AREA_GAP + chipW;
                if (rowUsed > 0 && rowUsed + needed > areaWidth) { rows++; rowUsed = chipW; }
                else { rowUsed += needed; }
            }
            return rows;
        };

        const estimateHeight = (ev) => {
            let h = TITLE_BAR_H;
            if (ev.section === 'Flying' && ev.etd && ev.eta) h += FLIGHT_BAR_H;

            const sMin = evStart(ev);
            const eMin = evEnd(ev);
            const dur = (eMin - sMin) || 60;
            const widthPct = (dur / TIMELINE_RANGE) * 100;
            const cardPxWidth = Math.max(140, (widthPct / 100) * DAY_COL_WIDTH);

            const chipAreaWidth = cardPxWidth - (CREW_AREA_HPAD * 2);
            // Include unfilled placeholder labels and + button in chip count for accurate height
            const unfilledPh = (ev.placeholders || []).filter(p => !p.filledBy);
            // Build per-chip pixel widths: personnel chips pessimistically include conflict icon,
            // placeholder/button chips don't have conflict icons so skip that extra width.
            const roleCount = {};
            const personnelWidths = ev.personnel.map(name => measureChipWidth(name, ev.readonly));
            const phWidths = unfilledPh.map(ph => {
                if (roleCount[ph.role] === undefined) roleCount[ph.role] = 0;
                const idx = roleCount[ph.role]++;
                const sameRoleCount = unfilledPh.filter(p => p.role === ph.role).length;
                const label = sameRoleCount > 1 ? `${ph.role} ${idx + 1}` : ph.role;
                return measurePlaceholderChipWidth(label, !ev.readonly);
            });
            const plusBtnWidth = !ev.readonly ? [measurePlaceholderChipWidth('+', false)] : [];
            const allWidths = [...personnelWidths, ...phWidths, ...plusBtnWidth];
            const rows = packChipWidths(allWidths, chipAreaWidth);
            h += (rows * CHIP_ROW_H) + CREW_AREA_VPAD;
            return Math.max(h, MIN_CARD_H);
        };

        const buildLayout = (events) => {
            if (events.length === 0) return { evMap: {}, total: 0 };

            const sorted = [...events].sort((a, b) => (evStart(a) || 0) - (evStart(b) || 0));
            const lanes = [];
            const laneOf = {};

            sorted.forEach(ev => {
                let placed = false;
                for (let i = 0; i < lanes.length; i++) {
                    const last = lanes[i][lanes[i].length - 1];
                    if ((evStart(ev) || 0) >= (visualEnd(last) || 0)) {
                        lanes[i].push(ev);
                        laneOf[ev.id] = i;
                        placed = true;
                        break;
                    }
                }
                if (!placed) {
                    lanes.push([ev]);
                    laneOf[ev.id] = lanes.length - 1;
                }
            });

            // Lane heights
            const laneH = lanes.map(lane => Math.max(...lane.map(estimateHeight)));
            const laneTop = [];
            let cum = 0;
            laneH.forEach((h, i) => { laneTop[i] = cum; cum += h + 3; });

            const evMap = {};
            events.forEach(ev => {
                const li = laneOf[ev.id] ?? 0;
                evMap[ev.id] = { top: laneTop[li] || 0, height: estimateHeight(ev) };
            });

            return { evMap, total: cum };
        };

        // Supervision-specific layout: each duty role gets its own band in SUPERVISION_ROLE_ORDER.
        // Within each band, genuine time overlaps get stacked into sub-lanes.
        // Returns evMap (id → {top,height}) and roleBands ([{role,top,height}]) for the separator overlay.
        const buildSupervisionLayout = (events) => {
            if (events.length === 0) return { evMap: {}, total: 0, roleBands: [] };

            const SUPV_LANE_H = 40; // px per sub-lane
            const SUBLANE_GAP = 2;  // px between sub-lanes within a role
            const ROLE_GAP = 4;     // px between role groups
            const LABEL_H = 12;     // px reserved at top of each band for the role label

            // Group events by role (eventName)
            const roleGroups = new Map();
            events.forEach(ev => {
                if (!roleGroups.has(ev.eventName)) roleGroups.set(ev.eventName, []);
                roleGroups.get(ev.eventName).push(ev);
            });

            // Sort events within each role by start time
            roleGroups.forEach(evs => evs.sort((a, b) => (evStart(a) || 0) - (evStart(b) || 0)));

            // Order role bands: known roles first, then unknowns sorted alphabetically
            const orderedRoles = [
                ...SUPERVISION_ROLE_ORDER.filter(r => roleGroups.has(r)),
                ...[...roleGroups.keys()].filter(r => !SUPERVISION_ROLE_ORDER.includes(r)).sort(),
            ];

            const evMap = {};
            const roleBands = [];
            let cum = 0;

            orderedRoles.forEach(role => {
                const roleEvs = roleGroups.get(role);

                // Greedy sub-lane packing: assign each event to the first lane it fits in
                const subLanes = []; // each lane is an array of events
                roleEvs.forEach(ev => {
                    const s = evStart(ev) || 0;
                    let placed = false;
                    for (let i = 0; i < subLanes.length; i++) {
                        const lastEv = subLanes[i][subLanes[i].length - 1];
                        if (s >= (visualEnd(lastEv) || s)) {
                            subLanes[i].push(ev);
                            placed = true;
                            break;
                        }
                    }
                    if (!placed) subLanes.push([ev]);
                });

                const roleH = LABEL_H + subLanes.length * SUPV_LANE_H + Math.max(0, subLanes.length - 1) * SUBLANE_GAP;
                roleBands.push({ role, top: cum, height: roleH });

                subLanes.forEach((lane, li) => {
                    const laneTop = cum + LABEL_H + li * (SUPV_LANE_H + SUBLANE_GAP);
                    lane.forEach(ev => {
                        evMap[ev.id] = { top: laneTop, height: SUPV_LANE_H };
                    });
                });

                cum += roleH + ROLE_GAP;
            });

            return { evMap, total: cum, roleBands };
        };

        // Flying-specific layout: groups events into model bands (F-16, T-38, …).
        // Within each band, CR/FS SIM events that share a startTime with a real sortie are placed
        // as a sub-tier row (below the flights). Unmatched sims collect in a "Sims / CR" band.
        // Returns evMap (id → {top,height}), total height, and modelBands ([{model,top,height,flightH}]).
        const buildFlyingLayout = (events) => {
            if (events.length === 0) return { evMap: {}, total: 0, modelBands: [] };

            const FLYING_LANE_H = 40;  // px per sub-lane within a band
            const SUBLANE_GAP   = 2;   // px between sub-lanes in same band
            const MODEL_GAP     = 4;   // px between model bands
            const LABEL_H       = 12;  // px reserved at top of each band for the model label

            const isSimCR = (ev) => SIM_CR_MODELS.has(ev.model || '');
            const realFlights = events.filter(ev => !isSimCR(ev));
            const simCRs      = events.filter(ev =>  isSimCR(ev));

            // Group real flights by model
            const modelGroups = new Map(); // model → [events]
            realFlights.forEach(ev => {
                const m = ev.model || 'Unknown';
                if (!modelGroups.has(m)) modelGroups.set(m, []);
                modelGroups.get(m).push(ev);
            });
            modelGroups.forEach(evs => evs.sort((a, b) => (evStart(a) || 0) - (evStart(b) || 0)));

            // Match each sim/CR to an aircraft model by walking backwards through the events array
            // to find the nearest preceding non-sim/CR event. More reliable than startTime matching
            // which fails when times differ slightly or multiple aircraft share the same start time.
            const matchedSims   = new Map(); // model → [sim events]
            const unmatchedSims = [];
            simCRs.forEach(sim => {
                const simIdx = events.indexOf(sim);
                let precedingModel = null;
                for (let i = simIdx - 1; i >= 0; i--) {
                    if (!isSimCR(events[i])) { precedingModel = events[i].model || 'Unknown'; break; }
                }
                if (precedingModel && modelGroups.has(precedingModel)) {
                    if (!matchedSims.has(precedingModel)) matchedSims.set(precedingModel, []);
                    matchedSims.get(precedingModel).push(sim);
                } else {
                    unmatchedSims.push(sim);
                }
            });

            // Order model bands: FLYING_MODEL_ORDER first, then unknowns alphabetically
            const orderedModels = [
                ...FLYING_MODEL_ORDER.filter(m => modelGroups.has(m)),
                ...[...modelGroups.keys()].filter(m => !FLYING_MODEL_ORDER.includes(m)).sort(),
            ];
            if (unmatchedSims.length > 0) orderedModels.push('__SIMS__');

            const evMap       = {};
            const modelBands  = [];
            let cum = 0;

            orderedModels.forEach(model => {
                const flightEvs = model === '__SIMS__' ? [] : (modelGroups.get(model) || []);
                const simEvs    = model === '__SIMS__' ? unmatchedSims : (matchedSims.get(model) || []);

                // Greedy sub-lane packing for real flights
                const flightSubLanes = [];
                flightEvs.forEach(ev => {
                    const s = evStart(ev) || 0;
                    let placed = false;
                    for (let i = 0; i < flightSubLanes.length; i++) {
                        const last = flightSubLanes[i][flightSubLanes[i].length - 1];
                        if (s >= (visualEnd(last) || s)) { flightSubLanes[i].push(ev); placed = true; break; }
                    }
                    if (!placed) flightSubLanes.push([ev]);
                });
                // Per-lane heights for real flights — use estimateHeight so ETD/ETA bar doesn't clip crew chips
                const flightLaneHeights = flightSubLanes.map(lane =>
                    Math.max(FLYING_LANE_H, ...lane.map(ev => estimateHeight(ev)))
                );
                const flightH = flightLaneHeights.length === 0 ? 0 :
                    flightLaneHeights.reduce((s, h) => s + h, 0) + Math.max(0, flightLaneHeights.length - 1) * SUBLANE_GAP;

                // Greedy sub-lane packing for paired sims (placed below flights in same band)
                const simSubLanes = [];
                simEvs.forEach(ev => {
                    const s = evStart(ev) || 0;
                    let placed = false;
                    for (let i = 0; i < simSubLanes.length; i++) {
                        const last = simSubLanes[i][simSubLanes[i].length - 1];
                        if (s >= (visualEnd(last) || s)) { simSubLanes[i].push(ev); placed = true; break; }
                    }
                    if (!placed) simSubLanes.push([ev]);
                });
                // Per-lane heights for sims; +2 for the dashed divider gap between flights and sims
                const simLaneHeights = simSubLanes.map(lane =>
                    Math.max(FLYING_LANE_H, ...lane.map(ev => estimateHeight(ev)))
                );
                const simH = simLaneHeights.length === 0 ? 0 :
                    simLaneHeights.reduce((s, h) => s + h, 0) + Math.max(0, simLaneHeights.length - 1) * SUBLANE_GAP + 2;

                const bandH = LABEL_H + flightH + simH;
                const displayModel = model === '__SIMS__' ? 'Sims / CR' : model;
                modelBands.push({ model: displayModel, top: cum, height: bandH, flightH, hasSims: simEvs.length > 0 });

                // Assign positions for real flights — shift down by LABEL_H, cumulative per-lane heights
                let flightCum = cum + LABEL_H;
                flightSubLanes.forEach((lane, li) => {
                    const laneH = flightLaneHeights[li];
                    lane.forEach(ev => { evMap[ev.id] = { top: flightCum, height: laneH }; });
                    flightCum += laneH + SUBLANE_GAP;
                });

                // Assign positions for sims (below flights, +2 for divider gap) — shift down by LABEL_H
                let simCum = cum + LABEL_H + flightH + 2;
                simSubLanes.forEach((lane, li) => {
                    const laneH = simLaneHeights[li];
                    lane.forEach(ev => { evMap[ev.id] = { top: simCum, height: laneH }; });
                    simCum += laneH + SUBLANE_GAP;
                });

                cum += bandH + MODEL_GAP;
            });

            return { evMap, total: cum, modelBands };
        };

        // Ground-specific layout: groups events by eventName into horizontal bands.
        // Within each band, genuine time overlaps get stacked into sub-lanes.
        // Returns evMap (id → {top,height}), total height, and nameBands ([{name,top,height}]).
        const buildGroundLayout = (events) => {
            if (events.length === 0) return { evMap: {}, total: 0, nameBands: [] };

            const GROUND_LANE_H    = 40;
            const GROUND_SUBLANE_GAP = 2;
            const GROUND_GROUP_GAP   = 4;
            const LABEL_H            = 12; // px reserved at top of each band for the event-name label

            // Group by eventName
            const nameGroups = new Map();
            events.forEach(ev => {
                const key = ev.eventName || 'Unknown';
                if (!nameGroups.has(key)) nameGroups.set(key, []);
                nameGroups.get(key).push(ev);
            });
            nameGroups.forEach(evs => evs.sort((a, b) => (evStart(a) || 0) - (evStart(b) || 0)));

            // Alphabetical ordering — consistent and simple
            const orderedNames = [...nameGroups.keys()].sort();

            const evMap     = {};
            const nameBands = [];
            let cum = 0;

            orderedNames.forEach(name => {
                const grpEvs = nameGroups.get(name);

                // Greedy sub-lane packing
                const subLanes = [];
                grpEvs.forEach(ev => {
                    const s = evStart(ev) || 0;
                    let placed = false;
                    for (let i = 0; i < subLanes.length; i++) {
                        const last = subLanes[i][subLanes[i].length - 1];
                        if (s >= (visualEnd(last) || s)) { subLanes[i].push(ev); placed = true; break; }
                    }
                    if (!placed) subLanes.push([ev]);
                });

                // Singleton: group has exactly 1 event total — skip the label to save vertical space
                const isSingleton = grpEvs.length === 1;
                const labelOffset = isSingleton ? 0 : LABEL_H;

                // Per-lane heights — use estimateHeight so wrapped event names have enough room
                const subLaneHeights = subLanes.map(lane =>
                    Math.max(GROUND_LANE_H, ...lane.map(ev => estimateHeight(ev)))
                );
                const bandH = labelOffset + subLaneHeights.reduce((s, h) => s + h, 0) + Math.max(0, subLanes.length - 1) * GROUND_SUBLANE_GAP;
                nameBands.push({ name, top: cum, height: bandH, isSingleton });

                let laneCum = cum + labelOffset;
                subLanes.forEach((lane, li) => {
                    const laneH = subLaneHeights[li];
                    lane.forEach(ev => { evMap[ev.id] = { top: laneCum, height: laneH }; });
                    laneCum += laneH + GROUND_SUBLANE_GAP;
                });

                cum += bandH + GROUND_GROUP_GAP;
            });

            return { evMap, total: cum, nameBands };
        };

        // ==========================================
        // SAMPLE DATA
        // ==========================================

        // ─── EVENT CLASSIFICATION ───

        const STAFF_KEYWORDS = [
            'MSN QUAL', 'NVG QUAL', 'CHECKRIDE', 'CURRENCY', 'FERRY FLIGHT', 'FERRY',
            'CHASE', 'CADET', 'NAVY', 'HI AOA', 'UPGRADE', 'VISTA UPG', 'FORM UPG', 'UPG'
        ];

        const classifyEvent = (ev, roster) => {
            // 1. Check staff keywords against event name
            const name = (ev.eventName || '').toUpperCase();
            // "P/S" = Performance/Syllabus (student training events) — exclude from staff keyword match
            const isStudentSyllabus = name.includes('P/S ');
            if (!isStudentSyllabus && STAFF_KEYWORDS.some(kw => name.includes(kw))) return 'Staff';

            // 2. Count non-staff personnel by class
            const staffCats = new Set(['Staff IP', 'Staff IFTE/ICSO', 'Staff STC', 'Attached/Support']);
            let aCount = 0, bCount = 0;
            ev.personnel.forEach(p => {
                const cat = personCat(p, roster);
                if (!cat || staffCats.has(cat)) return; // skip staff/unknown
                if (cat === 'FTC-A' || cat === 'STC-A') aCount++;
                else if (cat === 'FTC-B' || cat === 'STC-B') bCount++;
            });

            if (aCount > 0 && aCount >= bCount) return 'A-Class';
            if (bCount > 0 && bCount > aCount) return 'B-Class';
            return 'Other';
        };

        const CLASS_COLORS = {
            'A-Class': { bg: 'rgba(168,85,247,0.08)', border: '#a855f7', text: '#d8b4fe', cssClass: 'class-group-a' },
            'B-Class': { bg: 'rgba(249,115,22,0.08)', border: '#f97316', text: '#fed7aa', cssClass: 'class-group-b' },
            'Staff':   { bg: 'rgba(34,197,94,0.08)',   border: '#22c55e', text: '#bbf7d0', cssClass: 'class-group-staff' },
            'Other':   { bg: 'rgba(100,116,139,0.08)', border: '#64748b', text: '#cbd5e1', cssClass: 'class-group-other' },
        };

        // ─── SELECTION SCREEN (v3.1: role-based grouping, separate NA, quick-select) ───

        const EventSelectionScreen = ({ allEvents, roster, dates, onContinue, initialSelected, initialNaCats, initialSelectAllActive }) => {
            const [selectedIds, setSelectedIds] = useState(initialSelected || new Set());
            const [naCats, setNaCats] = useState(initialNaCats || new Set());
            // T7: track whether "Select All" is the active state
            const [selectAllActive, setSelectAllActive] = useState(!!initialSelectAllActive);

            const secColors = {
                Flying:      { bg: 'rgba(16,185,129,0.1)',  border: '#10b981', text: '#6ee7b7' },
                Ground:      { bg: 'rgba(245,158,11,0.1)',  border: '#f59e0b', text: '#fde68a' },
                NA:          { bg: 'rgba(239,68,68,0.1)',    border: '#ef4444', text: '#fca5a5' },
                Supervision: { bg: 'rgba(139,92,246,0.1)',   border: '#8b5cf6', text: '#c4b5fd' },
            };

            // Student event name patterns — these are curriculum events that should
            // inherit class from crewed siblings rather than defaulting to 'Other'
            const STUDENT_PATTERNS = ['CF', 'AIRMANSHIP'];
            const isStudentEventName = (name) => STUDENT_PATTERNS.some(pat => name.startsWith(pat));

            // Classify all non-readonly, non-NA events and organize by date > class > section
            // Two-pass: first classify normally, then reclassify uncrewed student events via sibling inheritance
            const { byDateClassified, classSets } = useMemo(() => {
                const map = {};
                const sets = { 'A-Class': new Set(), 'B-Class': new Set(), 'Staff': new Set(), 'Other': new Set() };

                dates.forEach(d => { map[d] = {}; });

                // Pass 1: classify all events, build (date|eventName) → class lookup
                const eventClass = new Map();         // ev.id → class
                const dateNameClass = new Map();      // "date|NAME" → 'A-Class'|'B-Class'|'Staff'
                const studentEvents = [];             // events needing reclassification

                allEvents.forEach(ev => {
                    if (ev.readonly || ev.section === 'NA' || ev.section === 'Supervision') return;
                    if (!map[ev.date]) return;

                    const cls = classifyEvent(ev, roster);
                    eventClass.set(ev.id, cls);

                    const uName = (ev.eventName || '').toUpperCase().trim();
                    if (cls !== 'Other') {
                        dateNameClass.set(`${ev.date}|${uName}`, cls);
                    } else if (isStudentEventName(uName)) {
                        studentEvents.push(ev);
                    }
                });

                // Pass 2: reclassify uncrewed student events via sibling inheritance
                studentEvents.forEach(ev => {
                    const uName = (ev.eventName || '').toUpperCase().trim();
                    // Try exact name match on same date first
                    let inherited = dateNameClass.get(`${ev.date}|${uName}`);
                    // Broaden: any classified student-pattern event on same date
                    if (!inherited) {
                        for (const [k, v] of dateNameClass) {
                            const sep = k.indexOf('|');
                            if (k.substring(0, sep) === ev.date && isStudentEventName(k.substring(sep + 1)) && (v === 'A-Class' || v === 'B-Class')) {
                                inherited = v;
                                break;
                            }
                        }
                    }
                    if (inherited) eventClass.set(ev.id, inherited);
                });

                // Build final groupings
                allEvents.forEach(ev => {
                    if (ev.readonly || ev.section === 'NA' || ev.section === 'Supervision') return;
                    if (!map[ev.date]) return;

                    const cls = eventClass.get(ev.id) || 'Other';
                    sets[cls].add(ev.id);

                    const key = `${cls}|${ev.section}`;
                    if (!map[ev.date][key]) map[ev.date][key] = [];
                    map[ev.date][key].push(ev);
                });

                // Sort events within each group by start time
                Object.values(map).forEach(groups => {
                    Object.values(groups).forEach(arr => {
                        arr.sort((a, b) => (evStart(a) || 0) - (evStart(b) || 0));
                    });
                });

                return { byDateClassified: map, classSets: sets };
            }, [allEvents, dates, roster]);

            // All roster categories that have members (available for NA conflict tracking)
            const naCategoriesAvailable = useMemo(() => {
                const rosterCats = new Set(Object.keys(roster).filter(cat => roster[cat] && roster[cat].length > 0));
                // Use CATEGORY_COLORS key order for consistent display, then any extras alphabetically
                const ordered = Object.keys(CATEGORY_COLORS).filter(cat => rosterCats.has(cat));
                rosterCats.forEach(cat => { if (!ordered.includes(cat)) ordered.push(cat); });
                return ordered;
            }, [roster]);

            // Supervision events grouped by date (selectable separately from classified events)
            const supervisionByDate = useMemo(() => {
                const map = {};
                allEvents.forEach(ev => {
                    if (ev.section !== 'Supervision') return;
                    if (!map[ev.date]) map[ev.date] = [];
                    map[ev.date].push(ev);
                });
                // Sort by start time within each date
                Object.values(map).forEach(arr => arr.sort((a, b) => (evStart(a) || 0) - (evStart(b) || 0)));
                return map;
            }, [allEvents]);

            const allSupervisionIds = useMemo(() => {
                const ids = new Set();
                allEvents.forEach(ev => { if (ev.section === 'Supervision') ids.add(ev.id); });
                return ids;
            }, [allEvents]);

            // Toggle individual event
            const toggleEvent = (id) => {
                setSelectAllActive(false); // T7: manual toggle clears select-all flag
                setSelectedIds(prev => {
                    const next = new Set(prev);
                    next.has(id) ? next.delete(id) : next.add(id);
                    return next;
                });
            };

            // Toggle all events in a specific group (class+section within a date)
            const toggleGroup = (evs) => {
                const ids = evs.map(e => e.id);
                const allSel = ids.every(id => selectedIds.has(id));
                setSelectAllActive(false); // T7: manual toggle clears select-all flag
                setSelectedIds(prev => {
                    const next = new Set(prev);
                    ids.forEach(id => allSel ? next.delete(id) : next.add(id));
                    return next;
                });
            };

            // Quick-select: toggle ALL events in a class across ALL dates
            const toggleClass = (cls) => {
                const ids = classSets[cls];
                if (!ids || ids.size === 0) return;
                const allSel = [...ids].every(id => selectedIds.has(id));

                setSelectedIds(prev => {
                    const next = new Set(prev);
                    ids.forEach(id => allSel ? next.delete(id) : next.add(id));
                    return next;
                });
            };

            const toggleNaCat = (cat) => {
                setSelectAllActive(false); // T7
                setNaCats(prev => {
                    const next = new Set(prev);
                    next.has(cat) ? next.delete(cat) : next.add(cat);
                    return next;
                });

            const selectAll = () => {
                const all = new Set();
                allEvents.forEach(ev => {
                    if (!ev.readonly && ev.section !== 'NA') all.add(ev.id);

                setSelectedIds(all);
                setNaCats(new Set(naCategoriesAvailable));

            const isClassFullySelected = (cls) => {
                const ids = classSets[cls];
                return ids.size > 0 && [...ids].every(id => selectedIds.has(id));
            };

            const sectionOrder = ['Flying', 'Ground'];

            return (
                <div className="selection-screen">
                    <div className="app-header">
                        <div>
                            <h1 className="text-lg font-bold text-white tracking-tight">TPS INTERACTIVE SCHEDULER</h1>
                            <p className="text-xs text-gray-500">Select events you are responsible for scheduling</p>
                        </div>
                        <div className="flex gap-3 items-center">
                            <button onClick={selectAll} className="filter-btn">Select All</button>
                            <button onClick={() => { setSelectedIds(new Set()); setNaCats(new Set()); setSelectAllActive(false); }} className="filter-btn">Clear</button>
                            <button
                                onClick={() => onContinue(selectedIds, naCats, selectAllActive)}
                                disabled={totalSelected === 0}
                                className="px-5 py-1.5 rounded-lg text-sm font-bold transition-colors"
                                style={{
                                    background: totalSelected > 0 ? '#2563eb' : '#374151',
                                    color: totalSelected > 0 ? 'white' : '#6b7280',
                                    cursor: totalSelected > 0 ? 'pointer' : 'not-allowed',
                                }}
                            >
                                Continue ({totalSelected})
                            </button>
                        </div>
                    </div>
                    <div className="selection-body">
                        <p className="text-xs text-gray-500 mb-2" style={{ lineHeight: 1.6 }}>
                            Conflict detection checks ALL events regardless of selection.
                        </p>

                        {/* SUPERVISION (all-or-nothing toggle) */}
                        {allSupervisionIds.size > 0 && (() => {
                            const allSel = [...allSupervisionIds].every(id => selectedIds.has(id));
                            return (
                                <div style={{ marginBottom: 20 }}>
                                    <div className="selection-separator" style={{ color: '#c4b5fd', borderColor: 'rgba(139,92,246,0.3)' }}>SUPERVISION</div>
                                    <div style={{ padding: '4px 8px' }}>
                                        <div
                                            className={`na-cat-chip ${allSel ? 'selected' : ''}`}
                                            onClick={() => {
                                                setSelectAllActive(false); // T7
                                                setSelectedIds(prev => {
                                                    const next = new Set(prev);
                                                    allSupervisionIds.forEach(id => allSel ? next.delete(id) : next.add(id));
                                                    return next;
                                                });
                                            }}
                                            style={allSel ? { borderColor: '#8b5cf6', color: '#c4b5fd', background: 'rgba(139,92,246,0.15)' } : undefined}
                                        >
                                            Include Supervision ({allSupervisionIds.size} events)
                                        </div>
                                    </div>
                                </div>
                            );
                        })()}

                        {/* NON-AVAILABILITY (separate from dates) */}
                        {naCategoriesAvailable.length > 0 && (
                            <div style={{ marginBottom: 20 }}>
                                <div className="selection-separator">NON-AVAILABILITY</div>
                                <p className="text-xs text-gray-600 mb-2" style={{ paddingLeft: 8 }}>
                                    Select crew categories to include in conflict tracking
                                </p>
                                <div className="na-category-grid">
                                    {naCategoriesAvailable.map(cat => {
                                        const catColor = CATEGORY_COLORS[cat];
                                        const isSelected = naCats.has(cat);
                                        return (
                                            <div
                                                key={cat}
                                                className={`na-cat-chip ${isSelected ? 'selected' : ''}`}
                                                onClick={() => toggleNaCat(cat)}
                                                style={isSelected && catColor ? {
                                                    borderColor: catColor.bg,
                                                    color: catColor.text,
                                                    background: catColor.bg + '30',
                                                } : undefined}
                                            >
                                                {cat}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {/* QUICK SELECT */}
                        <div style={{ marginBottom: 20 }}>
                            <div className="selection-separator">QUICK SELECT</div>
                            <div className="quick-select-bar" style={{ padding: '4px 8px' }}>
                                {classOrder.filter(cls => classSets[cls].size > 0).map(cls => {
                                    const cc = CLASS_COLORS[cls];
                                    const active = isClassFullySelected(cls);
                                    const count = classSets[cls].size;
                                    const selectedCount = [...classSets[cls]].filter(id => selectedIds.has(id)).length;
                                    return (
                                        <button
                                            key={cls}
                                            className="quick-select-btn"
                                            onClick={() => toggleClass(cls)}
                                            style={active ? { borderColor: cc.border, color: cc.text, background: cc.bg } : undefined}
                                        >
                                            {cls} ({selectedCount}/{count})
                                        </button>
                                    );
                                })}
                            </div>
                        </div>

                        {/* DATE SECTIONS with classified groups */}
                        {dates.map(date => {
                            const dayGroups = byDateClassified[date];
                            if (!dayGroups) return null;

                            const hasEvents = Object.values(dayGroups).some(arr => arr.length > 0);
                            if (!hasEvents) return null;

                            const dh = fmtDate(date);

                            return (
                                <div key={date} className="selection-day-group">
                                    <div className="selection-day-header">
                                        <span>{dh.weekday} {dh.day} {dh.month}</span>
                                        <span className="text-xs text-gray-600 font-normal">{date}</span>
                                    </div>

                                    {classOrder.map(cls => {
                                        const cc = CLASS_COLORS[cls];

                                        return sectionOrder.map(sec => {
                                            const key = `${cls}|${sec}`;
                                            const evs = dayGroups[key];
                                            if (!evs || evs.length === 0) return null;

                                            const sc = secColors[sec];
                                            const allSel = evs.every(e => selectedIds.has(e.id));

                                            return (
                                                <div key={key} className="selection-section">
                                                    <div
                                                        className={`selection-section-title ${cc.cssClass}`}
                                                        style={{
                                                            background: `linear-gradient(90deg, ${cc.bg}, ${sc.bg})`,
                                                            borderLeft: `3px solid ${cc.border}`,
                                                        }}
                                                        onClick={() => toggleGroup(evs)}
                                                    >
                                                        <div className={`sel-cb ${allSel ? 'checked' : ''}`}>{allSel ? '\u2713' : ''}</div>
                                                        <span style={{ fontWeight: 700, fontSize: '0.7rem' }}>
                                                            <span style={{ color: cc.text }}>{cls.toUpperCase()}</span>
                                                            <span style={{ color: 'rgba(255,255,255,0.25)', margin: '0 4px' }}>/</span>
                                                            <span style={{ color: sc.text }}>{sec.toUpperCase()}</span>
                                                            <span style={{ color: 'rgba(255,255,255,0.3)', fontWeight: 400, marginLeft: 8 }}>({evs.length})</span>
                                                        </span>
                                                    </div>
                                                    {evs.map(ev => {
                                                        const checked = selectedIds.has(ev.id);
                                                        return (
                                                            <div key={ev.id} className="sel-event-row" onClick={() => toggleEvent(ev.id)}>
                                                                <div className={`sel-cb ${checked ? 'checked' : ''}`}>{checked ? '\u2713' : ''}</div>
                                                                {ev.model && <span className="font-bold text-gray-400" style={{ fontSize: '0.65rem', width: 45 }}>{ev.model}</span>}
